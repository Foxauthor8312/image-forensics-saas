<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1000px; margin:auto; padding:20px; }

.tabs { display:flex; gap:10px; margin-top:20px; }
.tab { padding:10px; background:#334155; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:15px; margin-top:10px; }

.image-row { display:flex; gap:10px; flex-wrap:wrap; }
.image-box { flex:1 1 48%; }

#progress-container { display:none; margin-top:20px; }

.progress-bar {
  width:100%;
  height:10px;
  background:#1e293b;
  border-radius:5px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:#3b82f6;
  animation: progressAnim 2s infinite;
}

@keyframes progressAnim {
  0% { width:0%; }
  50% { width:70%; }
  100% { width:100%; }
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/jpeg">
<button id="analyzeBtn" onclick="upload()">Analyze</button>

<div id="progress-container">
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  <p id="status">Starting...</p>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;
let extractedMetadata = {};
let gpsData = null;

file.onchange = function(e){
  selectedFile = e.target.files[0];

  EXIF.getData(selectedFile, function(){
    extractedMetadata = EXIF.getAllTags(this);

    if(extractedMetadata.GPSLatitude){
      let lat = extractedMetadata.GPSLatitude[0] + extractedMetadata.GPSLatitude[1]/60 + extractedMetadata.GPSLatitude[2]/3600;
      let lon = extractedMetadata.GPSLongitude[0] + extractedMetadata.GPSLongitude[1]/60 + extractedMetadata.GPSLongitude[2]/3600;

      if(extractedMetadata.GPSLatitudeRef === "S") lat = -lat;
      if(extractedMetadata.GPSLongitudeRef === "W") lon = -lon;

      gpsData = {lat, lon};
    }
  });
};

function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>img.src=e.target.result;
    reader.readAsDataURL(file);

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height;
      const MAX=1200;

      if(w>MAX||h>MAX){
        if(w>h){h*=MAX/w;w=MAX;}
        else{w*=MAX/h;h=MAX;}
      }

      canvas.width=w;
      canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(blob=>{
        resolve(new File([blob],file.name,{type:"image/jpeg"}));
      },"image/jpeg",0.7);
    };
  });
}

async function upload(){

  if(!selectedFile) return alert("Select file");

  document.getElementById("progress-container").style.display="block";
  document.getElementById("analyzeBtn").disabled=true;
  document.getElementById("status").innerText="Processing image...";

  const resized = await resizeImage(selectedFile);

  const form=new FormData();
  form.append("image",resized);
  form.append("metadata",JSON.stringify(extractedMetadata));
  form.append("gps",JSON.stringify(gpsData));

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();

  document.getElementById("progress-container").style.display="none";
  document.getElementById("analyzeBtn").disabled=false;

  render(data.result);
}

function render(data){
document.getElementById("result").innerHTML=`
<div class="card">
<h2>${data.analysis}</h2>
<p>Score: ${data.score}</p>
<p>Confidence: ${data.confidence}%</p>
<p>${data.simple_explanation}</p>
<a href="${data.pdf_report}" target="_blank">Download PDF</a>
</div>
`;
}

</script>
</body>
</html>
