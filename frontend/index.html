<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof — AI Image Forensics</title>

<link rel="icon" href="/favicon.ico?v=2">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}
.app-header{display:flex;align-items:center;gap:12px;padding:15px;margin-bottom:20px;background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:14px}
.logo-badge{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(59,130,246,0.5)}
.logo-badge img{width:28px}
.brand-title{font-size:22px;font-weight:700}
.brand-sub{font-size:12px;opacity:.7}
.dashboard{display:grid;grid-template-columns:300px 1fr;gap:20px}
.panel{background:#1e293b;padding:20px;border-radius:12px}
.drop-zone{border:2px dashed #555;padding:40px;text-align:center;border-radius:12px;cursor:pointer}
.tabs{display:flex;gap:10px;margin-top:15px}
.tab{padding:6px 10px;background:#111;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:10px}
.bar{height:6px;background:#111;margin:5px 0}
.bar-fill{height:6px;background:#3b82f6}
#map{height:300px;border-radius:10px;margin-top:10px}
.progress-bar{height:6px;background:#111;margin:10px 0;display:none}
.progress-fill{height:100%;width:0;background:#3b82f6}
.app-footer{margin-top:30px;padding:15px;display:flex;justify-content:space-between;background:#1e293b;border-radius:12px;font-size:12px}
.footer-sub{font-size:11px;opacity:.6}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal-content{background:#1e293b;padding:20px;border-radius:12px}
</style>
</head>

<body>
<div class="container">

<header class="app-header">
  <div class="logo-badge"><img src="/icon-192.png"></div>
  <div>
    <div class="brand-title">PixelProof</div>
    <div class="brand-sub">AI Image Forensics Engine</div>
  </div>
</header>

<div class="dashboard">
  <div class="panel">
    <div id="dropZone" class="drop-zone">Upload Image</div>
    <input type="file" id="file" hidden>
  </div>

  <div class="panel">
    <div id="status"></div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="result"></div>
  </div>
</div>

<footer class="app-footer">
  <div>
    <strong>PixelProof</strong>
    <div class="footer-sub">AI Image Forensics Engine</div>
    <div class="footer-sub">© <span id="year"></span></div>
  </div>
  <div id="backendStatus">Checking...</div>
</footer>

</div>

<div id="legalModal" class="modal">
  <div class="modal-content">
    <h2>Legal Disclaimer</h2>
    <p>Results are probabilistic.</p>
  </div>
</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";
const file=document.getElementById("file");
const drop=document.getElementById("dropZone");
const result=document.getElementById("result");
const statusEl=document.getElementById("status");
const bar=document.getElementById("progressBar");
const fill=document.getElementById("progressFill");

drop.onclick=()=>file.click();
file.onchange=e=>handle(e.target.files[0]);

function handle(f){
  if(!f)return;
  window.lastFile=f;
  analyze(f);
}

async function analyze(f){
  const form=new FormData();
  form.append("image",f);

  bar.style.display="block";
  fill.style.width="10%";
  statusEl.innerHTML="Analyzing...";

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();

  fill.style.width="100%";
  setTimeout(()=>bar.style.display="none",500);

  render(data.result||data);
}

function render(d){
  const preview = `<img src="${URL.createObjectURL(window.lastFile)}" style="width:100%">`;

  result.innerHTML=`
  ${preview}

  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'d')">Detailed</div>
    <div class="tab" onclick="tab(event,'m')">Metadata</div>
    <div class="tab" onclick="tab(event,'mapTab')">Map</div>
  </div>

  <div id="r" class="tab-content active">
    <h2>${d.conclusion}</h2>
    <p>${d.analysis}</p>
  </div>

  <div id="d" class="tab-content"><pre>${JSON.stringify(d,null,2)}</pre></div>
  <div id="m" class="tab-content">${JSON.stringify(d.metadata)}</div>
  <div id="mapTab" class="tab-content"><div id="map"></div></div>
  `;

  if(d.metadata?.gps){
    setTimeout(()=>{
      const map=L.map('map').setView([d.metadata.gps.lat,d.metadata.gps.lon],13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      L.marker([d.metadata.gps.lat,d.metadata.gps.lon]).addTo(map);
    },200);
  }
}

function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
}

document.getElementById("year").innerText=new Date().getFullYear();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
