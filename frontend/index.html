<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="icon" href="/icon-192.png">

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}
button{padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:8px;margin:5px}
.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:8px;background:#1e293b;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:20px}
.bar{height:6px;background:#1e293b}
.bar-fill{height:6px}
#map{height:400px;border-radius:10px}
</style>
</head>

<body>
<div class="container">

<h1>PixelProof</h1>

<input type="file" id="file">
<button id="rearBtn">Rear</button>
<button id="frontBtn">Front</button>

<input id="rear" type="file" accept="image/*" capture="environment" hidden>
<input id="front" type="file" accept="image/*" capture="user" hidden>

<div id="progress" style="display:none;margin-top:15px;">
  <div style="background:#1e293b;height:8px;border-radius:6px;">
    <div id="bar" style="height:8px;width:0%;background:#3b82f6;"></div>
  </div>
  <div id="progressText" style="font-size:12px;margin-top:5px;">Starting...</div>
</div>

<div id="result"></div>

</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

// DOM
const file = document.getElementById("file");
const rear = document.getElementById("rear");
const front = document.getElementById("front");
const rearBtn = document.getElementById("rearBtn");
const frontBtn = document.getElementById("frontBtn");
const result = document.getElementById("result");

rearBtn.onclick = () => rear.click();
frontBtn.onclick = () => front.click();

let selectedFile, metadata={}, gps=null, mapInstance;

// Signals
const SIGNAL_INFO = {
  ela:{weight:0.25},
  noise:{weight:0.2},
  lighting:{weight:0.2},
  edges:{weight:0.15},
  metadata:{weight:0.2}
};

// File handlers
file.onchange=handle;
rear.onchange=handle;
front.onchange=handle;

async function handle(e){
  console.log("📂 FILE SELECTED");

  const f = e.target.files[0];
  if(!f) return;

  selectedFile = f;

  // 🔥 Stable: skip EXIF for now
  metadata = {};
  gps = null;

  analyze();
}

// Resize image
async function resizeImage(file){
  return new Promise(res=>{
    const img=new Image(), reader=new FileReader();

    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height,MAX=800;

      if(w>MAX){h*=MAX/w;w=MAX;}

      canvas.width=w;
      canvas.height=h;

      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(b=>{
        console.log("🖼️ Image resized");
        res(new File([b],"resized.jpg",{type:"image/jpeg"}));
      });
    };

    reader.readAsDataURL(file);
  });
}

// Analyze
async function analyze(){
  try{
    console.log("🚀 ANALYZE STARTED");

    showProgress();
    setProgress(10,"Preparing...");

    setProgress(30,"Resizing...");
    const resized = await resizeImage(selectedFile);

    const form=new FormData();
    form.append("image",resized);
    form.append("metadata",JSON.stringify(metadata));
    form.append("gps",JSON.stringify(gps));

    console.log("📡 SENDING REQUEST");

    setProgress(60,"Uploading...");

    const res = await fetch(API+"/api/analyze",{
      method:"POST",
      body:form
    });

    console.log("📥 RESPONSE RECEIVED");

    const text = await res.text();

    let data;
    try{
      data = JSON.parse(text);
    }catch(e){
      console.error("❌ NOT JSON:", text);
      alert("Server returned invalid response");
      return;
    }

    console.log("✅ DATA:",data);

    setProgress(100,"Done");
    setTimeout(hideProgress,1000);

    render(data.result || data);

  }catch(err){
    console.error("❌ ERROR:",err);
    hideProgress();
    alert("Server error — check console");
  }
}

// Score
function computeScore(signals){
  let total=0,weightSum=0;

  for(const [k,v] of Object.entries(signals)){
    const def=SIGNAL_INFO[k];
    if(!def) continue;

    total+=v*def.weight;
    weightSum+=def.weight;
  }

  return weightSum?Math.round(total/weightSum):0;
}

// Render full UI
function render(d){
  console.log("🎯 FULL RENDER", d);

  window.lastGPS = d?.gps || null;

  const signals = d.signals || {};
  const metadataAll = d.metadata?.all || d.metadata || {};
  const score = computeScore(signals);

  const breakdown = Object.entries(signals).map(([k,v])=>{
    const color = v>70?"#ef4444":v>40?"#f59e0b":"#22c55e";

    return `
    <div style="margin-bottom:15px">
      <div style="display:flex;justify-content:space-between">
        <strong>${k}</strong>
        <span style="color:${color}">${v}%</span>
      </div>
      <div class="bar">
        <div class="bar-fill" style="width:${v}%;background:${color}"></div>
      </div>
    </div>`;
  }).join("");

  const metadataHTML = Object.entries(metadataAll).map(([k,v])=>{
    return `<p><strong>${k}:</strong> ${v}</p>`;
  }).join("");

  result.innerHTML = `
  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'detail')">Detailed</div>
    <div class="tab" onclick="tab(event,'meta')">Metadata</div>
    <div class="tab" onclick="tab(event,'mapTab')">Map</div>
  </div>

  <div id="r" class="tab-content active">
    <h2>${score>70?"Likely Altered":score>40?"Possibly Modified":"Likely Authentic"}</h2>
    <p>Score: ${score}%</p>
    ${breakdown}

    ${d.heatmap ? `
      <img src="${API + d.heatmap}?t=${Date.now()}" 
           style="width:100%;margin-top:15px;border-radius:10px"
           onerror="this.style.display='none'">
    ` : `<p style="opacity:0.6">No heatmap available</p>`}
  </div>

  <div id="detail" class="tab-content">
    <p>${d.technical_explanation || d.details?.technical || "No technical explanation"}</p>
    <p>${d.legal_explanation || d.details?.legal || "No legal explanation"}</p>
  </div>

  <div id="meta" class="tab-content">
    ${metadataHTML || "<p>No metadata found</p>"}
  </div>

  <div id="mapTab" class="tab-content">
    <div id="map"></div>
  </div>
  `;
}

// Tabs
function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");

  if(id==="mapTab"){
    setTimeout(()=>initMap(window.lastGPS),100);
  }
}

// Map
function initMap(g){
  if(!g || !g.lat || !g.lon) return;

  if(mapInstance) mapInstance.remove();

  mapInstance = L.map('map').setView([g.lat,g.lon],15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(mapInstance);

  L.marker([g.lat,g.lon]).addTo(mapInstance);
}

// UI helpers
function showProgress(){document.getElementById("progress").style.display="block";}
function hideProgress(){document.getElementById("progress").style.display="none";}
function setProgress(p,t){
  document.getElementById("bar").style.width=p+"%";
  document.getElementById("progressText").innerText=t;
}

// Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("SW registered"))
    .catch(err => console.log("SW failed", err));
}
</script>

</body>
</html>
