<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1000px; margin:auto; padding:20px; }

.tabs { display:flex; gap:10px; margin-top:20px; }
.tab { padding:10px; background:#334155; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:15px; margin-top:10px; }

.image-row { display:flex; gap:10px; flex-wrap:wrap; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:400px; object-fit:contain; }

#progress-container { display:none; margin-top:20px; }

.progress-bar {
  width:100%;
  height:10px;
  background:#1e293b;
  border-radius:5px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:#3b82f6;
  animation: progressAnim 2s infinite;
}

@keyframes progressAnim {
  0% { width:0%; }
  50% { width:70%; }
  100% { width:100%; }
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/jpeg">
<button id="analyzeBtn" onclick="upload()">Analyze</button>

<div id="progress-container">
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  <p id="status">Starting analysis...</p>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;
let extractedMetadata = {};
let gpsData = null;

// -----------------------------
// EXIF EXTRACTION
// -----------------------------
file.onchange = function(e){
  selectedFile = e.target.files[0];

  EXIF.getData(selectedFile, function(){
    extractedMetadata = EXIF.getAllTags(this);

    if(extractedMetadata.GPSLatitude && extractedMetadata.GPSLongitude){

      function convert(coord){
        return coord[0] + coord[1]/60 + coord[2]/3600;
      }

      let lat = convert(extractedMetadata.GPSLatitude);
      let lon = convert(extractedMetadata.GPSLongitude);

      if(extractedMetadata.GPSLatitudeRef === "S") lat = -lat;
      if(extractedMetadata.GPSLongitudeRef === "W") lon = -lon;

      gpsData = {lat, lon};
    }
  });
};

// -----------------------------
// RESIZE (analysis only)
// -----------------------------
function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const reader=new FileReader();

    reader.onload=e=>img.src=e.target.result;
    reader.readAsDataURL(file);

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height;
      const MAX=1200;

      if(w>MAX||h>MAX){
        if(w>h){h*=MAX/w;w=MAX;}
        else{w*=MAX/h;h=MAX;}
      }

      canvas.width=w;
      canvas.height=h;

      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(blob=>{
        resolve(new File([blob],file.name,{type:"image/jpeg"}));
      },"image/jpeg",0.7);
    };
  });
}

// -----------------------------
// UPLOAD
// -----------------------------
async function upload(){

  if(!selectedFile){
    alert("Select file");
    return;
  }

  const progress = document.getElementById("progress-container");
  const status = document.getElementById("status");
  const btn = document.getElementById("analyzeBtn");

  progress.style.display="block";
  btn.disabled = true;

  status.innerText="Preparing image...";

  const resized = await resizeImage(selectedFile);

  const form=new FormData();
  form.append("image",resized);
  form.append("metadata",JSON.stringify(extractedMetadata));
  form.append("gps",JSON.stringify(gpsData));

  try {

    status.innerText="Uploading...";
    const res=await fetch(API+"/api/analyze",{method:"POST",body:form});

    status.innerText="Analyzing...";
    const data=await res.json();

    status.innerText="Finalizing...";
    render(data.result);

  } catch(err){
    console.error(err);
    document.getElementById("result").innerHTML="Error occurred";
  }

  progress.style.display="none";
  btn.disabled = false;
}

// -----------------------------
// RENDER FULL UI
// -----------------------------
function render(data){

document.getElementById("result").innerHTML = `

<h3>Analysis Result</h3>

<div class="tabs">
  <div class="tab active" onclick="tab(event,'r')">Results</div>
  <div class="tab" onclick="tab(event,'map')">Map</div>
  <div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">

<div class="card">

<h2>${data.analysis}</h2>

<p><b>Score:</b> ${data.score} / 100</p>
<p><b>Confidence:</b> ${data.confidence}%</p>

<p style="margin-top:10px; opacity:0.9;">
  <b>Score Interpretation:</b><br>
  ${
    data.score > 70
      ? "This score indicates a high level of irregularity in pixel structure and compression patterns. Such values are commonly associated with deliberate digital alterations, compositing, or localized editing."
      : data.score > 40
      ? "This score reflects moderate irregularities. These may result from editing, image recompression, or platform processing. While not definitive, the image warrants closer inspection."
      : "This score indicates a high level of structural consistency. The image does not exhibit meaningful signs of manipulation based on compression and pixel analysis."
  }
</p>

<p style="margin-top:10px; opacity:0.9;">
  <b>What the Score Measures:</b><br>
  The score is derived from Error Level Analysis (ELA), which evaluates how uniformly an image responds to recompression. Edited regions often compress differently than the rest of the image, creating detectable inconsistencies.
</p>

<hr>

<p><b>Summary:</b><br>${data.simple_explanation}</p>

<p><b>Technical Analysis:</b><br>${data.technical_explanation}</p>

<p style="margin-top:10px; opacity:0.9;">
  <b>Confidence Explanation:</b><br>
  ${
    data.confidence > 70
      ? "High confidence: Detected anomalies are strong and consistently distributed across the image, increasing reliability of the assessment."
      : data.confidence > 40
      ? "Moderate confidence: Some anomalies are present, but distribution is uneven or less pronounced."
      : "High confidence in authenticity: The image maintains consistent compression and pixel structure throughout."
  }
</p>

<p style="margin-top:10px; opacity:0.9;">
  <b>Important Note:</b><br>
  Compression artifacts can also be introduced by saving, exporting, or sharing images across platforms. This analysis should be considered alongside image history and source context.
</p>

<p><b>Conclusion:</b><br>${data.legal_explanation}</p>

<br>

<a href="${data.pdf_report}" target="_blank"
style="display:inline-block;padding:10px;background:#22c55e;color:white;border-radius:6px;">
Download Forensic PDF Report
</a>

</div>

<div class="image-row">
  <div class="image-box">
    <p><b>Original</b></p>
    <img src="${URL.createObjectURL(selectedFile)}">
  </div>

  <div class="image-box">
    <p><b>Heatmap</b></p>
    <img src="${data.heatmap}">
  </div>
</div>

</div>

<div id="map" class="tab-content">
${
data.gps
? `<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed"></iframe>`
: "<p>No GPS data found</p>"
}
</div>

<div id="meta" class="tab-content">
<div class="card">
${
data.metadata?.available
? Object.entries(data.metadata.all).map(([k,v])=>`<p>${k}: ${v}</p>`).join("")
: "<p>No metadata found</p>"
}
</div>
</div>

`;
}

// -----------------------------
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>

</body>
</html>
