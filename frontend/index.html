<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0a;
  color: #e5e7eb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 32px;
}

.header img {
  height: 56px;
}

.header span {
  font-size: 16px;
  opacity: 0.7;
}

/* LAYOUT */
.wrapper {
  display: grid;
  grid-template-columns: 420px 1fr;
}

/* LEFT */
.left {
  padding: 40px;
}

.tagline {
  font-size: 16px;
  color: #9ca3af;
  margin-bottom: 30px;
  max-width: 320px;
}

.upload {
  border: 2px dashed #2a2a2a;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  max-width: 320px;
}

.upload:hover {
  border-color: #3b82f6;
}

/* RIGHT */
.right {
  background: #111;
  padding: 40px;
}

/* RESULT PANEL */
#resultCard {
  background: #0f172a;
  border: 1px solid #1e293b;
  padding: 20px;
  border-radius: 12px;
  max-width: 520px;
  margin: 0 auto 20px auto;
}

.result-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.result-type {
  font-size: 20px;
  font-weight: 600;
}

.result-confidence {
  color: #3b82f6;
  font-size: 18px;
}

.confidence-bar {
  height: 6px;
  background: #1e293b;
  border-radius: 4px;
  margin-bottom: 15px;
  overflow: hidden;
}

.confidence-fill {
  height: 100%;
  background: #3b82f6;
}

.result-summary {
  font-weight: 600;
}

.result-explanation {
  color: #9ca3af;
}

.result-reasons {
  padding-left: 18px;
  font-size: 14px;
  color: #cbd5f5;
}

.confidence-note {
  font-size: 12px;
  color: #9ca3af;
  margin-top: 10px;
}

/* SLIDER */
.slider-container {
  position: relative;
  max-width: 520px;
  margin: auto;
}

.slider-container img {
  width: 100%;
  display: block;
  border-radius: 8px;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay img {
  width: 100%;
  mix-blend-mode: difference;
}

.slider {
  width: 520px;
  margin: 10px auto;
  display: block;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <span>PixelProof</span>
</div>

<div class="wrapper">

<div class="left">

<div class="tagline">
Detect edits and verify image authenticity instantly.
</div>

<label class="upload">
  <input type="file" id="file">
  Select an image
</label>

</div>

<div class="right">

<div id="resultCard"></div>

<div class="slider-container">
  <img id="originalImage">

  <div class="overlay" id="overlay">
    <img id="elaOverlay">
  </div>
</div>

<input type="range" min="0" max="100" value="50" id="slider" class="slider">

</div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

const slider = document.getElementById("slider");
const overlay = document.getElementById("overlay");

slider.addEventListener("input", () => {
  overlay.style.width = slider.value + "%";
});

function interpret(type, data) {
  const reasons = [];

  if (!data.exif) {
    reasons.push("No metadata present");
  }

  if (data.ela && data.ela.score > 25) {
    reasons.push("High compression inconsistencies detected");
  } else if (data.ela && data.ela.score > 10) {
    reasons.push("Moderate compression differences detected");
  } else {
    reasons.push("Low compression differences");
  }

  if (type === "Likely Original") {
    return {
      summary: "No strong evidence of manipulation detected.",
      explanation: "Image structure appears consistent.",
      reasons
    };
  }

  if (type === "Recompressed") {
    return {
      summary: "Image has been resaved or shared.",
      explanation: "Compression artifacts detected.",
      reasons
    };
  }

  if (type === "Edited") {
    return {
      summary: "Possible image modification detected.",
      explanation: "Compression inconsistencies suggest alteration.",
      reasons
    };
  }

  return {
    summary: "Inconclusive result.",
    explanation: "",
    reasons
  };
}

document.getElementById("file").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("originalImage").src = URL.createObjectURL(file);

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification?.type || "Result";
  const conf = Math.round((data.classification?.confidence || 0.5) * 100);
  const result = interpret(type, data);

  document.getElementById("resultCard").innerHTML = `
    <div class="result-header">
      <div class="result-type">${type}</div>
      <div class="result-confidence">${conf}%</div>
    </div>

    <div class="confidence-bar">
      <div class="confidence-fill" style="width:${conf}%"></div>
    </div>

    <p class="result-summary">${result.summary}</p>
    <p class="result-explanation">${result.explanation}</p>

    <ul class="result-reasons">
      ${result.reasons.map(r => `<li>${r}</li>`).join("")}
    </ul>

    <p class="confidence-note">
      Confidence reflects how strongly the observed patterns support this classification.
    </p>
  `;

  if (data.ela && data.ela.overlay) {
    document.getElementById("elaOverlay").src = data.ela.overlay;
  }
};
</script>

</body>
</html>
