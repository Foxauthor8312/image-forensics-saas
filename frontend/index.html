<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

button {
  padding:10px 16px;
  background:#3b82f6;
  border:none;
  border-radius:6px;
  color:white;
}

.tabs { display:flex; gap:10px; margin-top:20px; }
.tab { padding:10px; background:#1e293b; border-radius:6px; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:18px; border-radius:10px; margin-top:15px; }

.image-row { display:flex; gap:15px; flex-wrap:wrap; margin-top:20px; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:420px; object-fit:contain; }

.gauge { width:120px; height:120px; position:relative; }
.gauge svg { transform:rotate(-90deg); }
.gauge-text {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
}

/* Install button */
#installBtn {
  display:none;
  margin-top:10px;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<button id="installBtn">Install App</button>

<input type="file" id="file" accept="image/jpeg">
<button onclick="upload()">Analyze</button>

<div id="progress-container" style="display:none;">
  <p id="status">Processing...</p>
</div>

<div id="result"></div>

</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";

let deferredPrompt;
const installBtn = document.getElementById("installBtn");

/* INSTALL PROMPT */
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "inline-block";
});

installBtn.onclick = async () => {
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  installBtn.style.display = "none";
};

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

/* STATE */
let selectedFile=null;
let metadata={};
let gps=null;

/* EXIF */
file.onchange=e=>{
  selectedFile=e.target.files[0];
  EXIF.getData(selectedFile,function(){
    metadata=EXIF.getAllTags(this);
  });
};

/* GAUGE */
function gauge(v,label){
  const r=50,c=2*Math.PI*r;
  const o=c-(v/100)*c;
  const color=v>70?"#22c55e":v>40?"#f59e0b":"#ef4444";

  return `
  <div>
    <div class="gauge">
      <svg width="120" height="120">
        <circle cx="60" cy="60" r="${r}" stroke="#1e293b" stroke-width="10" fill="none"/>
        <circle cx="60" cy="60" r="${r}" stroke="${color}" stroke-width="10"
          stroke-dasharray="${c}" stroke-dashoffset="${o}" fill="none"/>
      </svg>
      <div class="gauge-text">${v}</div>
    </div>
    <div style="text-align:center">${label}</div>
  </div>`;
}

/* LOCKED EXPLANATIONS */
function renderExplanations(d){
  return `
  <hr>
  <p><b>Summary:</b><br>${d.simple_explanation}</p>
  <p><b>Technical:</b><br>${d.technical_explanation}</p>
  <p><b>Conclusion:</b><br>${d.legal_explanation}</p>
  <p><b>Confidence:</b><br>${d.confidence_note}</p>
  `;
}

/* UPLOAD */
async function upload(){
  if(!selectedFile) return alert("Select file");

  document.getElementById("progress-container").style.display="block";

  const form=new FormData();
  form.append("image",selectedFile);
  form.append("metadata",JSON.stringify(metadata));

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();

  document.getElementById("progress-container").style.display="none";

  render(data.result);
}

/* RENDER */
function render(d){

document.getElementById("result").innerHTML=`

<div class="tabs">
  <div class="tab active" onclick="tab(event,'r')">Results</div>
  <div class="tab" onclick="tab(event,'map')">Map</div>
  <div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">

<div class="card">

<h2>${d.analysis}</h2>

<div style="display:flex; gap:30px;">
${gauge(d.score,"Score")}
${gauge(d.confidence,"Confidence")}
</div>

${renderExplanations(d)}

<a href="${d.pdf_report}" target="_blank">Download PDF</a>

</div>

<div class="image-row">
<div class="image-box">
<img src="${URL.createObjectURL(selectedFile)}">
</div>
<div class="image-box">
<img src="${d.heatmap}">
</div>
</div>

</div>

<div id="map" class="tab-content">
${
d.gps
? `<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${d.gps.lat},${d.gps.lon}&output=embed"></iframe>`
: "No GPS data"
}
</div>

<div id="meta" class="tab-content">
<div class="card">
${Object.entries(d.metadata.all||{}).map(([k,v])=>`${k}: ${v}<br>`).join("")}
</div>
</div>
`;
}

function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>

</body>
</html>
