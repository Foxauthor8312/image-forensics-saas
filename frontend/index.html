<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof — AI Image Forensics</title>

<link rel="icon" href="/favicon.ico?v=2">

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}

.app-header{display:flex;align-items:center;gap:12px;padding:15px;margin-bottom:20px;background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:14px}
.logo-badge{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(59,130,246,0.5)}
.logo-badge img{width:28px}
.brand-title{font-size:22px;font-weight:700}
.brand-sub{font-size:12px;opacity:.7}

.dashboard{display:grid;grid-template-columns:300px 1fr;gap:20px}
.panel{background:#1e293b;padding:20px;border-radius:12px}

.drop-zone{border:2px dashed #555;padding:40px;text-align:center;border-radius:12px;cursor:pointer}
.drop-zone.dragover{border-color:#22c55e}

.tabs{display:flex;gap:10px;margin-top:15px}
.tab{padding:6px 10px;background:#111;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:10px}

.bar{height:6px;background:#111;margin:5px 0}
.bar-fill{height:6px;background:#3b82f6}

#map{height:300px;border-radius:10px;margin-top:10px}

button{margin-top:10px;padding:6px 10px;border:none;border-radius:6px;background:#3b82f6;color:white;cursor:pointer}

.progress-bar{width:100%;height:6px;background:#111;border-radius:6px;margin:10px 0;display:none}
.progress-fill{height:100%;width:0%;background:#3b82f6;transition:width .3s}

.app-footer{margin-top:30px;padding:15px;display:flex;justify-content:space-between;background:#1e293b;border-radius:12px;font-size:12px}
.footer-sub{font-size:11px;opacity:.6}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal-content{background:#1e293b;padding:20px;border-radius:12px;max-width:600px}
.modal-close{margin-top:10px;padding:6px 10px;background:#3b82f6;border:none;border-radius:6px;color:white}
</style>
</head>

<body>
<div class="container">

<header class="app-header">
  <div class="logo-badge"><img src="/icon-192.png"></div>
  <div>
    <div class="brand-title">PixelProof</div>
    <div class="brand-sub">AI Image Forensics Engine</div>
  </div>
</header>

<div class="dashboard">
  <div class="panel">
    <div id="dropZone" class="drop-zone">Drag & Drop Image</div>
    <input type="file" id="file" hidden>
  </div>

  <div class="panel">
    <div id="status"></div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="result"></div>
  </div>
</div>

<footer class="app-footer">
  <div>
    <strong>PixelProof</strong>
    <div class="footer-sub">AI Image Forensics Engine · Results are probabilistic</div>
    <div class="footer-sub">© <span id="year"></span> PixelProof</div>
    <div class="footer-sub" style="cursor:pointer;color:#3b82f6" onclick="openModal()">Legal Disclaimer</div>
  </div>
  <div>
    <div id="buildInfo"></div>
    <div id="backendStatus">Backend: checking…</div>
  </div>
</footer>

</div>

<div id="legalModal" class="modal">
  <div class="modal-content">
    <h2>Legal Disclaimer</h2>
    <p>Results are probabilistic and not definitive forensic evidence.</p>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";

const dropZone=document.getElementById("dropZone");
const file=document.getElementById("file");
const result=document.getElementById("result");
const statusEl=document.getElementById("status");
const progressBar=document.getElementById("progressBar");
const progressFill=document.getElementById("progressFill");

dropZone.onclick=()=>file.click();

file.onchange=e=>handle(e.target.files[0]);

function handle(f){
  if(!f) return;
  window.lastFile=f;
  analyze(f);
}

async function analyze(f){
  const form=new FormData();
  form.append("image",f);

  statusEl.innerHTML="⏳ Analyzing...";
  progressBar.style.display="block";
  progressFill.style.width="10%";

  let p=10;
  const interval=setInterval(()=>{
    p+=Math.random()*10;
    if(p<90) progressFill.style.width=p+"%";
  },300);

  try{
    const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
    const data=await res.json();

    clearInterval(interval);
    progressFill.style.width="100%";
    statusEl.innerHTML="✅ Done";

    setTimeout(()=>progressBar.style.display="none",500);

    render(data.result||data);

  }catch{
    clearInterval(interval);
    statusEl.innerHTML="❌ Error";
  }
}

function render(d){
  const preview = window.lastFile
    ? `<img src="${URL.createObjectURL(window.lastFile)}" style="width:100%;margin-bottom:10px">`
    : "";

  result.innerHTML=`
    ${preview}
    <h2>${d.conclusion}</h2>
    <p>${d.analysis}</p>
  `;
}

function openModal(){document.getElementById("legalModal").style.display="flex";}
function closeModal(){document.getElementById("legalModal").style.display="none";}

document.getElementById("year").innerText=new Date().getFullYear();
document.getElementById("buildInfo").innerText="Build: "+new Date().toLocaleDateString();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
