<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1000px; margin:auto; padding:20px; }

button {
  padding:10px 20px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

.tabs { display:flex; gap:10px; margin-top:20px; }
.tab { padding:10px; background:#334155; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:15px; margin-top:10px; }

.image-row { display:flex; gap:10px; flex-wrap:wrap; }
.image-box { flex:1 1 48%; }

.image-box img {
  width:100%;
  max-height:400px;
  object-fit:contain;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<br>
<button id="analyzeBtn">Analyze</button>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";
let selectedFile = null;

// -----------------------------
// FILE SELECT
// -----------------------------
document.getElementById("file").addEventListener("change", function(e){
  selectedFile = e.target.files[0];
  console.log("📁 Selected:", selectedFile);
});

// -----------------------------
// BUTTON CLICK
// -----------------------------
document.getElementById("analyzeBtn").addEventListener("click", upload);

// -----------------------------
// RESIZE IMAGE (🔥 FIX)
// -----------------------------
function resizeImage(file){
  return new Promise((resolve) => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;
    reader.readAsDataURL(file);

    img.onload = () => {

      const canvas = document.createElement("canvas");

      const MAX = 1200;
      let w = img.width;
      let h = img.height;

      if(w > MAX || h > MAX){
        if(w > h){
          h *= MAX / w;
          w = MAX;
        } else {
          w *= MAX / h;
          h = MAX;
        }
      }

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);

      canvas.toBlob(blob => {
        resolve(new File([blob], file.name, {type:"image/jpeg"}));
      }, "image/jpeg", 0.7);
    };
  });
}

// -----------------------------
// UPLOAD
// -----------------------------
async function upload(){

  if(!selectedFile){
    alert("Select a file first");
    return;
  }

  document.getElementById("result").innerHTML = "Processing...";

  try {

    // 🔥 Resize before upload
    const resizedFile = await resizeImage(selectedFile);
    console.log("📦 Resized file:", resizedFile);

    const form = new FormData();
    form.append("image", resizedFile);

    await fetch(API + "/health").catch(()=>{});

    const res = await fetch(API + "/api/analyze", {
      method: "POST",
      body: form
    });

    console.log("Status:", res.status);

    const data = await res.json();
    console.log("Response:", data);

    if(data.status === "done"){
      render(data.result);
    } else {
      document.getElementById("result").innerHTML = "Error: " + data.error;
    }

  } catch(err){
    console.error(err);
    document.getElementById("result").innerHTML = "Connection failed";
  }
}

// -----------------------------
// RENDER
// -----------------------------
function render(data){

document.getElementById("result").innerHTML = `

<h3>${data.message}</h3>

<div class="tabs">
  <div class="tab active" onclick="tab(event,'r')">Results</div>
  <div class="tab" onclick="tab(event,'map')">Map</div>
  <div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">

<div class="card">
  <h2>${data.analysis}</h2>

  <p><b>Score:</b> ${data.score}</p>
  <p><b>Confidence:</b> ${data.confidence}%</p>

  <p style="margin-top:10px;">
    <b>Explanation:</b><br>
    <span style="opacity:0.85;">${data.explanation}</span>
  </p>
</div>

<div class="image-row">

<div class="image-box">
<p><b>Original</b></p>
<img src="${URL.createObjectURL(selectedFile)}">
</div>

<div class="image-box">
<p><b>Heatmap</b></p>
${
data.heatmap
? `<img src="${data.heatmap}">`
: `<p>No heatmap</p>`
}
</div>

</div>

</div>

<div id="map" class="tab-content">
${
data.gps
? `<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed"></iframe>`
: "<p>No GPS data</p>"
}
</div>

<div id="meta" class="tab-content">
<div class="card">
${
data.metadata?.available
? Object.entries(data.metadata.all).map(([k,v])=>`<p>${k}: ${v}</p>`).join("")
: "<p>No metadata</p>"
}
</div>
</div>
`;
}

// -----------------------------
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>

</body>
</html>
