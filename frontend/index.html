<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelProof</title>

<style>
body {
  background:#0a0f1a;
  color:#e5e7eb;
  font-family:-apple-system,Segoe UI;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  text-align:center;
  max-width:400px;
}

button {
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  font-size:16px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #374151;
  background:#111827;
  color:white;
}

.small {
  font-size:13px;
  color:#9ca3af;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof</h1>

<div class="small">
You have <span id="remaining"></span> free analyses remaining
</div>

<button onclick="startAnalysis()">Start Analysis</button>

<div class="small">Enter override code</div>
<input id="codeInput" placeholder="Enter code">
<button onclick="applyCode()">Apply Code</button>

</div>

<script>

const MAX_FREE = 3;

function getUsage(){
  return parseInt(localStorage.getItem("usage") || "0");
}

function updateDisplay(){
  const used = getUsage();
  document.getElementById("remaining").innerText = Math.max(0, MAX_FREE - used);
}

function startAnalysis(){

  const used = getUsage();
  const override = localStorage.getItem("override");

  if(used >= MAX_FREE && !override){
    alert("Free limit reached. Enter override code.");
    return;
  }

  localStorage.setItem("usage", used + 1);
  window.location.href = "analyze.html";
}

function applyCode(){

  const code = document.getElementById("codeInput").value;

  // CHANGE THIS CODE ANYTIME
  if(code === "PIXELVIP"){
    localStorage.setItem("override", "true");
    alert("Override activated");
  } else {
    alert("Invalid code");
  }
}

updateDisplay();

</script>
<script>
const MAX_FREE = 3;

function getUsage(){
  return parseInt(localStorage.getItem("usage") || "0");
}

function updateUsageDisplay(){
  const el = document.getElementById("usageDisplay");
  if(!el) return;

  const remaining = Math.max(0, MAX_FREE - getUsage());
  el.innerText = `You have ${remaining} free analyses remaining`;
}

function trackUsage(){
  const used = getUsage();
  localStorage.setItem("usage", used + 1);
}

function checkAccess(){
  const used = getUsage();
  const override = localStorage.getItem("override");

  if(used >= MAX_FREE && !override){
    alert("Free limit reached. Enter override code.");
    return false;
  }

  trackUsage();
  return true;
}

function applyOverride(){
  const code = document.getElementById("overrideInput").value;

  if(code === "PIXELVIP"){
    localStorage.setItem("override", "true");
    alert("Override activated");
    updateUsageDisplay();
  } else {
    alert("Invalid code");
  }
}

window.onload = updateUsageDisplay;
</script>
</body>
</html>
