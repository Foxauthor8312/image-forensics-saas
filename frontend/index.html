<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 40px;
}

.header img {
  height: 36px;
}

.header span {
  font-weight: 500;
  font-size: 18px;
  letter-spacing: 0.3px;
  opacity: 0.9;
}

/* LAYOUT */
.wrapper {
  display: grid;
  grid-template-columns: 420px 1fr;
  min-height: calc(100vh - 60px);
}

/* LEFT PANEL */
.left {
  padding: 40px;
}

.tagline {
  font-size: 20px;
  color: #9ca3af;
  margin-bottom: 20px;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  padding: 8px 14px;
  border-radius: 6px;
  background: #1f2937;
  cursor: pointer;
}

.tab.active {
  background: #2563eb;
}

/* UPLOAD BOX */
.upload {
  border: 2px dashed #374151;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.upload:hover {
  border-color: #60a5fa;
}

input {
  display: none;
}

/* RIGHT PANEL */
.right {
  background: #111827;
  padding: 40px;
}

/* RESULT */
.card {
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.green { background: #064e3b; }
.yellow { background: #78350f; }
.red { background: #7f1d1d; }

/* IMAGE */
.viewer {
  position: relative;
}

.viewer img {
  width: 100%;
  border-radius: 8px;
}

#elaOverlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  mix-blend-mode: difference;
  pointer-events: none;
}

/* ACTIONS */
.actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  background: #1f2937;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #374151;
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 13px;
  color: #6b7280;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <span>PixelProof</span>
</div>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<div class="tagline">
Verify if an image is original, recompressed, or edited.
</div>

<div class="tabs">
  <div class="tab active" onclick="setMode('upload')">Upload</div>
  <div class="tab" onclick="setMode('camera')">Take Photo</div>
</div>

<label class="upload" id="uploadBox">
  <input type="file" id="file">
  <strong>Select an image</strong><br>
  <span style="color:#9ca3af;font-size:13px;">
    JPG or PNG • Instant analysis
  </span>
</label>

<video id="camera" autoplay style="display:none;width:100%;border-radius:8px;"></video>
<button id="captureBtn" style="display:none;margin-top:10px;">Capture</button>

</div>

<!-- RIGHT -->
<div class="right">

<div id="resultCard" class="card"></div>

<div class="viewer">
  <img id="originalImage">
  <img id="elaOverlay">
</div>

<div class="actions">
  <button onclick="downloadOriginal()">Download Image</button>
  <button onclick="downloadOverlay()">Download Heatmap</button>
</div>

<div class="footer">
Heatmap highlights compression differences. Brighter regions may indicate changes.
</div>

</div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

let currentOverlay = null;
let currentImage = null;

function setMode(mode) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  if (mode === 'upload') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('uploadBox').style.display = 'block';
    document.getElementById('camera').style.display = 'none';
    document.getElementById('captureBtn').style.display = 'none';
  }

  if (mode === 'camera') {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('uploadBox').style.display = 'none';

    const video = document.getElementById('camera');
    video.style.display = 'block';
    document.getElementById('captureBtn').style.display = 'block';

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => video.srcObject = stream);
  }
}

function interpret(type) {
  if (type === "Likely Original") {
    return {
      color: "green",
      message: "No evidence of manipulation detected. Image structure is consistent."
    };
  }
  if (type === "Recompressed") {
    return {
      color: "yellow",
      message: "Image has been resaved or shared. Compression artifacts present but not necessarily edits."
    };
  }
  if (type === "Edited") {
    return {
      color: "red",
      message: "Compression inconsistencies suggest possible image modification."
    };
  }
  return {
    color: "yellow",
    message: "Analysis inconclusive."
  };
}

async function analyze(file) {

  currentImage = URL.createObjectURL(file);
  document.getElementById("originalImage").src = currentImage;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const conf = Math.round((data.classification?.confidence || 0.5) * 100);
  const ui = interpret(type);

  const card = document.getElementById("resultCard");
  card.className = "card " + ui.color;

  card.innerHTML = `
    <h2>${type}</h2>
    <p>${ui.message}</p>
    <p><strong>Confidence:</strong> ${conf}%</p>
  `;

  if (data.ela && data.ela.overlay) {
    currentOverlay = data.ela.overlay;
    document.getElementById("elaOverlay").src = currentOverlay;
  }
}

document.getElementById("file").onchange = (e) => {
  analyze(e.target.files[0]);
};

document.getElementById("captureBtn").onclick = () => {
  const video = document.getElementById('camera');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  canvas.toBlob(blob => analyze(new File([blob], "capture.jpg")));
};

function downloadOriginal() {
  if (!currentImage) return;
  const a = document.createElement('a');
  a.href = currentImage;
  a.download = "image.jpg";
  a.click();
}

function downloadOverlay() {
  if (!currentOverlay) return;
  const a = document.createElement('a');
  a.href = currentOverlay;
  a.download = "heatmap.jpg";
  a.click();
}
</script>

</body>
</html>
