<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: Arial, sans-serif;
  background: #000000;
  color: #ffffff;
  margin: 0;
  padding: 20px;
  text-align: center;
}

/* HERO */
.hero {
  max-width: 700px;
  margin: 80px auto;
}

/* 🔥 BIGGER LOGO */
.logo {
  width: 260px;
  max-width: 90%;
  margin-bottom: 30px;
}

/* TITLE */
h1 {
  font-size: 2.2rem;
  margin-bottom: 14px;
  font-weight: 600;
}

/* TEXT */
p {
  color: #e5e7eb;
  line-height: 1.6;
  margin-bottom: 12px;
}

/* CTA */
.cta {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 26px;
  background: #334155;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 1rem;
  transition: 0.2s;
}

.cta:hover {
  background: #475569;
}
</style>
</head>

<body>

<div class="hero">

  <!-- ✅ CLEAN LOGO (no box, bigger) -->
  <img src="logo.png" class="logo" />

  <h1>Know if an image is real.</h1>

  <p>
    PixelProof analyzes compression artifacts and metadata to detect edits,
    recompression, and authenticity.
  </p>

  <p>
    Upload an image and get a clear forensic breakdown of what was found.
  </p>

  <!-- CTA -->
  <a href="analyze.html" class="cta">
    Analyze Image
  </a>

</div>

</body>
</html>
