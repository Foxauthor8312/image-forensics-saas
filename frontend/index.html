<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:900px; margin:auto; padding:20px; }
.drop { border:2px dashed #334155; padding:40px; text-align:center; cursor:pointer; }
.loading { text-align:center; margin-top:20px; color:#94a3b8; }
.error { color:#f87171; text-align:center; }
.badge { background:#334155; padding:5px; margin:5px; display:inline-block; }
</style>
</head>

<body>
<div class="container">
<h1>PixelProof 🔍</h1>

<div class="drop" id="drop">
Click or Drop Image
<input type="file" id="file" hidden>
</div>

<button onclick="upload()">Analyze</button>
<div id="result"></div>

</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;

document.getElementById("drop").onclick = () => file.click();

file.onchange = e => {
  selectedFile = e.target.files[0];
};

async function upload() {
  if (!selectedFile) return alert("Select file");

  const result = document.getElementById("result");
  result.innerHTML = "<div class='loading'>Starting...</div>";

  // wake backend first
  try { await fetch(API + "/health"); } catch {}

  const form = new FormData();
  form.append("image", selectedFile);

  try {
    const res = await fetch(API + "/api/analyze", {
      method: "POST",
      body: form
    });

    const data = await res.json();
    poll(data.job_id);

  } catch {
    result.innerHTML = "<div class='error'>Backend unavailable</div>";
  }
}

function poll(id) {
  const result = document.getElementById("result");

  const interval = setInterval(async () => {
    const res = await fetch(API + "/api/status/" + id);
    const d = await res.json();

    if (d.status === "processing") {
      result.innerHTML = `<div class='loading'>${d.step}</div>`;
    }

    if (d.status === "done") {
      clearInterval(interval);

      result.innerHTML = `
        <div>
          <span class="badge">Score: ${d.result.score}</span>
          <span class="badge">Confidence: ${d.result.confidence}%</span>
          <span class="badge">${d.result.ela_result}</span>
        </div>

        <p>${d.result.score_explanation}</p>
        <p>${d.result.confidence_explanation}</p>

        <h3>Conclusion</h3>
        <p>${d.result.legal_conclusion}</p>

        <h3>Interpretation</h3>
        ${d.result.interpretation.map(i => `<p>• ${i}</p>`).join("")}

        <img src="${d.result.ela_image}">
      `;
    }

    if (d.status === "error") {
      clearInterval(interval);
      result.innerHTML = `<div class='error'>${d.error}</div>`;
    }

  }, 1500);
}
</script>
</body>
</html>
