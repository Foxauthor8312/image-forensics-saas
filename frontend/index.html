<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 10px;
}

.green { background: #1e3d2f; }
.yellow { background: #4a3f1e; }
.red { background: #4a1e1e; }

img {
  max-width: 100%;
  margin-top: 20px;
  border: 2px solid #444;
}
</style>
</head>

<body>

<h2>PixelProof</h2>

<input type="file" id="file">

<div id="resultCard" class="card"></div>

<img id="elaImage">

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function interpret(type) {
  if (type === "Likely Original") {
    return {
      color: "green",
      message: "This appears to be an original camera image with no signs of manipulation."
    };
  }

  if (type === "Recompressed") {
    return {
      color: "yellow",
      message: "This image was likely saved, downloaded, or shared again. Not necessarily edited."
    };
  }

  if (type === "Edited") {
    return {
      color: "red",
      message: "This image shows strong signs of possible modification."
    };
  }

  return {
    color: "yellow",
    message: "This image has mixed signals. Interpretation is uncertain."
  };
}

document.getElementById("file").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification.type;
  const conf = Math.round(data.classification.confidence * 100);

  const ui = interpret(type);

  const card = document.getElementById("resultCard");

  card.className = "card " + ui.color;

  card.innerHTML = `
    <h2>${type}</h2>
    <p>${ui.message}</p>
    <p><strong>Confidence:</strong> ${conf}%</p>
  `;

  if (data.ela && data.ela.overlay) {
    document.getElementById("elaImage").src = data.ela.overlay;
  }
};
</script>

</body>
</html>
