<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0f172a;color:white;font-family:system-ui;}
.container{max-width:1100px;margin:auto;padding:20px;}
button{padding:10px;background:#3b82f6;border:none;color:white;margin:5px;border-radius:6px;}

.tabs{display:flex;gap:10px;margin-top:20px;}
.tab{padding:10px;background:#1e293b;border-radius:6px;cursor:pointer;}
.tab.active{background:#3b82f6;}
.tab-content{display:none;margin-top:20px;}
.tab-content.active{display:block;}

.image-row{display:flex;gap:15px;flex-wrap:wrap;}
.image-box{flex:1 1 48%;}
.image-box img{width:100%;max-height:400px;object-fit:contain;}

#map{height:400px;}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<button onclick="capturePhoto()">📷 Capture</button>
<button onclick="analyzeImage()" style="background:#22c55e;">Analyze</button>

<div id="result"></div>

</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";
let selectedFile=null,gps=null,metadata={};

file.onchange=e=>{
selectedFile=e.target.files[0];
EXIF.getData(selectedFile,function(){
metadata=EXIF.getAllTags(this);
});
};

async function getDeviceLocation(){
return new Promise(r=>{
navigator.geolocation.getCurrentPosition(p=>r({
lat:p.coords.latitude,
lon:p.coords.longitude,
accuracy:p.coords.accuracy
}),()=>r(null));
});
}

async function capturePhoto(){
const stream=await navigator.mediaDevices.getUserMedia({video:true});
const video=document.createElement("video");
video.srcObject=stream;video.play();

const canvas=document.createElement("canvas");

setTimeout(()=>{
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

canvas.toBlob(async blob=>{
selectedFile=new File([blob],"capture.jpg");
gps=await getDeviceLocation();
alert("Captured. Tap Analyze.");
});

stream.getTracks().forEach(t=>t.stop());
},2000);
}

async function analyzeImage(){

if(!selectedFile) return alert("Select image");

const form=new FormData();
form.append("image",selectedFile);
form.append("metadata",JSON.stringify(metadata));

if(!gps) gps=await getDeviceLocation();
form.append("gps",JSON.stringify(gps));

const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
const data=await res.json();

render(data.result);
}

function render(d){

document.getElementById("result").innerHTML=`

<div class="tabs">
<div class="tab active" onclick="tab(event,'r')">Results</div>
<div class="tab" onclick="tab(event,'mapTab')">Map</div>
<div class="tab" onclick="tab(event,'aboutTab')">About</div>
</div>

<div id="r" class="tab-content active">
<h2>${d.analysis}</h2>

<p>${d.simple_explanation}</p>

<div class="image-row">
<div class="image-box"><img src="${URL.createObjectURL(selectedFile)}"></div>
<div class="image-box"><img src="${d.heatmap}"></div>
</div>

<a href="${d.pdf_report}" target="_blank">Download PDF</a>
</div>

<div id="mapTab" class="tab-content"><div id="map"></div></div>

<div id="aboutTab" class="tab-content">
<p>PixelProof - Digital Image Forensics Tool</p>
<p>Barry Mattison-Off Road Artist Photography</p>
</div>
`;

setTimeout(()=>initMap(d.gps),200);
}

function initMap(gps){
if(!gps) return;

const map=L.map('map').setView([gps.lat,gps.lon],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([gps.lat,gps.lon]).addTo(map);

if(gps.accuracy){
L.circle([gps.lat,gps.lon],{radius:gps.accuracy}).addTo(map);
}
}

function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>

<!-- YOUR EXACT FOOTER -->
<div style="
  margin-top:40px;
  padding-top:15px;
  border-top:1px solid #1e293b;
  font-size:12px;
  opacity:0.7;
  text-align:center;
">
  PixelProof © 2026 Barry Mattison-Off Road Artist Photography<br>
  Digital Image Forensics Tool
</div>

</body>
</html>
