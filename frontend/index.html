<!DOCTYPE html>
<html>
<head>
  <title>PixelProof</title>

  <style>
    body {
      font-family: system-ui, Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 { text-align: center; }

    .drop {
      border: 2px dashed #334155;
      padding: 40px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 6px;
      margin-top: 15px;
      cursor: pointer;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .tab {
      padding: 10px;
      background: #334155;
      border-radius: 6px;
      cursor: pointer;
    }

    .tab.active { background: #3b82f6; }

    .tab-content { display: none; margin-top: 20px; }
    .tab-content.active { display: block; }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row div {
      flex: 1 1 45%;
      min-width: 250px;
    }

    img {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      border-radius: 6px;
    }

    pre {
      background: #020617;
      padding: 10px;
      border-radius: 6px;
      max-height: 300px;
      overflow: auto;
      font-size: 12px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      margin: 5px;
      background: #334155;
      border-radius: 6px;
    }

    .loading {
      text-align: center;
      margin-top: 20px;
      color: #94a3b8;
    }

    .bar {
      background: #1e293b;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .bar-inner {
      background: #3b82f6;
      height: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>PixelProof 🔍</h1>

  <div class="drop" id="drop">
    Drag & Drop Image or Click to Upload
    <input type="file" id="file" hidden>
  </div>

  <button onclick="upload()">Analyze Image</button>

  <div id="result"></div>
</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;

// FIXED FILE INPUT HANDLING
const drop = document.getElementById("drop");
const fileInput = document.getElementById("file");

drop.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
  selectedFile = e.target.files[0];
  drop.innerHTML = selectedFile.name;
};

drop.ondragover = (e) => {
  e.preventDefault();
  drop.style.borderColor = "#3b82f6";
};

drop.ondragleave = () => {
  drop.style.borderColor = "#334155";
};

drop.ondrop = (e) => {
  e.preventDefault();
  selectedFile = e.dataTransfer.files[0];
  drop.innerHTML = selectedFile.name;
};

// UPLOAD (ASYNC)
async function upload() {
  if (!selectedFile) return alert("Select a file");

  const result = document.getElementById("result");
  result.innerHTML = "<div class='loading'>Analyzing image...</div>";

  const form = new FormData();
  form.append("image", selectedFile);

  try {
    const res = await fetch(API + "/api/analyze", {
      method: "POST",
      body: form
    });

    const { job_id } = await res.json();

    checkStatus(job_id);

  } catch (err) {
    result.innerHTML = "<div class='loading'>Error starting analysis</div>";
  }
}

// POLLING
async function checkStatus(id) {
  const result = document.getElementById("result");

  const interval = setInterval(async () => {
    try {
      const res = await fetch(API + "/api/status/" + id);
      const data = await res.json();

      if (data.status === "done") {
        clearInterval(interval);
        render(data.result);
      }

      if (data.status === "error") {
        clearInterval(interval);
        result.innerHTML = "Error: " + data.error;
      }

    } catch {
      clearInterval(interval);
      result.innerHTML = "Connection error";
    }
  }, 1500);
}

// RENDER
function render(data) {
  const original = URL.createObjectURL(selectedFile);

  document.getElementById("result").innerHTML = `
  <div>

    <div>
      <span class="badge">Score: ${data.score}</span>
      <span class="badge">Confidence: ${data.confidence}%</span>
      <span class="badge">${data.ela_result}</span>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="openTab(event,'results')">Results</div>
      <div class="tab" onclick="openTab(event,'heatmap')">Heatmap</div>
      <div class="tab" onclick="openTab(event,'metadata')">Metadata</div>
      <div class="tab" onclick="openTab(event,'explanation')">Explanation</div>
    </div>

    <div id="results" class="tab-content active">
      <div class="row">
        <div><img src="${original}"></div>
        <div><img src="${data.ela_image}"></div>
      </div>
    </div>

    <div id="heatmap" class="tab-content">
      <img src="${data.heatmap}">
    </div>

    <div id="metadata" class="tab-content">
      <pre>${JSON.stringify(data.metadata, null, 2)}</pre>
    </div>

    <div id="explanation" class="tab-content">
      ${data.explanation.map(e => `<p>• ${e}</p>`).join("")}

      <h3>Confidence Breakdown</h3>
      ${bar("ELA", data.confidence_breakdown.ela)}
      ${bar("Noise", data.confidence_breakdown.noise)}
      ${bar("Sharpness", data.confidence_breakdown.sharpness)}
      ${bar("Metadata", data.confidence_breakdown.metadata_bonus)}
    </div>

  </div>
  `;
}

// TABS
function openTab(evt, name) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  document.getElementById(name).classList.add("active");
  evt.target.classList.add("active");
}

// BAR RENDER
function bar(label, value) {
  return `
    <div>${label}: ${value}</div>
    <div class="bar">
      <div class="bar-inner" style="width:${value}%"></div>
    </div>
  `;
}
</script>

</body>
</html>
