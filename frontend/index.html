<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<div id="installHelp" style="margin-top:10px; opacity:0.8;"></div>
  
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

button {
  padding:10px 16px;
  background:#3b82f6;
  border:none;
  border-radius:6px;
  color:white;
  margin-right:10px;
}

#installBtn { display:none; background:#22c55e; }

/* progress */
#progress-container { display:none; margin-top:15px; }
.progress-bar { width:100%; height:8px; background:#1e293b; border-radius:5px; overflow:hidden; }
.progress-fill { height:100%; width:0%; background:#3b82f6; transition:0.4s; }

/* tabs */
.tabs { display:flex; gap:10px; margin-top:20px; }
.tab { padding:10px; background:#1e293b; border-radius:6px; cursor:pointer; }
.tab.active { background:#3b82f6; }
.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

/* card */
.card { background:#020617; padding:18px; border-radius:10px; margin-top:15px; }

/* images */
.image-row { display:flex; gap:15px; flex-wrap:wrap; margin-top:20px; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:420px; object-fit:contain; }

/* gauge */
.gauge { width:120px; height:120px; position:relative; }
.gauge svg { transform:rotate(-90deg); }
.gauge-text {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<button id="installBtn">Install App</button>

<br><br>

<input type="file" id="file" accept="image/*">
<button onclick="upload()">Upload Image</button>

<button onclick="capturePhoto()">📷 Capture Photo</button>

<div id="progress-container">
  <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
  <p id="status">Preparing...</p>
</div>

<div id="result"></div>

</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null;
let metadata={};
let gps=null;

/* INSTALL */
let deferredPrompt;
const installBtn=document.getElementById("installBtn");

window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt=e;
  installBtn.style.display="inline-block";
});

installBtn.onclick=async()=>{
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  installBtn.style.display="none";
};

/* SERVICE WORKER */
if ('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
}

/* FILE INPUT */
file.onchange=e=>{
  selectedFile=e.target.files[0];

  EXIF.getData(selectedFile,function(){
    metadata=EXIF.getAllTags(this);
  });
};

/* CAMERA MODE */
async function capturePhoto(){

  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:true});

    const video = document.createElement("video");
    video.srcObject = stream;
    video.play();

    const overlay = document.createElement("div");
    overlay.style.position="fixed";
    overlay.style.top=0;
    overlay.style.left=0;
    overlay.style.width="100%";
    overlay.style.height="100%";
    overlay.style.background="#000";
    overlay.style.zIndex=9999;
    overlay.appendChild(video);

    const btn=document.createElement("button");
    btn.innerText="Capture";
    btn.style.position="absolute";
    btn.style.bottom="20px";
    btn.style.left="50%";
    btn.style.transform="translateX(-50%)";

    overlay.appendChild(btn);
    document.body.appendChild(overlay);

    btn.onclick=async()=>{
      const canvas=document.createElement("canvas");
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      canvas.getContext("2d").drawImage(video,0,0);

      canvas.toBlob(blob=>{
        selectedFile=new File([blob],"capture.jpg",{type:"image/jpeg"});
      });

      stream.getTracks().forEach(t=>t.stop());
      document.body.removeChild(overlay);

      gps = await getDeviceLocation();

      alert("Photo captured. Now press Upload Image.");
    };

  }catch(e){
    alert("Camera not available");
  }
}

/* GPS fallback */
function getDeviceLocation(){
  return new Promise(resolve=>{
    if(!navigator.geolocation) return resolve(null);

    navigator.geolocation.getCurrentPosition(
      pos=>resolve({lat:pos.coords.latitude,lon:pos.coords.longitude}),
      ()=>resolve(null)
    );
  });
}

/* progress */
function setProgress(p,t){
  document.getElementById("progress-fill").style.width=p+"%";
  document.getElementById("status").innerText=t;
}

/* GAUGE */
function gauge(v,label){
  const r=50,c=2*Math.PI*r;
  const o=c-(v/100)*c;
  const color=v>70?"#22c55e":v>40?"#f59e0b":"#ef4444";

  return `
  <div>
    <div class="gauge">
      <svg width="120" height="120">
        <circle cx="60" cy="60" r="${r}" stroke="#1e293b" stroke-width="10" fill="none"/>
        <circle cx="60" cy="60" r="${r}" stroke="${color}" stroke-width="10"
          stroke-dasharray="${c}" stroke-dashoffset="${o}" fill="none"/>
      </svg>
      <div class="gauge-text">${v}</div>
    </div>
    <div style="text-align:center">${label}</div>
  </div>`;
}

/* LOCKED EXPLANATIONS */
function renderExplanations(d){
  return `
  <hr>
  <p><b>Summary:</b><br>${d.simple_explanation}</p>
  <p><b>Technical:</b><br>${d.technical_explanation}</p>
  <p><b>Conclusion:</b><br>${d.legal_explanation}</p>
  <p><b>Confidence:</b><br>${d.confidence_note}</p>
  `;
}

/* UPLOAD */
async function upload(){

  if(!selectedFile) return alert("Select or capture image");

  const progress=document.getElementById("progress-container");
  progress.style.display="block";

  setProgress(20,"Preparing...");

  let finalGPS = gps || await getDeviceLocation();

  const form=new FormData();
  form.append("image",selectedFile);
  form.append("metadata",JSON.stringify(metadata));
  form.append("gps",JSON.stringify(finalGPS));

  setProgress(50,"Uploading...");

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});

  setProgress(80,"Analyzing...");

  const data=await res.json();

  setProgress(100,"Done");

  render(data.result);
}

/* RENDER */
function render(d){

document.getElementById("result").innerHTML=`

<div class="tabs">
  <div class="tab active" onclick="tab(event,'r')">Results</div>
  <div class="tab" onclick="tab(event,'map')">Map</div>
  <div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">

<div class="card">

<h2>${d.analysis}</h2>

<div style="display:flex; gap:30px;">
${gauge(d.score,"Score")}
${gauge(d.confidence,"Confidence")}
</div>

${renderExplanations(d)}

<a href="${d.pdf_report}" target="_blank">Download PDF</a>

</div>

<div class="image-row">
<div class="image-box"><img src="${URL.createObjectURL(selectedFile)}"></div>
<div class="image-box"><img src="${d.heatmap}"></div>
</div>

</div>

<div id="map" class="tab-content">
${
d.gps
? `<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${d.gps.lat},${d.gps.lon}&output=embed"></iframe>`
: "No GPS data"
}
</div>

<div id="meta" class="tab-content">
<div class="card">
${Object.entries(d.metadata.all||{}).map(([k,v])=>`${k}: ${v}<br>`).join("")}
</div>
</div>
`;
}

function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>

</body>
</html>
