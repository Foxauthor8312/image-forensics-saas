<!DOCTYPE html>
<html>
<head>
  <title>PixelProof</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: system-ui, Arial; background:#0f172a; color:white; margin:0; }
    .container { max-width:1000px; margin:40px auto; padding:20px; }
    h1 { text-align:center; }

    .drop {
      border:2px dashed #334155;
      padding:40px;
      text-align:center;
      border-radius:10px;
      cursor:pointer;
      margin-top:20px;
    }

    button {
      padding:10px 20px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      margin-top:15px;
      cursor:pointer;
    }

    .tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
    .tab { padding:10px; background:#334155; border-radius:6px; cursor:pointer; }
    .tab.active { background:#3b82f6; }

    .tab-content { display:none; margin-top:20px; }
    .tab-content.active { display:block; }

    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .row div { flex:1 1 45%; min-width:250px; }

    img { width:100%; max-height:400px; object-fit:contain; border-radius:6px; }

    pre {
      background:#020617;
      padding:10px;
      border-radius:6px;
      max-height:300px;
      overflow:auto;
      font-size:12px;
    }

    .badge {
      display:inline-block;
      padding:5px 10px;
      margin:5px;
      background:#334155;
      border-radius:6px;
    }

    .bar { background:#1e293b; border-radius:6px; margin-bottom:10px; }
    .bar-inner { background:#3b82f6; height:10px; border-radius:6px; }

    .loading { text-align:center; margin-top:20px; color:#94a3b8; }

    .legal-box {
      background:#020617;
      padding:15px;
      border-radius:8px;
      border-left:4px solid #3b82f6;
      margin-top:15px;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>PixelProof 🔍</h1>

  <div class="drop" id="drop">
    Drag & Drop Image or Click to Upload
    <input type="file" id="file" hidden>
  </div>

  <button onclick="upload()">Analyze Image</button>
  <button id="pdfBtn" style="display:none;" onclick="downloadPDF()">Download Report</button>

  <div id="result"></div>
</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;
let mapInstance = null;

// Upload handling
const drop = document.getElementById("drop");
const fileInput = document.getElementById("file");

drop.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
  selectedFile = e.target.files[0];
  drop.innerHTML = selectedFile.name;
};

drop.ondragover = (e) => {
  e.preventDefault();
  drop.style.borderColor = "#3b82f6";
};

drop.ondragleave = () => {
  drop.style.borderColor = "#334155";
};

drop.ondrop = (e) => {
  e.preventDefault();
  selectedFile = e.dataTransfer.files[0];
  drop.innerHTML = selectedFile.name;
};

// Upload
async function upload() {
  if (!selectedFile) return alert("Select a file");

  document.getElementById("result").innerHTML =
    "<div class='loading'>Analyzing image...</div>";

  const form = new FormData();
  form.append("image", selectedFile);

  try {
    const res = await fetch(API + "/api/analyze", {
      method: "POST",
      body: form
    });

    const data = await res.json();
    poll(data.job_id);

  } catch {
    document.getElementById("result").innerHTML =
      "<div class='loading'>Error starting analysis</div>";
  }
}

// Polling
function poll(id) {
  const interval = setInterval(async () => {
    const res = await fetch(API + "/api/status/" + id);
    const d = await res.json();

    if (d.status === "done") {
      clearInterval(interval);
      window.currentJobId = id;
      render(d.result);
    }

    if (d.status === "error") {
      clearInterval(interval);
      document.getElementById("result").innerHTML = "Error: " + d.error;
    }
  }, 1500);
}

// Render
function render(data) {
  const original = URL.createObjectURL(selectedFile);
  document.getElementById("pdfBtn").style.display = "block";

  document.getElementById("result").innerHTML = `
  <div>

    <div>
      <span class="badge">Score: ${data.score}</span>
      <span class="badge">Confidence: ${data.confidence}%</span>
      <span class="badge">${data.ela_result}</span>
    </div>

    <p><b>Score Meaning:</b> ${data.score_explanation}</p>
    <p><b>Confidence Meaning:</b> ${data.confidence_explanation}</p>

    <div class="legal-box">
      <h3>Legal Conclusion</h3>
      <p>${data.legal_conclusion}</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="openTab(event,'results')">Results</div>
      <div class="tab" onclick="openTab(event,'heatmap')">Heatmap</div>
      <div class="tab" onclick="openTab(event,'metadata')">Metadata</div>
      <div class="tab" onclick="openTab(event,'explanation')">Explanation</div>
      <div class="tab" onclick="openTab(event,'map')">Map</div>
    </div>

    <div id="results" class="tab-content active">
      <div class="row">
        <div><img src="${original}"></div>
        <div><img src="${data.ela_image}"></div>
      </div>
    </div>

    <div id="heatmap" class="tab-content">
      <img src="${data.heatmap}">
    </div>

    <div id="metadata" class="tab-content">
      <pre>${JSON.stringify(data.metadata, null, 2)}</pre>
    </div>

    <div id="explanation" class="tab-content">
      <h3>Risk Level: ${data.risk_level}</h3>
      <p>${data.narrative}</p>
      <p><b>Justification:</b> ${data.justification}</p>

      ${bar("ELA", data.confidence_breakdown.ela)}
      ${bar("Noise", data.confidence_breakdown.noise)}
      ${bar("Sharpness", data.confidence_breakdown.sharpness)}
      ${bar("Metadata", data.confidence_breakdown.metadata_bonus)}
    </div>

    <div id="map" class="tab-content">
      <div id="mapBox" style="height:400px;border-radius:8px;"></div>
      <p id="mapMsg"></p>
    </div>

  </div>
  `;

  renderMap(data.gps);
}

// Tabs
function openTab(evt, name) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  document.getElementById(name).classList.add("active");
  evt.target.classList.add("active");

  setTimeout(() => {
    if (mapInstance) mapInstance.invalidateSize();
  }, 200);
}

// Bars
function bar(label, value) {
  return `
    <div>${label}: ${value}</div>
    <div class="bar">
      <div class="bar-inner" style="width:${value}%"></div>
    </div>
  `;
}

// Map
function renderMap(gps) {
  const msg = document.getElementById("mapMsg");

  if (!gps) {
    msg.innerHTML = "No GPS data found.";
    return;
  }

  if (mapInstance) mapInstance.remove();

  mapInstance = L.map("mapBox").setView(gps, 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(mapInstance);

  const icon = L.divIcon({
    html: `<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>`
  });

  L.marker(gps, { icon }).addTo(mapInstance);

  msg.innerHTML = `Lat: ${gps[0]}, Lon: ${gps[1]}`;
}

// PDF
async function downloadPDF() {
  const res = await fetch(API + "/api/report/" + window.currentJobId);
  const data = await res.json();

  if (data.report) {
    window.open(data.report);
  } else {
    alert("Failed to generate report");
  }
}
</script>

</body>
</html>
