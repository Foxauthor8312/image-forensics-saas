<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="icon" href="/favicon.ico?v=2">

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}

/* HEADER */
.app-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  margin-bottom:20px;
  background:linear-gradient(145deg,#1e293b,#0f172a);
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo img{
  width:44px;
  height:44px;
  border-radius:10px;
}

.brand{
  display:flex;
  flex-direction:column;
}

.title{font-size:22px;font-weight:600}
.subtitle{font-size:12px;opacity:0.6}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:20px;
}

.panel{
  background:#1e293b;
  border-radius:12px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* DROP ZONE */
.drop-zone{
  border:2px dashed rgba(255,255,255,0.2);
  border-radius:12px;
  padding:40px 20px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
  position:relative;
  z-index:5;
}

.drop-zone:hover{
  border-color:#3b82f6;
  background:rgba(59,130,246,0.1);
}

.drop-zone.dragover{
  border-color:#22c55e;
  background:rgba(34,197,94,0.1);
}

/* BUTTONS */
button{
  padding:10px;
  background:#3b82f6;
  color:#fff;
  border:none;
  border-radius:8px;
  margin:5px;
}

.upload-actions{
  margin-top:15px;
  display:flex;
  gap:10px;
  justify-content:center;
}

/* RESULTS */
.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:8px;background:#1e293b;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:20px}

.bar{height:6px;background:#1e293b}
.bar-fill{height:6px}

#map{height:400px;border-radius:10px}

@media(max-width:900px){
  .dashboard{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">

<!-- HEADER -->
<header class="app-header">
  <div class="logo">
    <img src="/icon-192.png">
    <div class="brand">
      <div class="title">PixelProof</div>
      <div class="subtitle">AI-powered image forensic analysis</div>
    </div>
  </div>
</header>

<!-- DASHBOARD -->
<div class="dashboard">

  <!-- LEFT PANEL -->
  <div class="panel">

    <div id="dropZone" class="drop-zone">
      <p>Drag & Drop Image</p>
      <span>or click to upload</span>
    </div>

    <input type="file" id="file" hidden>

    <div class="upload-actions">
      <button id="rearBtn">Rear Camera</button>
      <button id="frontBtn">Front Camera</button>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <div id="result"></div>
  </div>

</div>

<input id="rear" type="file" accept="image/*" capture="environment" hidden>
<input id="front" type="file" accept="image/*" capture="user" hidden>

<div id="progress" style="display:none;margin-top:15px;">
  <div style="background:#1e293b;height:8px;border-radius:6px;">
    <div id="bar" style="height:8px;width:0%;background:#3b82f6;"></div>
  </div>
  <div id="progressText" style="font-size:12px;margin-top:5px;">Starting...</div>
</div>

</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

// DOM
const file = document.getElementById("file");
const rear = document.getElementById("rear");
const front = document.getElementById("front");
const rearBtn = document.getElementById("rearBtn");
const frontBtn = document.getElementById("frontBtn");
const result = document.getElementById("result");
const dropZone = document.getElementById("dropZone");

let selectedFile = null;
let metadata = {};
let gps = null;
let mapInstance = null;

// DRAG + CLICK
dropZone.onclick = () => file.click();

dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");

  const files = e.dataTransfer.files;
  if(files.length){
    handle({ target: { files } });
  }
});

// FILE EVENTS
file.onchange=handle;
rear.onchange=handle;
front.onchange=handle;

// HANDLE FILE
async function handle(e){
  const f = e.target.files[0];
  if(!f) return;

  selectedFile = f;
  metadata = {};
  gps = null;

  analyze();
}

// RESIZE
async function resizeImage(file){
  return new Promise(res=>{
    const img=new Image(), reader=new FileReader();

    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height,MAX=800;

      if(w>MAX){h*=MAX/w;w=MAX;}

      canvas.width=w;
      canvas.height=h;

      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(b=>{
        res(new File([b],"resized.jpg",{type:"image/jpeg"}));
      });
    };

    reader.readAsDataURL(file);
  });
}

// ANALYZE
async function analyze(){
  try{
    showProgress();
    setProgress(30,"Processing...");

    const resized = await resizeImage(selectedFile);

    const form=new FormData();
    form.append("image",resized);

    const res = await fetch(API+"/api/analyze",{
      method:"POST",
      body:form
    });

    const data = await res.json();

    setProgress(100,"Done");
    setTimeout(hideProgress,800);

    render(data.result || data);

  }catch(err){
    console.error(err);
    hideProgress();
    alert("Analysis failed");
  }
}

// SCORE
function computeScore(signals){
  let total=0,weightSum=0;
  for(const [k,v] of Object.entries(signals)){
    const w={ela:0.25,noise:0.2,lighting:0.2,edges:0.15,metadata:0.2}[k];
    if(!w) continue;
    total+=v*w;
    weightSum+=w;
  }
  return weightSum?Math.round(total/weightSum):0;
}

// RENDER
function render(d){
  const signals = d.signals || {};
  const score = computeScore(signals);

  const bars = Object.entries(signals).map(([k,v])=>`
    <div>
      <strong>${k}</strong> ${v}%
      <div class="bar"><div class="bar-fill" style="width:${v}%;background:#3b82f6"></div></div>
    </div>
  `).join("");

  result.innerHTML = `
    <h2>${score>70?"Likely Altered":score>40?"Possibly Modified":"Likely Authentic"}</h2>
    <p>Score: ${score}%</p>
    ${bars}
    ${d.heatmap?`<img src="${API+d.heatmap}" style="width:100%;margin-top:10px">`:""}
  `;
}

// PROGRESS
function showProgress(){document.getElementById("progress").style.display="block";}
function hideProgress(){document.getElementById("progress").style.display="none";}
function setProgress(p,t){
  document.getElementById("bar").style.width=p+"%";
  document.getElementById("progressText").innerText=t;
}
</script>

</body>
</html>
