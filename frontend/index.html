<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PixelProof</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2.2rem;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #334155;
      border: 1px solid #475569;
      color: #e2e8f0;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #475569;
    }

    .section {
      margin-top: 20px;
    }

    .meta-row {
      padding: 6px 0;
      border-bottom: 1px solid #334155;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 6px;
    }

    .label {
      font-weight: bold;
    }

    .warning {
      color: #facc15;
    }

    a.map-link {
      color: #38bdf8;
      text-decoration: none;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

  <h1>Pixel<span style="color:#38bdf8;">Proof</span></h1>

  <div class="container">

    <input type="file" id="fileInput" accept="image/*" />

    <button onclick="analyze()">Analyze Image</button>

    <div id="result" class="section"></div>

  </div>

  <script>
    const API = "";

    function formatCoord(val) {
      return (typeof val === "number") ? val.toFixed(6) : "Not available";
    }

    function mapLink(lat, lon) {
      if (typeof lat === "number" && typeof lon === "number") {
        return `<div><a class="map-link" target="_blank" href="https://maps.google.com/?q=${lat},${lon}">View on map</a></div>`;
      }
      return "";
    }

    async function analyze() {
      const fileInput = document.getElementById("fileInput");
      const resultEl = document.getElementById("result");

      if (!fileInput.files.length) {
        alert("Please select an image");
        return;
      }

      const form = new FormData();
      form.append("image", fileInput.files[0]);

      resultEl.innerHTML = "Analyzing...";

      try {
        const res = await fetch(API + "/analyze", {
          method: "POST",
          body: form
        });

        const data = await res.json();

        console.log("FULL RESPONSE:", data);

        const lat = data.gps?.lat;
        const lon = data.gps?.lon;
        const hasGPS = (typeof lat === "number" && typeof lon === "number");

        resultEl.innerHTML = `
          <div class="section">
            <div class="meta-row">
              <span class="label">Classification:</span>
              ${data.classification ?? "Unknown"}
            </div>
          </div>

          <div class="section">
            <div class="meta-row">
              <span class="label">Camera:</span>
              ${data.exif?.Make ?? "—"}
            </div>

            <div class="meta-row">
              <span class="label">Date:</span>
              ${data.exif?.DateTimeOriginal ?? "—"}
            </div>

            <div class="meta-row">
              <span class="label">Latitude:</span>
              ${formatCoord(lat)}
            </div>

            <div class="meta-row">
              <span class="label">Longitude:</span>
              ${formatCoord(lon)}
            </div>

            ${mapLink(lat, lon)}

            ${
              !hasGPS
                ? `<div class="meta-row warning">
                     Location data missing — may indicate metadata removal or privacy filtering
                   </div>`
                : ""
            }
          </div>

          <div class="section">
            <div class="meta-row">
              <span class="label">ELA Analysis</span>
            </div>
            <img src="${data.ela}" />
          </div>
        `;

      } catch (err) {
        console.error(err);
        resultEl.innerHTML = "Error analyzing image";
      }
    }
  </script>

</body>
</html>
