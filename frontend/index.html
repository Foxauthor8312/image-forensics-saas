<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<style>
body{background:#0f172a;color:white;font-family:Arial}
.container{max-width:1000px;margin:auto;padding:20px}
.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:10px;background:#334155;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block}
img{width:100%;max-height:400px;object-fit:contain}
</style>
</head>

<body>
<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";
let fileInput=document.getElementById("file");
let selectedFile=null;

fileInput.onchange=e=>selectedFile=e.target.files[0];

async function upload(){
if(!selectedFile)return alert("Select file");

await fetch(API+"/health");

let form=new FormData();
form.append("image",selectedFile);

let res=await fetch(API+"/api/analyze",{method:"POST",body:form});
let data=await res.json();

poll(data.job_id);
}

function poll(id){
let interval=setInterval(async()=>{
let res=await fetch(API+"/api/status/"+id);
let d=await res.json();

if(d.status==="done"){
clearInterval(interval);
render(d.result);
}

},1500);
}

function render(data){
let original=URL.createObjectURL(selectedFile);

document.getElementById("result").innerHTML=`

<div class="tabs">
<div class="tab active" onclick="openTab(event,'results')">Results</div>
<div class="tab" onclick="openTab(event,'heatmap')">Heatmap</div>
<div class="tab" onclick="openTab(event,'explanation')">Explanation</div>
</div>

<div id="results" class="tab-content active">
<img src="${original}">
<img src="${data.ela_image}">
</div>

<div id="heatmap" class="tab-content">
<img src="${data.heatmap}">
</div>

<div id="explanation" class="tab-content">
<p>${data.legal_conclusion}</p>
${data.explanation.map(e=>`<p>${e}</p>`).join("")}
</div>

<button onclick="window.open('${data.report}')">Download PDF</button>
`;
}

function openTab(evt,name){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(name).classList.add("active");
evt.target.classList.add("active");
}
</script>

</body>
</html>
