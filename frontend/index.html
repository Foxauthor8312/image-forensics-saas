<!DOCTYPE html>
<html>
<head>
  <title>PixelProof</title>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    .container { max-width:900px; margin:40px auto; }
    .card { background:#1e293b; padding:20px; margin-top:20px; border-radius:8px; text-align:left; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    img { width:100%; border-radius:6px; }
    button { padding:10px 20px; background:#3b82f6; border:none; color:white; margin-top:10px; cursor:pointer; }
  </style>
</head>

<body>
<div class="container">
  <h1>PixelProof 🔍</h1>

  <input type="file" id="file"><br>
  <button onclick="upload()">Analyze</button>

  <div id="result"></div>

  <button id="pdf" style="display:none;" onclick="pdf()">Download PDF</button>
</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

async function upload(){
  const f = document.getElementById("file").files[0];
  if(!f) return alert("Select file");

  const form = new FormData();
  form.append("image", f);

  const res = await fetch(API+"/api/analyze",{method:"POST", body:form});
  const data = await res.json();

  window.last = data;
  document.getElementById("pdf").style.display="block";

  const orig = URL.createObjectURL(f);

  document.getElementById("result").innerHTML = `
  <div class="card">
    <h3>Result</h3>
    Score: ${data.score}<br>
    Confidence: ${data.confidence}%<br>
    ${data.ela_result}

    <h4>Comparison</h4>
    <div class="row">
      <div><img src="${orig}"></div>
      <div><img src="${data.ela_image}"></div>
    </div>

    <h4>Heatmap</h4>
    <img src="${data.heatmap}">

    <h4>Detected Regions</h4>
    ${data.regions.map(r=>`<div>x:${r[0]} y:${r[1]} w:${r[2]} h:${r[3]}</div>`).join("")}

    <h4>Metadata</h4>
    <pre>${JSON.stringify(data.metadata,null,2)}</pre>
  </div>`;
}

async function pdf(){
  const res = await fetch(API+"/api/report",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(window.last)
  });

  const data = await res.json();
  window.open(data.report);
}
</script>
</body>
</html>
