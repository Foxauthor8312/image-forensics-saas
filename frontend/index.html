<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}
.panel{background:#1e293b;padding:20px;border-radius:12px}

.drop{border:2px dashed #555;padding:30px;text-align:center;cursor:pointer}

.tabs{display:flex;gap:10px;margin-top:15px}
.tab{padding:6px 10px;background:#111;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}

.tab-content{display:none;margin-top:10px}
.tab-content.active{display:block}

#map{height:300px;border-radius:10px;margin-top:10px}

.progress{height:6px;background:#111;margin:10px 0;display:none}
.fill{height:100%;width:0;background:#3b82f6}

img.preview{
  max-width:100%;
  max-height:300px;
  object-fit:contain;
  margin-bottom:10px;
  border-radius:8px;
}

.app-footer{
  margin-top:20px;
  padding:12px;
  background:#1e293b;
  border-radius:10px;
  font-size:12px;
}
.footer-sub{
  opacity:.6;
  font-size:11px;
}
  /* HEADER STYLES — ADD RIGHT HERE */
.app-header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  margin-bottom:15px;
  background:#1e293b;
  border-radius:10px;
}

.logo-badge{
  width:40px;
  height:40px;
  background:#0f172a;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-badge img{
  width:24px;
}

.brand-title{
  font-weight:600;
}

.brand-sub{
  font-size:11px;
  opacity:.6;
}
/* END HEADER STYLES */
</style>

</head>

<body>
<div class="container">
<header class="app-header">
  <div class="logo-badge">
    <img src="/icon-192.png">
  </div>
  <div>
    <div class="brand-title">PixelProof</div>
    <div class="brand-sub">AI Image Forensics Engine</div>
 
  </div>
</header>

<div class="panel">
  <h2>PixelProof</h2>

  <div id="drop" class="drop">Click or Drop Image</div>
  <input type="file" id="file" hidden>

  <div id="status"></div>
  <div class="progress" id="bar"><div class="fill" id="fill"></div></div>

  <div id="result"></div>
</div>

<footer class="app-footer">
  <div>
    <strong>PixelProof</strong>
    <div class="footer-sub">AI Image Forensics Engine</div>
    <div class="footer-sub">© <span id="year"></span></div>
  </div>
</footer>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";

const file=document.getElementById("file");
const drop=document.getElementById("drop");
const result=document.getElementById("result");
const bar=document.getElementById("bar");
const fill=document.getElementById("fill");
const status=document.getElementById("status");

drop.onclick=()=>file.click();

file.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  window.lastFile=f;
  analyze(f);
};

async function analyze(f){

  // WAKE BACKEND FIRST
  try {
    await fetch(API);
  } catch(e){}

  const form=new FormData();
  form.append("image",f);

  bar.style.display="block";
  fill.style.width="10%";
  status.innerText="Analyzing...";

  let p=10;
  const int=setInterval(()=>{
    p+=Math.random()*10;
    if(p<90) fill.style.width=p+"%";
  },300);

  try{
   const res = await fetch(API + "/api/analyze", {
  method: "POST",
  body: form,
  mode: "cors"
});

if (!res.ok) {
  throw new Error("Request blocked: " + res.status);
}

const data = await res.json();

    clearInterval(int);
    fill.style.width="100%";
    status.innerText="Done";
    setTimeout(()=>bar.style.display="none",500);
    
    console.log("FULL RESULT:", JSON.stringify(data, null, 2));
    render(data.result || data);

  }catch(err){
    clearInterval(int);
    status.innerText="Error";
    console.error(err);
  }
}

function render(d){
let scoreColor = "#22c55e"; // green default

if(d.score > 70){
  scoreColor = "#ef4444"; // red
}else if(d.score > 40){
  scoreColor = "#facc15"; // yellow
}
let explanation = "";

if(d.score > 70){
  explanation = "The image shows strong inconsistencies in compression patterns. If bright areas in the heatmap stand out from surrounding regions, those areas may have been edited or inserted.";
}else if(d.score > 40){
  explanation = "Some regions differ slightly in how they were compressed. Compare the heatmap to the original image to see if any areas stand out more than expected.";
}else{
  explanation = "Compression patterns are consistent across the image. Any bright areas in the heatmap are most likely caused by natural details such as edges, textures, or lighting.";
}
  // reset map for new image
  window._mapInstance = null;

  const preview = window.lastFile
    ? `<img class="preview" src="${URL.createObjectURL(window.lastFile)}">`
    : "";

  result.innerHTML = `
    ${preview}

    <div class="tabs">
      <div class="tab active" onclick="tab(event,'r')">Results</div>
      <div class="tab" onclick="tab(event,'d')">Detailed</div>
      <div class="tab" onclick="tab(event,'m')">Metadata</div>
      <div class="tab" onclick="tab(event,'mapTab')">Map</div>
      <div class="tab" onclick="tab(event,'h')">Heatmap</div>
    </div>

    <div id="r" class="tab-content active">
    <h3 style="color:${scoreColor}">
  ${d.conclusion || ""}
    </h3>
    <div style="
  display:inline-block;
  padding:6px 10px;
  border-radius:6px;
  background:${scoreColor}20;
  color:${scoreColor};
  font-weight:600;
  margin-top:6px;
">
  Score: ${d.score || 0}%
</div>
     <div style="margin-top:8px">
  ${d.analysis || ""}
</div>

<div style="
  margin-top:10px;
  padding:10px;
  background:#020617;
  border-radius:8px;
  font-size:13px;
  line-height:1.4;
">
  <strong>What this means:</strong><br>
  ${explanation}
</div>
      ${
        d.signals
        ? Object.entries(d.signals).map(([k,v])=>`<div>${k}: ${v}%</div>`).join("")
        : ""
      }
    </div>

    <div id="d" class="tab-content">
      <h3>Forensic Analysis</h3>
      <p><strong>Conclusion:</strong> ${d.conclusion || "N/A"}</p>
      <p><strong>Summary:</strong><br>${d.analysis || "No analysis available"}</p>

      <h4>Signal Breakdown</h4>
      ${
        d.signals
          ? Object.entries(d.signals).map(([k,v])=>`
              <div>${k.toUpperCase()}: ${v}%</div>
            `).join("")
          : "<div>No signal data</div>"
      }

      <h4>Technical Notes</h4>
      <p style="opacity:.7">
        This analysis evaluates compression artifacts, noise distribution,
        and metadata consistency. These indicators are suggestive and not
        independently conclusive.
      </p>
    </div>

    <div id="m" class="tab-content">
      ${
        d.metadata
        ? `
          <div><strong>Camera:</strong> ${d.metadata.camera || "Unknown"}</div>
          <div><strong>Model:</strong> ${d.metadata.model || "Unknown"}</div>
          <div><strong>Date:</strong> ${d.metadata.date || "N/A"}</div>
          ${
            d.metadata.gps
            ? `<div><strong>GPS:</strong> ${d.metadata.gps.lat}, ${d.metadata.gps.lon}</div>`
            : `<div>No GPS metadata</div>`
          }
        `
        : "No metadata available"
      }
    </div>

    <div id="mapTab" class="tab-content">
  ${
    d.metadata?.gps
    ? `
      <div id="map"></div>
      <div id="locationLabel" style="margin-top:8px;opacity:.8;font-size:12px;">
        Resolving location...
      </div>
    `
    : "No GPS data available"
  }
</div>
 

<div id="h" class="tab-content">

  <div style="position:relative;max-width:100%;">

    <img id="heatmapBase" style="
      width:100%;
      display:block;
      border-radius:10px;
    ">

    <canvas id="heatmapCanvas" style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      opacity:0.5;
      border-radius:10px;
    "></canvas>

  </div>

  <input type="range" id="heatSlider"
    min="0" max="100" value="50"
    style="width:100%;margin-top:10px;">

  <div style="
    margin-top:12px;
    font-size:13px;
    line-height:1.5;
    background:#020617;
    padding:10px;
    border-radius:8px;
  ">
    <strong>How to interpret this visualization</strong><br><br>
    Bright areas show stronger compression differences. These may indicate edits,
    but can also come from natural image detail like edges or texture.
    <br><br>
    Use the slider to compare the heatmap with the original image.
  </div>

</div>
  `;

  // STORE GPS ONLY (do NOT create map here)
  if(d.metadata?.gps){
    window._gpsData = d.metadata.gps;
  }

}


// TAB FUNCTION (OUTSIDE render)
function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");

  // =========================
  // MAP
  // =========================
  if(id==="mapTab" && window._gpsData){

    const gps = window._gpsData;

    if(window._mapInstance){
      return;
    }

    const street = L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      { maxZoom: 19 }
    );

    const satellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 19 }
    );

    const map = L.map('map', {
      center: [gps.lat, gps.lon],
      zoom: 13,
      layers: [street]
    });

    L.control.layers(
      { "Street": street, "Satellite": satellite },
      null,
      { collapsed: false }
    ).addTo(map);

    L.marker([gps.lat, gps.lon]).addTo(map);

    window._mapInstance = map;

    const label = document.getElementById("locationLabel");

    if(label){
      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${gps.lat}&lon=${gps.lon}`)
        .then(res => res.json())
        .then(data => {
          const addr = data.address || {};
          const locationText = [
            addr.city || addr.town || addr.village,
            addr.state,
            addr.country
          ].filter(Boolean).join(", ");

          label.innerText = locationText || "Location not found";
        })
        .catch(()=>{
          label.innerText = "Location lookup failed";
        });
    }

    setTimeout(()=>map.invalidateSize(),200);
  }

  // =========================
  // HEATMAP
  // =========================
  if(id==="h" && window.lastFile){

    const img = new Image();

    img.onload = () => {

      const base = document.getElementById("heatmapBase");
      const canvas = document.getElementById("heatmapCanvas");
      const slider = document.getElementById("heatSlider");

      if(!canvas || !base || !slider){
        console.log("Heatmap elements missing");
        return;
      }

      const url = URL.createObjectURL(window.lastFile);
      base.src = url;

      const ctx = canvas.getContext("2d");

      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      for(let i = 0; i < data.length; i += 4){
        const avg = (data[i] + data[i+1] + data[i+2]) / 3;

        data[i] = Math.min(255, avg * 2);
        data[i+1] = avg * 0.4;
        data[i+2] = avg * 0.4;
      }

      ctx.putImageData(imageData, 0, 0);

      slider.oninput = () => {
        canvas.style.opacity = slider.value / 100;
      };

    };

    img.src = URL.createObjectURL(window.lastFile);
  }
}

    
document.getElementById("year").innerText=new Date().getFullYear();

// SERVICE WORKER (safe)
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement("button");
  btn.innerText = "📲 Install PixelProof";
  btn.style.marginTop = "10px";

  btn.onclick = async () => {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    btn.remove();
  };

  document.querySelector(".panel").prepend(btn);
});
</script>

</body>
</html>
