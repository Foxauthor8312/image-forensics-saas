<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

button { padding:10px; background:#3b82f6; border:none; color:white; border-radius:6px; margin:5px; cursor:pointer; }
#analyzeBtn { background:#22c55e; }

.tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tab { padding:10px; background:#1e293b; border-radius:6px; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:18px; border-radius:10px; }

.image-row { display:flex; gap:15px; flex-wrap:wrap; margin-top:20px; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:400px; object-fit:contain; }

#map { height:400px; border-radius:10px; }

.meta-container { max-height:400px; overflow-y:auto; }
.card p { word-break:break-word; }
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file"><br>

<button onclick="capturePhoto()">📷 Capture</button>
<button id="analyzeBtn" onclick="analyzeImage()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null, previewURL=null, metadata={}, gps=null, mapInstance=null;

/* ================= IMAGE RESIZE ================= */
async function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image(), reader=new FileReader();
    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const MAX=1280;
      let w=img.width,h=img.height;

      if(w>h && w>MAX){h*=MAX/w;w=MAX;}
      else if(h>MAX){w*=MAX/h;h=MAX;}

      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(blob=>{
        resolve(new File([blob],"resized.jpg",{type:"image/jpeg"}));
      },"image/jpeg",0.85);
    };

    reader.readAsDataURL(file);
  });
}

/* ================= EXIF ================= */
function extractGPS(meta){
  if(!meta.GPSLatitude || !meta.GPSLongitude) return null;
  const d=c=>c[0]+c[1]/60+c[2]/3600;
  let lat=d(meta.GPSLatitude), lon=d(meta.GPSLongitude);
  if(meta.GPSLatitudeRef==="S") lat=-lat;
  if(meta.GPSLongitudeRef==="W") lon=-lon;
  return {lat,lon,source:"EXIF"};
}

file.onchange=async e=>{
  selectedFile=e.target.files[0];
  previewURL=URL.createObjectURL(selectedFile);

  await new Promise(resolve=>{
    EXIF.getData(selectedFile,function(){
      metadata=EXIF.getAllTags(this)||{};
      gps=extractGPS(metadata);
      resolve();
    });
  });
};

/* ================= GPS ================= */
function getDeviceLocation(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({
        lat:pos.coords.latitude,
        lon:pos.coords.longitude,
        accuracy:pos.coords.accuracy,
        source:"Device"
      }),
      ()=>resolve(null)
    );
  });
}

/* ================= CAMERA ================= */
async function capturePhoto(){
  const stream=await navigator.mediaDevices.getUserMedia({video:true});
  const video=document.createElement("video");
  video.srcObject=stream; video.play();

  const overlay=document.createElement("div");
  overlay.style="position:fixed;inset:0;background:#000;z-index:9999;";
  overlay.appendChild(video);

  const btn=document.createElement("button");
  btn.innerText="Capture";
  btn.style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%)";
  overlay.appendChild(btn);
  document.body.appendChild(overlay);

  btn.onclick=async()=>{
    const canvas=document.createElement("canvas");
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);

    canvas.toBlob(async blob=>{
      selectedFile=new File([blob],"capture.jpg");
      previewURL=URL.createObjectURL(selectedFile);
      gps=await getDeviceLocation();
    });

    stream.getTracks().forEach(t=>t.stop());
    document.body.removeChild(overlay);
  };
}

/* ================= ANALYZE ================= */
async function analyzeImage(){

  if(!selectedFile) return alert("Select image");

  const resized=await resizeImage(selectedFile);
  let finalGPS=gps || await getDeviceLocation();

  const form=new FormData();
  form.append("image",resized);
  form.append("metadata",JSON.stringify(metadata));
  form.append("gps",JSON.stringify(finalGPS));

  let res;
  try{
    res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  }catch{
    alert("Upload failed");
    return;
  }

  const data=await res.json();
  render(data.result);
}

/* ================= GAUGE ================= */
function gauge(v,label){
  const r=50,c=2*Math.PI*r;
  const o=c-(v/100)*c;
  const color=v>70?"#22c55e":v>40?"#f59e0b":"#ef4444";

  return `
  <div style="text-align:center">
    <svg width="120" height="120" style="transform:rotate(-90deg)">
      <circle cx="60" cy="60" r="${r}" stroke="#1e293b" stroke-width="10" fill="none"/>
      <circle cx="60" cy="60" r="${r}" stroke="${color}" stroke-width="10"
        stroke-dasharray="${c}" stroke-dashoffset="${o}" fill="none"/>
    </svg>
    <div style="margin-top:-70px;font-weight:bold;">${v}%</div>
    <div style="margin-top:40px;">${label}</div>
  </div>`;
}

/* ================= RENDER ================= */
function render(d){

  window.lastGPS = d.gps;

  document.getElementById("result").innerHTML = `

  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'mapTab')">Map</div>
    <div class="tab" onclick="tab(event,'metaTab')">Metadata</div>
    <div class="tab" onclick="tab(event,'detailTab')">Detailed</div>
    <div class="tab" onclick="tab(event,'aboutTab')">About</div>
  </div>

  <!-- ================= RESULTS ================= -->
  <div id="r" class="tab-content active">
    <div class="card">

      <h2>${d.analysis}</h2>

      <!-- ✅ SCORE + CONFIDENCE -->
      <div style="display:flex;gap:30px;flex-wrap:wrap;margin-bottom:15px;">
        ${gauge(d.score,"Manipulation Score")}
        ${gauge(d.confidence,"Confidence")}
      </div>
      <div style="margin-top:15px; padding:12px; background:#020617; border-radius:8px; font-size:14px; line-height:1.5;">

  <b>How to Read These Results</b>

  <p style="margin-top:8px;">
    <b>Manipulation Score:</b> This score estimates how likely the image has been altered.
    <br>
    • <span style="color:#22c55e;">0–40 → Likely original (low anomaly)</span><br>
    • <span style="color:#f59e0b;">40–70 → Possible editing</span><br>
    • <span style="color:#ef4444;">70–100 → Likely edited</span>
  </p>

  <p>
    A <b>lower score is better</b> because it means the image behaves like a normal,
    unedited photograph with consistent compression and structure.
    A higher score means the system detected unusual patterns.
  </p>

  <p>
    <b>Confidence:</b> Indicates how strongly the detection methods agree with each other.
    <br>
    • High confidence → signals agree<br>
    • Low confidence → mixed or inconclusive results
  </p>

</div>

      <!-- ✅ EXPLANATIONS (LOCKED) -->
      <p><b>Summary:</b><br>${d.simple_explanation || "N/A"}</p>
      <p><b>Technical:</b><br>${d.technical_explanation || "N/A"}</p>
      <p><b>Conclusion:</b><br>${d.legal_explanation || "N/A"}</p>
      <p><b>Confidence:</b><br>${d.confidence_note || "N/A"}</p>

      <!-- ✅ PDF DOWNLOAD (LOCKED) -->
      <div style="margin:15px 0;">
        ${d.pdf_report 
          ? `<a href="${d.pdf_report}" target="_blank" style="color:#3b82f6;font-weight:bold;">Download Full PDF Report</a>`
          : "<p>PDF not available</p>"
        }
      </div>

      <!-- ✅ SIGNAL BARS -->
      <h3>Signal Breakdown</h3>
      ${
        Object.entries(d.signals || {}).map(([k,v])=>`
          <div style="margin-bottom:10px;">
            <div>${k}: ${v}</div>
            <div style="background:#1e293b;height:8px;border-radius:4px;">
              <div style="width:${v}%;height:8px;background:#3b82f6;border-radius:4px;"></div>
            </div>
          </div>
        `).join("")
      }

    </div>

    <!-- ✅ IMAGES (LOCKED) -->
    <div class="image-row">
      <div class="image-box">
        <h4>Original</h4>
        <img src="${previewURL || ""}">
      </div>
      <div class="image-box">
        <h4>Heatmap</h4>
        <img src="${d.heatmap ? d.heatmap + "?t=" + Date.now() : ""}">
      </div>
    </div>

  </div>

  <!-- ================= MAP ================= -->
  <div id="mapTab" class="tab-content">
    <div id="map"></div>
  </div>

  <!-- ================= METADATA ================= -->
  <div id="metaTab" class="tab-content">
    <div class="card">
      <div class="meta-container">

        ${
          d.metadata?.available
          ? (() => {

              const meta = d.metadata.all || {};

              const importantKeys = [
                "Make","Model","DateTime","Software",
                "GPSLatitude","GPSLongitude"
              ];

              const important = Object.entries(meta)
                .filter(([k]) => importantKeys.includes(k));

              const others = Object.entries(meta)
                .filter(([k]) => !importantKeys.includes(k));

              return `
                <h3>Key Metadata</h3>
                ${
                  important.length
                  ? important.map(([k,v])=>`<p><b>${k}:</b> ${v}</p>`).join("")
                  : "<p>No key metadata</p>"
                }

                <hr>

                <h3>Full Metadata</h3>
                ${
                  others.slice(0,50).map(([k,v])=>`<p>${k}: ${v}</p>`).join("")
                }
              `;
            })()
          : "<p>No metadata available</p>"
        }

      </div>
    </div>
  </div>

  <!-- ================= DETAILED ================= -->
  <div id="detailTab" class="tab-content">
    <div class="card">
      <h2>Detailed Analysis</h2>

      <p>The forensic score is calculated using multiple independent signals:</p>

      <ul>
        <li>ELA (compression inconsistencies)</li>
        <li>Noise pattern analysis</li>
        <li>Edge structure analysis</li>
        <li>Compression artifacts</li>
        <li>Metadata inspection</li>
      </ul>

      <p><b>Score:</b> Indicates likelihood of manipulation.</p>
      <p><b>Confidence:</b> Indicates agreement between detection signals.</p>

    </div>
  </div>

  <!-- ================= ABOUT ================= -->
  <div id="aboutTab" class="tab-content">
    <div class="card">
      PixelProof — Barry Mattison-Off Road Artist Photography
    </div>
  </div>

  `;
}

/* ================= MAP ================= */
function initMap(gps){

  if(mapInstance){
    mapInstance.remove();
    mapInstance=null;
  }

  if(!gps || isNaN(gps.lat) || isNaN(gps.lon)){
    document.getElementById("map").innerHTML = "<p>No valid location data</p>";
    return;
  }

  mapInstance = L.map('map').setView([gps.lat,gps.lon],15);

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
  ).addTo(mapInstance);

  L.marker([gps.lat,gps.lon]).addTo(mapInstance);

  if(gps.accuracy){
    L.circle([gps.lat,gps.lon], { radius: gps.accuracy }).addTo(mapInstance);
  }

  setTimeout(()=>mapInstance.invalidateSize(),200);
}

/* ================= TABS ================= */
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");

if(id==="mapTab"){
  setTimeout(()=>initMap(window.lastGPS),100);
}
}

</script>

<div style="text-align:center;margin-top:30px;font-size:12px;opacity:0.6;">
PixelProof © 2026 Barry Mattison-Off Road Artist Photography
</div>

</body>
</html>
