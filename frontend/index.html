<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.ico?v=2">

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}

/* HEADER */
.app-header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:15px;
  margin-bottom:20px;
  background:#1e293b;
  border-radius:12px;
}
.logo img{width:40px;border-radius:8px}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
}
.panel{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

/* DROP ZONE */
.drop-zone{
  border:2px dashed rgba(255,255,255,0.2);
  padding:40px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}
.drop-zone.dragover{
  border-color:#22c55e;
}

/* RESULTS */
.bar{height:6px;background:#111;margin:5px 0}
.bar-fill{height:6px;background:#3b82f6}

.tabs{display:flex;gap:10px;margin-top:15px}
.tab{padding:6px 10px;background:#111;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:10px}

pre{white-space:pre-wrap;font-size:12px;opacity:0.8}
</style>
</head>

<body>
<div class="container">

<header class="app-header">
  <div class="logo">
    <img src="/icon-192.png">
  </div>
  <div>
    <div style="font-size:20px;font-weight:600;">PixelProof</div>
    <div style="font-size:12px;opacity:0.6;">AI forensic image analysis</div>
  </div>
</header>

<div class="dashboard">

  <!-- LEFT PANEL -->
  <div class="panel">
    <div id="dropZone" class="drop-zone">
      Drag & Drop Image<br><span style="opacity:.6">or click</span>
    </div>
    <input type="file" id="file" hidden>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <div id="result"></div>
  </div>

</div>

</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

const file = document.getElementById("file");
const dropZone = document.getElementById("dropZone");
const result = document.getElementById("result");

let selectedFile = null;

/* ======================
   DRAG + CLICK
====================== */
dropZone.onclick = () => file.click();

dropZone.addEventListener("dragover", e=>{
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", ()=>{
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e=>{
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handle({target:{files:e.dataTransfer.files}});
});

file.onchange = handle;

/* ======================
   FILE HANDLING
====================== */
function handle(e){
  const f = e.target.files[0];
  if(!f) return;
  selectedFile = f;
  analyze();
}

/* ======================
   RESIZE IMAGE
====================== */
function resize(file){
  return new Promise(res=>{
    const img=new Image(), r=new FileReader();
    r.onload=e=>img.src=e.target.result;
    img.onload=()=>{
      const c=document.createElement("canvas");
      let w=img.width,h=img.height;
      if(w>800){h*=800/w;w=800;}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>res(new File([b],"x.jpg")));
    };
    r.readAsDataURL(file);
  });
}

/* ======================
   ANALYZE
====================== */
async function analyze(){
  const resized = await resize(selectedFile);

  const form=new FormData();
  form.append("image",resized);

  const res = await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data = await res.json();

  render(data.result || data);
}

/* ======================
   SCORING
====================== */
function score(signals){
  let t=0,w=0;
  for(let k in signals){
    let wt={ela:.5,noise:.25,metadata:.25}[k]||0;
    t+=signals[k]*wt; w+=wt;
  }
  return w?Math.round(t/w):0;
}

/* ======================
   CONFIDENCE PER SIGNAL
====================== */
function signalConfidence(signals){
  const conf = {};

  const values = Object.values(signals);
  const avg = values.reduce((a,b)=>a+b,0) / (values.length || 1);

  for(let k in signals){
    const v = signals[k];

    let c = 50;

    // 🔹 strength of signal
    if(v > 75) c = 90;
    else if(v > 60) c = 80;
    else if(v > 45) c = 70;
    else if(v > 30) c = 60;
    else c = 50;

    // 🔹 consistency boost (signals agreeing = more confidence)
    if(Math.abs(v - avg) < 15) c += 5;

    // 🔹 reliability weighting
    if(k === "ela") c += 5;        // strongest indicator
    if(k === "noise") c += 3;
    if(k === "metadata") c -= 5;   // weakest

    // 🔹 clamp
    conf[k] = Math.min(95, Math.max(45, Math.round(c)));
  }

  return conf;
}

/* ======================
   AI EXPLANATION
====================== */
function explain(signals,s){
  const conf = signalConfidence(signals);
  let parts=[];

  if(signals.ela>60)
    parts.push(`compression artifacts detected (confidence ${conf.ela}%)`);

  if(signals.noise>50)
    parts.push(`noise inconsistency observed (confidence ${conf.noise}%)`);

  if(signals.metadata>40)
    parts.push(`metadata anomalies present (confidence ${conf.metadata}%)`);

  if(!parts.length)
    parts.push("no strong anomalies detected");

  let conclusion = s>70
    ? "strong evidence of digital alteration"
    : s>40
    ? "possible modification detected"
    : "image appears authentic";

  return { narrative: parts.join(", "), conclusion };
}

/* ======================
   COURT REPORT
====================== */
function report(signals,s){
  return `Based on forensic analysis, the image shows ${
    s>70?"significant":"limited"
  } indicators of manipulation.

ELA: ${signals.ela}%
Noise: ${signals.noise}%
Metadata: ${signals.metadata}%

Conclusion: ${
    s>70?"Altered image likely":
    s>40?"Possible modification":
    "No significant manipulation"
  }`;
}

/* ======================
   RENDER
====================== */
function render(d){
  const signals=d.signals||{};
  const s=score(signals);
  const conf=signalConfidence(signals);
  const exp=explain(signals,s);
  const rep=report(signals,s);

  const bars = Object.entries(signals).map(([k,v])=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between">
        <span>${k}: ${v}%</span>
        <span style="opacity:.7">conf ${conf[k]}%</span>
      </div>

      <div class="bar">
        <div class="bar-fill" style="width:${v}%"></div>
      </div>

      <div class="bar" style="opacity:.3">
        <div class="bar-fill" style="width:${conf[k]}%;background:#22c55e"></div>
      </div>
    </div>
  `).join("");

  result.innerHTML = `
  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'d')">Detailed</div>
  </div>

  <div id="r" class="tab-content active">
    <h2>${s>70?"Likely Altered":s>40?"Possibly Modified":"Likely Authentic"}</h2>
    <p>Score: ${s}%</p>
    ${bars}
    ${d.heatmap?`<img src="${API+d.heatmap}" style="width:100%;margin-top:10px">`:""}
  </div>

  <div id="d" class="tab-content">
    <p><strong>Analysis:</strong> ${exp.narrative}</p>
    <p><strong>Conclusion:</strong> ${exp.conclusion}</p>
    <pre>${rep}</pre>
  </div>
  `;
}

/* ======================
   TABS
====================== */
function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
}
</script>

</body>
</html>
