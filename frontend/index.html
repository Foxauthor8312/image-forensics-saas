<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<style>
body{background:#0f172a;color:white;font-family:Arial}
.container{max-width:900px;margin:auto;padding:20px}
.drop{border:2px dashed #334155;padding:40px;text-align:center;cursor:pointer}
.badge{background:#334155;padding:5px;margin:5px}
.loading{text-align:center;color:#94a3b8}
.error{color:#f87171;text-align:center}
.row{display:flex;gap:10px}
.row img{width:100%}
</style>
</head>

<body>
<div class="container">

<h1>PixelProof 🔍</h1>

<div class="drop" onclick="file.click()">
Select Image
<input type="file" id="file" hidden>
</div>

<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";
let selectedFile=null;

file.onchange=e=>selectedFile=e.target.files[0];

async function upload(){
if(!selectedFile)return alert("Select file");

const result=document.getElementById("result");
result.innerHTML="<div class='loading'>Waking backend...</div>";

try{await fetch(API+"/health")}catch{}

const form=new FormData();
form.append("image",selectedFile);

try{
const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
const data=await res.json();

if(!data.job_id){
result.innerHTML="<div class='error'>Upload failed</div>";
return;
}

poll(data.job_id);

}catch{
result.innerHTML="<div class='error'>Backend unavailable</div>";
}
}

function poll(id){
const result=document.getElementById("result");

const interval=setInterval(async()=>{
const res=await fetch(API+"/api/status/"+id);
const d=await res.json();

if(d.status==="processing"){
result.innerHTML="<div class='loading'>"+d.step+"</div>";
}

if(d.status==="done"){
clearInterval(interval);
render(d.result);
}

if(d.status==="error"){
clearInterval(interval);
result.innerHTML="<div class='error'>"+d.error+"</div>";
}

},1500);
}

function render(data){
const original=URL.createObjectURL(selectedFile);

document.getElementById("result").innerHTML=`

<div>
<span class="badge">Score: ${data.score}</span>
<span class="badge">Confidence: ${data.confidence}%</span>
<span class="badge">${data.ela_result}</span>
</div>

<p>${data.score_explanation}</p>
<p>${data.confidence_explanation}</p>

<h3>Conclusion</h3>
<p>${data.legal_conclusion}</p>

<h3>How to Read This</h3>
${data.interpretation.map(i=>`<p>• ${i}</p>`).join("")}

<div class="row">
<img src="${original}">
<img src="${data.ela_image}">
</div>

<h3>Technical Findings</h3>
${data.explanation.map(e=>`<p>• ${e}</p>`).join("")}

<h3>Narrative</h3>
<p>${data.narrative}</p>

`;
}
</script>

</body>
</html>
