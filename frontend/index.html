<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<style>
body{background:#0f172a;color:white;font-family:Arial}
.container{max-width:900px;margin:auto;padding:20px}

.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:10px;background:#334155;cursor:pointer}
.tab.active{background:#3b82f6}

.tab-content{display:none}
.tab-content.active{display:block}

.card{background:#020617;padding:10px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null;

file.onchange=e=>selectedFile=e.target.files[0];

// -----------------------------
async function upload(){
  if(!selectedFile) return alert("Select file");

  document.getElementById("result").innerHTML="Starting...";

  const form=new FormData();
  form.append("image",selectedFile);

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();

  poll(data.job_id);
}

// -----------------------------
function poll(id){
  const interval=setInterval(async()=>{
    const res=await fetch(API+"/api/status/"+id);
    const d=await res.json();

    if(d.status==="done"){
      clearInterval(interval);
      render(d.result);
    }

    if(d.status==="error"){
      clearInterval(interval);
      document.getElementById("result").innerHTML="Error: "+d.error;
    }

  },1000);
}

// -----------------------------
function render(data){

  document.getElementById("result").innerHTML=`

<h3>${data.message}</h3>

<div class="tabs">
<div class="tab active" onclick="tab(event,'res')">Results</div>
<div class="tab" onclick="tab(event,'map')">Map</div>
<div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<!-- RESULTS -->
<div id="res" class="tab-content active">
<p>Score: ${data.score}</p>
<p>Confidence: ${data.confidence}</p>
</div>

<!-- MAP -->
<div id="map" class="tab-content">
<div class="card">
${
data.gps
? `
<p>${data.gps.lat}, ${data.gps.lon}</p>
<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed"></iframe>
`
: "<p>No GPS data found</p>"
}
</div>
</div>

<!-- METADATA -->
<div id="meta" class="tab-content">
<div class="card">
${
data.metadata?.available
? `
<p>Camera: ${data.metadata.Make || ""} ${data.metadata.Model || ""}</p>
<p>Date: ${data.metadata.DateTime || ""}</p>
<p>Software: ${data.metadata.Software || ""}</p>
<p>Size: ${data.metadata.ImageWidth} x ${data.metadata.ImageHeight}</p>
`
: "<p>No metadata found</p>"
}
</div>
</div>

`;
}

// -----------------------------
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}
</script>

</body>
</html>
