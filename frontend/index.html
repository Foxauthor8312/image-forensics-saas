<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof — AI Image Forensics</title>

<link rel="icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}
.panel{background:#1e293b;padding:20px;border-radius:12px}
.drop{border:2px dashed #555;padding:30px;text-align:center;cursor:pointer}
.tabs{display:flex;gap:10px;margin-top:10px}
.tab{padding:6px 10px;background:#111;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block}
.progress{height:6px;background:#111;margin:10px 0;display:none}
.fill{height:100%;width:0;background:#3b82f6}
footer{margin-top:20px;font-size:12px;opacity:.7}
</style>
</head>

<body>
<div class="container">

<div class="panel">
  <h2>PixelProof</h2>
  <div id="drop" class="drop">Tap or Drop Image</div>
  <input type="file" id="file" hidden>

  <div id="status"></div>
  <div class="progress" id="bar"><div class="fill" id="fill"></div></div>

  <div id="result"></div>
</div>

<footer>
  PixelProof · AI Image Forensics<br>
  © <span id="year"></span>
</footer>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";
const file=document.getElementById("file");
const drop=document.getElementById("drop");
const result=document.getElementById("result");
const bar=document.getElementById("bar");
const fill=document.getElementById("fill");
const status=document.getElementById("status");

drop.onclick=()=>file.click();
file.onchange=e=>handle(e.target.files[0]);

function handle(f){
  if(!f) return;
  window.lastFile=f;
  analyze(f);
}

async function analyze(f){
  const form=new FormData();
  form.append("image",f);

  bar.style.display="block";
  fill.style.width="10%";
  status.innerText="Analyzing...";

  let p=10;
  const int=setInterval(()=>{
    p+=Math.random()*10;
    if(p<90) fill.style.width=p+"%";
  },300);

  try{
    const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
    const data=await res.json();

    clearInterval(int);
    fill.style.width="100%";
    status.innerText="Done";

    setTimeout(()=>bar.style.display="none",500);

    render(data.result||data);
  }catch{
    clearInterval(int);
    status.innerText="Error";
  }
}

function render(d){
  const preview = `<img src="${URL.createObjectURL(window.lastFile)}" style="width:100%">`;

  result.innerHTML=`
  ${preview}

  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'d')">Details</div>
    <div class="tab" onclick="tab(event,'m')">Metadata</div>
    <div class="tab" onclick="tab(event,'map')">Map</div>
  </div>

  <div id="r" class="tab-content active">
    <h3>${d.conclusion}</h3>
    <p>${d.analysis}</p>
  </div>

  <div id="d" class="tab-content">
    <pre>${JSON.stringify(d,null,2)}</pre>
  </div>

  <div id="m" class="tab-content">
    <pre>${JSON.stringify(d.metadata,null,2)}</pre>
  </div>

  <div id="map" class="tab-content">
    <div id="mapBox" style="height:300px"></div>
  </div>
  `;

  if(d.metadata?.gps){
    setTimeout(()=>{
      const map=L.map('mapBox').setView([d.metadata.gps.lat,d.metadata.gps.lon],13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      L.marker([d.metadata.gps.lat,d.metadata.gps.lon]).addTo(map);
    },200);
  }
}

function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
}

document.getElementById("year").innerText=new Date().getFullYear();

// SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js")
    .then(()=>console.log("SW ready"))
    .catch(()=>console.log("SW failed"));
}

// INSTALL BUTTON
let deferredPrompt;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;

  const btn=document.createElement("button");
  btn.innerText="Install App";
  btn.onclick=()=>deferredPrompt.prompt();
  document.body.prepend(btn);
});
</script>

</body>
</html>
