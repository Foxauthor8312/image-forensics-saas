<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<style>
body{background:#0f172a;color:white;font-family:Arial}
.container{max-width:1000px;margin:auto;padding:20px}
.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:10px;background:#334155;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block}
img{width:100%;max-height:400px}
.card{background:#020617;padding:10px;margin-top:10px}
</style>
</head>

<body>
<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";
let selectedFile=null;

file.onchange=e=>selectedFile=e.target.files[0];

async function upload(){
  const form=new FormData();
  form.append("image",selectedFile);

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();
  poll(data.job_id);
}

function poll(id){
  const interval=setInterval(async()=>{
    const res=await fetch(API+"/api/status/"+id);
    const d=await res.json();

    if(d.status==="done"){
      clearInterval(interval);
      render(d.result);
    }

  },1500);
}

function render(data){
  const original=URL.createObjectURL(selectedFile);

  document.getElementById("result").innerHTML=`

<h3>DEBUG:</h3>
<p>Heatmap URL: ${data.heatmap}</p>
<p>Metadata available: ${data.metadata?.available}</p>

<div class="tabs">
<div class="tab active" onclick="tab(event,'r')">Results</div>
<div class="tab" onclick="tab(event,'h')">Heatmap</div>
<div class="tab" onclick="tab(event,'m')">Metadata</div>
</div>

<div id="r" class="tab-content active">
<img src="${original}">
<img src="${data.ela_image}">
</div>

<div id="h" class="tab-content">
<img src="${data.heatmap}" onerror="this.outerHTML='❌ Heatmap failed to load'">
</div>

<div id="m" class="tab-content">
<div class="card">
<pre>${JSON.stringify(data.metadata, null, 2)}</pre>
</div>
</div>
`;
}

function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}
</script>
</body>
</html>
