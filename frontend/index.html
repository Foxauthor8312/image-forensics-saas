<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; }
.container { max-width:1100px; margin:auto; padding:20px; }
.card { background:#020617; padding:18px; border-radius:10px; margin-top:15px; }
.tabs { display:flex; gap:10px; margin-top:20px; }
.tab { padding:10px; background:#1e293b; border-radius:6px; cursor:pointer; }
.tab.active { background:#3b82f6; }
.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.image-row { display:flex; gap:15px; flex-wrap:wrap; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:420px; object-fit:contain; }

.gauge { width:120px; height:120px; position:relative; }
.gauge svg { transform:rotate(-90deg); }
.gauge-text {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null;
let metadata={};
let gps=null;

file.onchange=e=>{
  selectedFile=e.target.files[0];
  EXIF.getData(selectedFile,function(){
    metadata=EXIF.getAllTags(this);
  });
};

/* 🔒 LOCKED EXPLANATION RENDERER */
function renderExplanations(d){
  return `
  <hr>
  <p><b>Summary:</b><br>${d.simple_explanation || "N/A"}</p>
  <p><b>Technical:</b><br>${d.technical_explanation || "N/A"}</p>
  <p><b>Conclusion:</b><br>${d.legal_explanation || "N/A"}</p>
  <p><b>Confidence Note:</b><br>${d.confidence_note || "N/A"}</p>
  <p style="opacity:0.8">
  These findings are based on compression and pixel consistency analysis (ELA).
  Results should be interpreted alongside the image’s origin and handling history.
  </p>
  `;
}

/* GAUGE */
function gauge(v,label){
  const r=50,c=2*Math.PI*r;
  const o=c-(v/100)*c;
  const color=v>70?"#22c55e":v>40?"#f59e0b":"#ef4444";

  return `
  <div>
    <div class="gauge">
      <svg width="120" height="120">
        <circle cx="60" cy="60" r="${r}" stroke="#1e293b" stroke-width="10" fill="none"/>
        <circle cx="60" cy="60" r="${r}" stroke="${color}" stroke-width="10"
          stroke-dasharray="${c}" stroke-dashoffset="${o}" fill="none"/>
      </svg>
      <div class="gauge-text">${v}</div>
    </div>
    <div style="text-align:center">${label}</div>
  </div>`;
}

async function upload(){
  if(!selectedFile) return alert("Select file");

  const form=new FormData();
  form.append("image",selectedFile);
  form.append("metadata",JSON.stringify(metadata));

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();

  render(data.result);
}

function render(d){

document.getElementById("result").innerHTML=`

<div class="tabs">
  <div class="tab active" onclick="tab(event,'r')">Results</div>
  <div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">

<div class="card">

<h2>${d.analysis}</h2>

<div style="display:flex; gap:30px;">
${gauge(d.score,"Score")}
${gauge(d.confidence,"Confidence")}
</div>

${renderExplanations(d)}

<a href="${d.pdf_report}" target="_blank">Download PDF</a>

</div>

<div class="image-row">
<div class="image-box">
<img src="${URL.createObjectURL(selectedFile)}">
</div>
<div class="image-box">
<img src="${d.heatmap}">
</div>
</div>

</div>

<div id="meta" class="tab-content">
<div class="card">
${Object.entries(d.metadata.all || {}).map(([k,v])=>`${k}: ${v}<br>`).join("")}
</div>
</div>
`;
}

function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>
</body>
</html>
