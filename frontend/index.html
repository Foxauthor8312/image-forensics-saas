<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

/* HERO */
h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.sub {
  color: #9ca3af;
  font-size: 18px;
  margin-bottom: 30px;
}

/* UPLOAD */
.upload {
  border: 2px dashed #374151;
  padding: 30px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.upload:hover {
  border-color: #60a5fa;
  background: #0f172a;
}

input {
  display: none;
}

/* RESULT CARD */
.card {
  margin-top: 30px;
  padding: 20px;
  border-radius: 12px;
}

.green { background: #064e3b; }
.yellow { background: #78350f; }
.red { background: #7f1d1d; }

/* IMAGE VIEWER */
.viewer {
  position: relative;
  margin-top: 30px;
}

.viewer img {
  width: 100%;
  border-radius: 10px;
}

#elaOverlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 1;
  mix-blend-mode: difference;
  pointer-events: none;
}

/* FOOTER */
.footer {
  margin-top: 50px;
  color: #6b7280;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof</h1>
<p class="sub">Analyze images for signs of editing or recompression</p>

<label class="upload">
  <input type="file" id="file">
  <strong>Click to upload an image</strong><br>
  <span style="color:#9ca3af;font-size:14px;">
    JPG or PNG • Instant analysis
  </span>
</label>

<div id="resultCard" class="card"></div>

<div class="viewer">
  <img id="originalImage">
  <img id="elaOverlay">
</div>

<div class="footer">
  Brighter differences in the overlay may indicate compression inconsistencies.
</div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function interpret(type) {
  if (type === "Likely Original") {
    return { color: "green", message: "No signs of editing detected." };
  }
  if (type === "Recompressed") {
    return { color: "yellow", message: "Image was likely saved or shared again." };
  }
  if (type === "Edited") {
    return { color: "red", message: "Possible image manipulation detected." };
  }
  return { color: "yellow", message: "Result is inconclusive." };
}

document.getElementById("file").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  // show original
  document.getElementById("originalImage").src =
    URL.createObjectURL(file);

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const conf = Math.round((data.classification?.confidence || 0.5) * 100);
  const ui = interpret(type);

  const card = document.getElementById("resultCard");
  card.className = "card " + ui.color;

  card.innerHTML = `
    <h2>${type}</h2>
    <p>${ui.message}</p>
    <p><strong>Confidence:</strong> ${conf}%</p>
  `;

  if (data.ela && data.ela.overlay) {
    document.getElementById("elaOverlay").src = data.ela.overlay;
  }
};
</script>

</body>
</html>
