<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
.container{max-width:1000px;margin:40px auto;padding:20px}
.drop{border:2px dashed #334155;padding:40px;text-align:center;border-radius:10px;cursor:pointer}
.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:10px;background:#334155;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none;margin-top:20px}
.tab-content.active{display:block}
img{width:100%;max-height:400px;object-fit:contain}
pre{background:#020617;padding:10px;max-height:300px;overflow:auto}
.bar{background:#1e293b;border-radius:6px;margin-bottom:10px}
.bar-inner{background:#3b82f6;height:10px;border-radius:6px}
</style>
</head>

<body>
<div class="container">
<h1>PixelProof</h1>

<div class="drop" id="drop">Drop Image or Click<input type="file" hidden id="file"></div>
<button onclick="upload()">Analyze</button>

<div id="result"></div>
</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";
let file=null;

document.getElementById("drop").onclick=()=>fileInput.click();
fileInput.onchange=e=>file=e.target.files[0];
drop.ondrop=e=>{e.preventDefault();file=e.dataTransfer.files[0]};

async function upload(){
 if(!file) return alert("Select file");

 const form=new FormData();
 form.append("image",file);

 const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
 const {job_id}=await res.json();

 check(job_id);
}

async function check(id){
 const interval=setInterval(async()=>{
   const res=await fetch(API+"/api/status/"+id);
   const data=await res.json();

   if(data.status==="done"){
     clearInterval(interval);
     render(data.result);
   }
 },1500);
}

function render(data){
 const orig=URL.createObjectURL(file);

 document.getElementById("result").innerHTML=`
 <div>
   <b>Score:</b> ${data.score} | 
   <b>Confidence:</b> ${data.confidence}% | 
   ${data.ela_result}

   <div class="tabs">
     <div class="tab active" onclick="tab(event,'res')">Results</div>
     <div class="tab" onclick="tab(event,'heat')">Heatmap</div>
     <div class="tab" onclick="tab(event,'meta')">Metadata</div>
     <div class="tab" onclick="tab(event,'exp')">Explanation</div>
   </div>

   <div id="res" class="tab-content active">
     <img src="${orig}">
     <img src="${data.ela_image}">
   </div>

   <div id="heat" class="tab-content">
     <img src="${data.heatmap}">
   </div>

   <div id="meta" class="tab-content">
     <pre>${JSON.stringify(data.metadata,null,2)}</pre>
   </div>

   <div id="exp" class="tab-content">
     ${data.explanation.map(e=>`<p>${e}</p>`).join("")}

     <h3>Confidence Breakdown</h3>
     ${bar("ELA",data.confidence_breakdown.ela)}
     ${bar("Noise",data.confidence_breakdown.noise)}
     ${bar("Sharpness",data.confidence_breakdown.sharpness)}
     ${bar("Metadata",data.confidence_breakdown.metadata_bonus)}
   </div>
 </div>`;
}

function tab(e,id){
 document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 e.target.classList.add("active");
}

function bar(name,val){
 return `
 <div>${name}: ${val}</div>
 <div class="bar"><div class="bar-inner" style="width:${val}%"></div></div>
 `;
}
</script>
</body>
</html>
