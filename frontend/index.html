<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
:root {
  --bg-main: #0a0a0a;
  --bg-panel: #111111;
  --border: #2a2a2a;

  --brand: #3b82f6;
  --brand-soft: #1e40af;

  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 40px;
}

.header img {
  height: 44px;
  filter: brightness(1.4) contrast(1.2);
}

.header span {
  font-weight: 500;
  font-size: 18px;
  letter-spacing: 0.3px;
  opacity: 0.9;
}

/* LAYOUT */
.wrapper {
  display: grid;
  grid-template-columns: 420px 1fr;
  min-height: calc(100vh - 80px);
}

/* LEFT */
.left {
  padding: 40px;
}

.tagline {
  font-size: 18px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

/* UPLOAD */
.upload {
  border: 2px dashed var(--border);
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  max-width: 320px;
}

.upload:hover {
  border-color: var(--brand);
}

input {
  display: none;
}

/* RIGHT */
.right {
  background: var(--bg-panel);
  padding: 40px;
}

/* RESULT */
.card {
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.3);
}

/* IMAGE */
.viewer {
  position: relative;
}

.viewer img {
  max-width: 520px;
  width: 100%;
  margin: auto;
  display: block;
  border-radius: 8px;
}

#elaOverlay {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  max-width: 520px;
  width: 100%;
  height: auto;
  mix-blend-mode: difference;
  pointer-events: none;
}

/* BUTTONS */
.actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  background: #1f2937;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: var(--brand);
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 13px;
  color: var(--text-muted);
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <span>PixelProof</span>
</div>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<div class="tagline">
Detect edits and verify image authenticity instantly.
</div>

<label class="upload">
  <input type="file" id="file">
  <strong>Select an image</strong><br>
  <span style="color:var(--text-muted);font-size:13px;">
    JPG or PNG • Instant analysis
  </span>
</label>

</div>

<!-- RIGHT -->
<div class="right">

<div id="resultCard" class="card"></div>

<div class="viewer">
  <img id="originalImage">
  <img id="elaOverlay">
</div>

<div class="actions">
  <button onclick="downloadOriginal()">Download Image</button>
  <button onclick="downloadOverlay()">Download Heatmap</button>
</div>

<div class="footer">
Brighter differences indicate compression inconsistencies.
</div>

</div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

let currentOverlay = null;
let currentImage = null;

function interpret(type) {
  if (type === "Likely Original") {
    return "No evidence of manipulation detected.";
  }
  if (type === "Recompressed") {
    return "Image has been resaved or shared. Compression artifacts present.";
  }
  if (type === "Edited") {
    return "Compression inconsistencies suggest possible modification.";
  }
  return "Analysis inconclusive.";
}

document.getElementById("file").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  currentImage = URL.createObjectURL(file);
  document.getElementById("originalImage").src = currentImage;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const conf = Math.round((data.classification?.confidence || 0.5) * 100);

  document.getElementById("resultCard").innerHTML = `
    <h2>${type}</h2>
    <p>${interpret(type)}</p>
    <p><strong>Confidence:</strong> ${conf}%</p>
  `;

  if (data.ela && data.ela.overlay) {
    currentOverlay = data.ela.overlay;
    document.getElementById("elaOverlay").src = currentOverlay;
  }
};

function downloadOriginal() {
  if (!currentImage) return;
  const a = document.createElement('a');
  a.href = currentImage;
  a.download = "image.jpg";
  a.click();
}

function downloadOverlay() {
  if (!currentOverlay) return;
  const a = document.createElement('a');
  a.href = currentOverlay;
  a.download = "heatmap.jpg";
  a.click();
}
</script>

</body>
</html>
