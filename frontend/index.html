<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PixelProof</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      background: #0f172a;

  <div class="hero">

    <div class="cta-group">
