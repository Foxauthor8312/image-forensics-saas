<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1000px; margin:auto; padding:20px; }

.tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tab { padding:10px; background:#334155; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:15px; margin-top:10px; }

.image-row { display:flex; gap:10px; flex-wrap:wrap; }
.image-box { flex:1 1 48%; }
.image-box img {
  width:100%;
  max-height:400px;
  object-fit:contain;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";
let selectedFile=null;

file.onchange=e=>selectedFile=e.target.files[0];

async function upload(){

  if(!selectedFile){
    alert("Select a file");
    return;
  }

  document.getElementById("result").innerHTML="Processing...";

  const form=new FormData();
  form.append("image",selectedFile);

  try {
    await fetch(API+"/health").catch(()=>{});

    const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
    const data=await res.json();

    if(data.status==="done"){
      render(data.result);
    } else {
      document.getElementById("result").innerHTML="Error: "+data.error;
    }

  } catch(err){
    document.getElementById("result").innerHTML="Connection failed";
  }
}

function render(data){

document.getElementById("result").innerHTML=`

<h3>${data.message}</h3>

<div class="tabs">
<div class="tab active" onclick="tab(event,'r')">Results</div>
<div class="tab" onclick="tab(event,'map')">Map</div>
<div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<!-- RESULTS -->
<div id="r" class="tab-content active">

<div class="card">
<h2>${data.analysis}</h2>
<p><b>Score:</b> ${data.score}</p>
<p><b>Confidence:</b> ${data.confidence}%</p>
</div>

<div class="image-row">

<div class="image-box">
<p><b>Original</b></p>
<img src="${URL.createObjectURL(selectedFile)}">
</div>

<div class="image-box">
<p><b>Heatmap</b></p>
${
data.heatmap
? `<img src="${data.heatmap}">`
: `<div style="height:400px;display:flex;align-items:center;justify-content:center;background:#111;">
     <span>No heatmap</span>
   </div>`
}
</div>

</div>

</div>

<!-- MAP -->
<div id="map" class="tab-content">
${
data.gps
? `<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed"></iframe>`
: "<p>No GPS data</p>"
}
</div>

<!-- METADATA -->
<div id="meta" class="tab-content">
<div class="card">
${
data.metadata?.available
? Object.entries(data.metadata.all).map(([k,v])=>`<p>${k}: ${v}</p>`).join("")
: "<p>No metadata</p>"
}
</div>
</div>
`;
}

function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}
</script>

</body>
</html>
