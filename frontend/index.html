<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

h1 { text-align:center; }

.drop {
  border:2px dashed #334155;
  padding:40px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:10px;
}

button {
  padding:10px 20px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:6px;
  margin:5px;
  cursor:pointer;
}

.tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tab { padding:10px; background:#334155; border-radius:6px; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.section {
  background:#020617;
  padding:15px;
  border-radius:8px;
  margin-top:15px;
}

.row { display:flex; gap:10px; flex-wrap:wrap; }
.row div { flex:1 1 45%; }

img {
  width:100%;
  max-height:420px;
  object-fit:contain;
  border-radius:6px;
}

/* Bars */
.bar { background:#1e293b; border-radius:6px; margin-bottom:10px; }
.bar-inner { background:#3b82f6; height:10px; border-radius:6px; }

</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<div class="drop" id="drop">
Click or Drag Image
<input type="file" id="file" hidden>
</div>

<button onclick="upload()">Analyze</button>
<button id="pdfBtn" style="display:none;" onclick="downloadPDF()">Download Report</button>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";
let selectedFile = null;
let currentData = null;

drop.onclick = () => file.click();

file.onchange = e => {
  selectedFile = e.target.files[0];
  drop.innerHTML = selectedFile.name;
};

drop.ondrop = e => {
  e.preventDefault();
  selectedFile = e.dataTransfer.files[0];
  drop.innerHTML = selectedFile.name;
};

drop.ondragover = e => e.preventDefault();

// -----------------------------
// UPLOAD
// -----------------------------
async function upload(){
  if(!selectedFile) return alert("Select file");

  document.getElementById("result").innerHTML = "Starting...";

  await fetch(API+"/health").catch(()=>{});

  const form = new FormData();
  form.append("image", selectedFile);

  const res = await fetch(API+"/api/analyze", {
    method:"POST",
    body:form
  });

  const data = await res.json();
  poll(data.job_id);
}

// -----------------------------
// POLL
// -----------------------------
function poll(id){
  const interval = setInterval(async()=>{
    const res = await fetch(API+"/api/status/"+id);
    const d = await res.json();

    if(d.status==="processing"){
      document.getElementById("result").innerHTML =
        "Processing: "+(d.step || "working...");
    }

    if(d.status==="done"){
      clearInterval(interval);
      currentData = d.result;
      render(d.result);
    }

  },1500);
}

// -----------------------------
// RENDER
// -----------------------------
function render(data){

  const original = URL.createObjectURL(selectedFile);
  document.getElementById("pdfBtn").style.display="inline-block";

  document.getElementById("result").innerHTML = `

  <div>
    <b>Score:</b> ${data.score} |
    <b>Confidence:</b> ${data.confidence}% |
    <b>AI:</b> ${data.ai_score ?? "N/A"}%
  </div>

  <div class="tabs">
    <div class="tab active" onclick="openTab(event,'results')">Results</div>
    <div class="tab" onclick="openTab(event,'heatmap')">Heatmap</div>
    <div class="tab" onclick="openTab(event,'simple')">Simple</div>
    <div class="tab" onclick="openTab(event,'analysis')">Analysis</div>
    <div class="tab" onclick="openTab(event,'expert')">Expert</div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="tab-content active">
    <div class="section">
      <div class="row">
        <div><img src="${original}"></div>
        <div><img src="${data.ela_image}"></div>
      </div>
    </div>
  </div>

  <!-- HEATMAP WITH CLICKABLE REGIONS -->
  <div id="heatmap" class="tab-content">
    <div class="section" style="position:relative;">

      <img id="heatmapImg" src="${data.heatmap}">

      <div id="overlay" style="
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
      "></div>

      <div id="regionInfo" style="margin-top:10px;"></div>

    </div>
  </div>

  <!-- SIMPLE VISUAL -->
  <div id="simple" class="tab-content">
    <div class="section">

      <h2>${data.simple_explanation?.result}</h2>

      <b>Risk Level:</b> ${data.simple_explanation?.risk_level}

      <div style="height:10px;background:#1e293b;margin-top:5px;">
        <div style="
          width:${data.confidence}%;
          height:10px;
          background:${getColor(data.simple_explanation?.risk_level)};
        "></div>
      </div>

      <h3>Meaning</h3>
      <p>${data.simple_explanation?.meaning}</p>

      <h3>Why</h3>
      ${(data.simple_explanation?.reasons||[]).map(r=>`<p>• ${r}</p>`).join("")}

      <h3>Next Steps</h3>
      <p>${data.simple_explanation?.next_steps}</p>

    </div>
  </div>

  <!-- ANALYSIS -->
  <div id="analysis" class="tab-content">
    <div class="section">
      ${bar("ELA",data.confidence_breakdown?.ela)}
      ${bar("Noise",data.confidence_breakdown?.noise)}
      ${bar("Sharpness",data.confidence_breakdown?.sharpness)}
      ${bar("AI",data.confidence_breakdown?.ai)}
    </div>
  </div>

  <!-- EXPERT -->
  <div id="expert" class="tab-content">
    <div class="section">
      <p>${data.executive_summary}</p>
      <p><b>${data.opinion}</b></p>
      <p>${data.confidence_reasoning}</p>
    </div>
  </div>
  `;

  setTimeout(()=>drawRegions(data.regions),300);
}

// -----------------------------
// DRAW REGIONS
// -----------------------------
function drawRegions(regions){
  const overlay = document.getElementById("overlay");
  overlay.innerHTML="";

  if(!regions) return;

  regions.forEach((r,i)=>{
    const box = document.createElement("div");

    box.style.position="absolute";
    box.style.border="2px solid red";
    box.style.cursor="pointer";

    box.style.left=r.x+"px";
    box.style.top=r.y+"px";
    box.style.width=r.w+"px";
    box.style.height=r.h+"px";

    box.onclick=()=>{
      document.getElementById("regionInfo").innerHTML =
        "<b>Region "+(i+1)+"</b><br>"+r.reason;
    };

    overlay.appendChild(box);
  });
}

// -----------------------------
function openTab(evt,name){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(name).classList.add("active");
  evt.target.classList.add("active");
}

// -----------------------------
function bar(label,val){
  return `
    <div>${label}: ${val}</div>
    <div class="bar">
      <div class="bar-inner" style="width:${val}%"></div>
    </div>
  `;
}

// -----------------------------
function getColor(level){
  if(level==="High") return "#ef4444";
  if(level==="Moderate") return "#f59e0b";
  return "#22c55e";
}

// -----------------------------
function downloadPDF(){
  if(!currentData?.report) return alert("No report");
  window.open(currentData.report);
}

</script>

</body>
</html>
