<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1 { text-align:center; }

button {
  padding:10px 20px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

/* Tabs */
.tabs {
  display:flex;
  gap:10px;
  margin-top:20px;
}

.tab {
  padding:10px;
  background:#334155;
  cursor:pointer;
  border-radius:6px;
}

.tab.active {
  background:#3b82f6;
}

.tab-content {
  display:none;
  margin-top:20px;
}

.tab-content.active {
  display:block;
}

/* Cards */
.card {
  background:#020617;
  padding:15px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<br>
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;

document.getElementById("file").onchange = e => {
  selectedFile = e.target.files[0];
};

// -----------------------------
// UPLOAD (SYNC VERSION)
// -----------------------------
async function upload(){
  if(!selectedFile) return alert("Select a file");

  document.getElementById("result").innerHTML = "Processing...";

  const form = new FormData();
  form.append("image", selectedFile);

  try {
    const res = await fetch(API + "/api/analyze", {
      method:"POST",
      body:form
    });

    const data = await res.json();

    if(data.status === "done"){
      render(data.result);
    } else {
      document.getElementById("result").innerHTML =
        "Error: " + (data.error || "Unknown error");
    }

  } catch (err) {
    document.getElementById("result").innerHTML =
      "Request failed: " + err;
  }
}

// -----------------------------
// RENDER RESULTS
// -----------------------------
function render(data){

  document.getElementById("result").innerHTML = `

    <h3>${data.message}</h3>

    <div class="tabs">
      <div class="tab active" onclick="openTab(event,'results')">Results</div>
      <div class="tab" onclick="openTab(event,'map')">Map</div>
      <div class="tab" onclick="openTab(event,'meta')">Metadata</div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="tab-content active">
      <div class="card">
        <p><b>Score:</b> ${data.score}</p>
        <p><b>Confidence:</b> ${data.confidence}</p>
      </div>
    </div>

    <!-- MAP -->
    <div id="map" class="tab-content">
      <div class="card">
        ${
          data.gps
          ? `
            <p><b>Coordinates:</b> ${data.gps.lat.toFixed(6)}, ${data.gps.lon.toFixed(6)}</p>
            <iframe
              width="100%"
              height="400"
              style="border:0;border-radius:8px;margin-top:10px;"
              loading="lazy"
              allowfullscreen
              src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed">
            </iframe>
          `
          : "<p>No GPS metadata found.</p>"
        }
      </div>
    </div>

    <!-- METADATA -->
    <div id="meta" class="tab-content">
      <div class="card">
        ${
          data.metadata?.available
          ? `
            <p><b>Camera:</b> ${data.metadata.Make || "Unknown"} ${data.metadata.Model || ""}</p>
            <p><b>Date Taken:</b> ${data.metadata.DateTime || "Unknown"}</p>
            <p><b>Software:</b> ${data.metadata.Software || "Unknown"}</p>
            <p><b>Resolution:</b> ${data.metadata.ImageWidth} x ${data.metadata.ImageHeight}</p>
          `
          : `
            <p>No metadata found.</p>
            <p style="opacity:0.7;">
              This is common for screenshots, social media images, or edited files.
            </p>
          `
        }
      </div>
    </div>
  `;
}

// -----------------------------
// TAB SWITCHING
// -----------------------------
function openTab(evt, name){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(name).classList.add("active");
  evt.target.classList.add("active");
}

</script>

</body>
</html>
