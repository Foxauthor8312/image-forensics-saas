<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

button { padding:10px; background:#3b82f6; border:none; color:white; border-radius:8px; margin:5px; cursor:pointer; }
#analyzeBtn { background:#22c55e; }

.tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tab { padding:10px; background:#1e293b; border-radius:8px; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:18px; border-radius:12px; }

.image-row { display:flex; gap:15px; flex-wrap:wrap; margin-top:20px; }
.image-box { flex:1 1 48%; position:relative; }
.image-box img { width:100%; max-height:400px; object-fit:contain; }

.overlay { position:absolute; inset:0; opacity:0; transition:.2s; }

#map { height:400px; border-radius:12px; }

.meta-container { max-height:400px; overflow-y:auto; }

.bar{height:8px;background:#1e293b;border-radius:6px;margin-bottom:8px;}
.bar-fill{height:8px;background:#3b82f6;}

.offline-banner{
  position:sticky;
  top:0;
  background:#7c2d12;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div id="progressOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;">
<div style="width:300px;background:#020617;padding:20px;border-radius:12px;text-align:center;">
<h3>Analyzing Image</h3>
<div style="background:#1e293b;height:10px;border-radius:6px;">
<div id="progressBar" style="height:10px;width:0%;background:#3b82f6;"></div>
</div>
<div id="progressPercent">0%</div>
<div id="progressText">Starting...</div>
</div>
</div>

<div class="container">
<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/*">
<button onclick="document.getElementById('rear').click()">📷 Rear</button>
<button onclick="document.getElementById('front').click()">🤳 Front</button>

<input id="rear" type="file" accept="image/*" capture="environment" hidden>
<input id="front" type="file" accept="image/*" capture="user" hidden>

<div id="result"></div>
</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null, previewURL=null, metadata={}, gps=null, mapInstance=null;

/* PROGRESS */
function showProgress(){progressOverlay.style.display="flex";}
function hideProgress(){progressOverlay.style.display="none";}
function setProgress(p,t){
  progressBar.style.width=p+"%";
  progressPercent.innerText=p+"%";
  progressText.innerText=t;
}

/* FILE HANDLER (ALL SOURCES) */
file.onchange=handleFile;
rear.onchange=handleFile;
front.onchange=handleFile;

async function handleFile(e){
  const f=e.target.files[0];
  if(!f) return;

  selectedFile=f;
  previewURL=URL.createObjectURL(f);

  await new Promise(r=>{
    EXIF.getData(f,function(){
      metadata=EXIF.getAllTags(this)||{};
      gps=extractGPS(metadata);
      r();
    });
  });

  analyzeImage(); // AUTO
}

/* GPS */
function extractGPS(meta){
  if(!meta.GPSLatitude||!meta.GPSLongitude)return null;
  const d=c=>c[0]+c[1]/60+c[2]/3600;
  return {lat:d(meta.GPSLatitude),lon:d(meta.GPSLongitude)};
}

/* ANALYZE */
async function analyzeImage(){

  if(!selectedFile) return;

  showProgress();

  // GPS fallback
  let finalGPS=gps;
  if(!finalGPS){
    try{
      finalGPS=await new Promise(resolve=>{
        navigator.geolocation.getCurrentPosition(
          p=>resolve({lat:p.coords.latitude,lon:p.coords.longitude,accuracy:p.coords.accuracy}),
          ()=>resolve(null)
        );
      });
    }catch{}
  }

  if(!navigator.onLine){
    render({
      analysis:"Offline Mode",
      score:0,
      confidence:0,
      simple_explanation:"Offline - limited analysis",
      technical_explanation:"",
      legal_explanation:"",
      confidence_note:"",
      signals:{},
      metadata:{all:metadata},
      gps:finalGPS,
      heatmap:null
    });
    hideProgress();
    return;
  }

  const form=new FormData();
  form.append("image",selectedFile);
  form.append("metadata",JSON.stringify(metadata));
  form.append("gps",JSON.stringify(finalGPS));

  setProgress(50,"Uploading...");

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();

  hideProgress();
  render(data.result);
}

/* RENDER */
async function render(d){

window.lastGPS=d.gps;

result.innerHTML=`
${!navigator.onLine?`<div class="offline-banner">Offline Mode</div>`:""}

<div class="tabs">
<div class="tab active" onclick="tab(event,'r')">Results</div>
<div class="tab" onclick="tab(event,'mapTab')">Map</div>
<div class="tab" onclick="tab(event,'metaTab')">Metadata</div>
<div class="tab" onclick="tab(event,'detailTab')">Detailed</div>
</div>

<div id="r" class="tab-content active">
<div class="card">

<h2>${d.analysis}</h2>
<p><b>Score:</b> ${d.score}%</p>
<p><b>Confidence:</b> ${d.confidence}%</p>

<p>${d.simple_explanation}</p>

<h3>Signals</h3>
${Object.entries(d.signals||{}).map(([k,v])=>`
<div>${k}: ${v}%</div>
<div class="bar"><div class="bar-fill" style="width:${v}%"></div></div>
`).join("")}

<label>
<input type="checkbox" id="overlayToggle"> Overlay Heatmap
</label>

</div>

<div class="image-row">
<div class="image-box">
<img id="orig" src="${previewURL}">
<img id="overlay" class="overlay" src="${d.heatmap||''}">
</div>
<div class="image-box">
${d.heatmap?`<img src="${d.heatmap}?t=${Date.now()}">`:""}
</div>
</div>
</div>

<div id="mapTab" class="tab-content"><div id="map"></div></div>

<div id="metaTab" class="tab-content">
<div class="card meta-container">
${Object.entries(d.metadata?.all||{}).map(([k,v])=>`<p><b>${k}</b>: ${v}</p>`).join("")}
</div>
</div>

<div id="detailTab" class="tab-content">
<div class="card">

<h2>Detailed Forensic Analysis</h2>

<p>Higher score = more anomalies detected.</p>

<p>Confidence reflects agreement between signals.</p>

${Object.entries(d.signals||{}).map(([k,v])=>`
<p><b>${k} (${v}%)</b></p>
`).join("")}

</div>
</div>
`;

setTimeout(()=>{if(d.gps)initMap(d.gps);},200);

// overlay toggle
const t=document.getElementById("overlayToggle");
if(t){
  t.onchange=()=>{
    document.getElementById("overlay").style.opacity=t.checked?0.6:0;
  }
}
}

/* MAP */
function initMap(gps){
  if(!gps)return;
  if(mapInstance)mapInstance.remove();
  mapInstance=L.map('map').setView([gps.lat,gps.lon],15);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(mapInstance);
  L.marker([gps.lat,gps.lon]).addTo(mapInstance);
  if(gps.accuracy){
    L.circle([gps.lat,gps.lon],{radius:gps.accuracy}).addTo(mapInstance);
  }
}

/* TABS */
function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
  if(id==="mapTab")setTimeout(()=>initMap(window.lastGPS),100);
}

</script>
</body>
</html>
