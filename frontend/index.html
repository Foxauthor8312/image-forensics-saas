<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  text-align: center;
  padding: 30px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
}

.green { background: #064e3b; }
.yellow { background: #78350f; }
.red { background: #7f1d1d; }

.viewer {
  position: relative;
  display: inline-block;
  margin-top: 20px;
}

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  text-align: center;
  padding: 30px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
}

.green { background: #064e3b; }
.yellow { background: #78350f; }
.red { background: #7f1d1d; }

.viewer {
  position: relative;
  display: inline-block;
}

.viewer img {
  width: 100%;
  display: block;
  border-radius: 8px;
}

#elaOverlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  opacity: 1;

  mix-blend-mode: difference; /* 👈 THIS makes it visible */
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof</h1>
<p>Analyze an image for authenticity</p>

<input type="file" id="file">

<div id="resultCard" class="card"></div>

<div class="viewer">
  <img id="originalImage">
  <img id="elaOverlay">
</div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function interpret(type) {
  if (type === "Likely Original") {
    return { color: "green", message: "Original image with no signs of editing." };
  }
  if (type === "Recompressed") {
    return { color: "yellow", message: "Image was saved or shared again." };
  }
  if (type === "Edited") {
    return { color: "red", message: "Possible image manipulation detected." };
  }
  return { color: "yellow", message: "Uncertain result." };
}

document.getElementById("file").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  // show original
  document.getElementById("originalImage").src =
    URL.createObjectURL(file);

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const conf = Math.round((data.classification?.confidence || 0.5) * 100);
  const ui = interpret(type);

  const card = document.getElementById("resultCard");
  card.className = "card " + ui.color;

  card.innerHTML = `
    <h2>${type}</h2>
    <p>${ui.message}</p>
    <p><strong>Confidence:</strong> ${conf}%</p>
  `;

  // ALWAYS SHOW OVERLAY IF AVAILABLE
  const overlay = document.getElementById("elaOverlay");

  if (data.ela && data.ela.overlay) {
    overlay.src = data.ela.overlay;
  } else {
    overlay.src = "";
  }
};
</script>

</body>
</html>
