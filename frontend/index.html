<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1000px; margin:auto; padding:20px; }

.tabs { display:flex; gap:10px; margin-top:20px; }
.tab { padding:10px; background:#334155; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:15px; margin-top:10px; }

.image-row { display:flex; gap:10px; flex-wrap:wrap; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:400px; object-fit:contain; }
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/jpeg">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;
let extractedMetadata = {};
let gpsData = null;

// -----------------------------
// EXTRACT EXIF IN BROWSER
// -----------------------------
document.getElementById("file").onchange = function(e){

  selectedFile = e.target.files[0];

  EXIF.getData(selectedFile, function(){

    extractedMetadata = EXIF.getAllTags(this);

    if(extractedMetadata.GPSLatitude && extractedMetadata.GPSLongitude){

      function convert(coord){
        return coord[0] + coord[1]/60 + coord[2]/3600;
      }

      let lat = convert(extractedMetadata.GPSLatitude);
      let lon = convert(extractedMetadata.GPSLongitude);

      if(extractedMetadata.GPSLatitudeRef === "S") lat = -lat;
      if(extractedMetadata.GPSLongitudeRef === "W") lon = -lon;

      gpsData = {lat, lon};
    }

    console.log("EXIF:", extractedMetadata);
  });
};

// -----------------------------
// RESIZE FOR ANALYSIS ONLY
// -----------------------------
function resizeImage(file){
  return new Promise(resolve=>{
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;
    reader.readAsDataURL(file);

    img.onload = ()=>{
      const canvas = document.createElement("canvas");

      let w = img.width;
      let h = img.height;
      const MAX = 1200;

      if(w > MAX || h > MAX){
        if(w > h){
          h *= MAX / w;
          w = MAX;
        } else {
          w *= MAX / h;
          h = MAX;
        }
      }

      canvas.width = w;
      canvas.height = h;

      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(blob=>{
        resolve(new File([blob], file.name, {type:"image/jpeg"}));
      }, "image/jpeg", 0.7);
    };
  });
}

// -----------------------------
// UPLOAD
// -----------------------------
async function upload(){

  if(!selectedFile){
    alert("Select file");
    return;
  }

  const resized = await resizeImage(selectedFile);

  const form = new FormData();
  form.append("image", resized);
  form.append("metadata", JSON.stringify(extractedMetadata));
  form.append("gps", JSON.stringify(gpsData));

  const res = await fetch(API + "/api/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  render(data.result);
}

// -----------------------------
// RENDER UI
// -----------------------------
function render(data){

document.getElementById("result").innerHTML = `

<h3>Analysis Result</h3>

<div class="tabs">
  <div class="tab active" onclick="tab(event,'r')">Results</div>
  <div class="tab" onclick="tab(event,'map')">Map</div>
  <div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">

<div class="card">
<h2>${data.analysis}</h2>

<p><b>Score:</b> ${data.score}</p>
<p><b>Confidence:</b> ${data.confidence}%</p>

<hr>

<p><b>Summary:</b><br>${data.simple_explanation}</p>
<p><b>Technical:</b><br>${data.technical_explanation}</p>
<p><b>Conclusion:</b><br>${data.legal_explanation}</p>
<p><b>Confidence Note:</b><br>${data.confidence_note}</p>

<br>

<a href="${data.pdf_report}" target="_blank"
style="display:inline-block;padding:10px;background:#22c55e;color:white;border-radius:6px;">
Download Forensic PDF Report
</a>

</div>

<div class="image-row">
  <div class="image-box">
    <p><b>Original</b></p>
    <img src="${URL.createObjectURL(selectedFile)}">
  </div>
  <div class="image-box">
    <p><b>Heatmap</b></p>
    <img src="${data.heatmap}">
  </div>
</div>

</div>

<div id="map" class="tab-content">
${
data.gps
? `<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed"></iframe>`
: "<p>No GPS data found</p>"
}
</div>

<div id="meta" class="tab-content">
<div class="card">
${
data.metadata?.available
? Object.entries(data.metadata.all).map(([k,v])=>`<p>${k}: ${v}</p>`).join("")
: "<p>No metadata found</p>"
}
</div>
</div>

`;
}

// -----------------------------
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>

</body>
</html>
