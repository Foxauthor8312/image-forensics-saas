<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

button { padding:10px; background:#3b82f6; border:none; color:white; border-radius:8px; margin:5px; cursor:pointer; }
#analyzeBtn { background:#22c55e; }

.tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tab { padding:10px; background:#1e293b; border-radius:8px; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:18px; border-radius:12px; }

.image-row { display:flex; gap:15px; flex-wrap:wrap; margin-top:20px; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:400px; object-fit:contain; }

#map { height:400px; border-radius:12px; }

.meta-container { max-height:400px; overflow-y:auto; }

.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:9000;}
.sheet{position:fixed;left:0;right:0;bottom:-300px;background:#020617;border-radius:16px 16px 0 0;padding:16px;z-index:9001;transition:bottom .25s;}
.sheet.open{bottom:0;}
.option{padding:12px;background:#1e293b;border-radius:8px;margin-top:8px;cursor:pointer;}

.bar{height:8px;background:#1e293b;border-radius:6px;margin-bottom:8px;}
.bar-fill{height:8px;background:#3b82f6;border-radius:6px;}

.badge{padding:6px 12px;border-radius:20px;font-weight:bold;display:inline-block;margin-top:10px;}
</style>
</head>

<body>

<!-- PROGRESS -->
<div id="progressOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;">
  <div style="width:300px;background:#020617;padding:20px;border-radius:12px;text-align:center;">
    <h3>Analyzing Image</h3>
    <div style="background:#1e293b;height:10px;border-radius:6px;margin:15px 0;">
      <div id="progressBar" style="height:10px;width:0%;background:#3b82f6;border-radius:6px;"></div>
    </div>
    <div id="progressPercent">0%</div>
    <div id="progressText">Starting...</div>
  </div>
</div>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/*">
<button onclick="openSheet()">📷 Take Photo</button>
<button id="analyzeBtn" onclick="analyzeImage()">Analyze</button>

<div id="result"></div>

</div>

<!-- CAMERA -->
<div id="sheetBackdrop" class="sheet-backdrop" onclick="closeSheet()"></div>
<div id="cameraSheet" class="sheet">
<label class="option">📷 Rear Camera<input type="file" id="cameraRear" accept="image/*" capture="environment" hidden></label>
<label class="option">🤳 Front Camera<input type="file" id="cameraFront" accept="image/*" capture="user" hidden></label>
</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null, previewURL=null, metadata={}, gps=null, mapInstance=null;

/* PROGRESS */
function showProgress(){progressOverlay.style.display="flex";}
function hideProgress(){progressOverlay.style.display="none";}
function setProgress(p,t){
  progressBar.style.width=p+"%";
  progressPercent.innerText=p+"%";
  progressText.innerText=t;
}

/* CAMERA */
function openSheet(){sheetBackdrop.style.display="block";cameraSheet.classList.add("open");}
function closeSheet(){sheetBackdrop.style.display="none";cameraSheet.classList.remove("open");}

/* FILE */
async function processFile(file){
  selectedFile=file;
  previewURL=URL.createObjectURL(file);

  await new Promise(r=>{
    EXIF.getData(file,function(){
      metadata=EXIF.getAllTags(this)||{};
      gps=extractGPS(metadata);
      r();
    });
  });
}

file.onchange=e=>processFile(e.target.files[0]);
cameraRear.onchange=e=>{processFile(e.target.files[0]);closeSheet();}
cameraFront.onchange=e=>{processFile(e.target.files[0]);closeSheet();}

/* GPS */
function extractGPS(meta){
  if(!meta.GPSLatitude||!meta.GPSLongitude) return null;
  const d=c=>c[0]+c[1]/60+c[2]/3600;
  let lat=d(meta.GPSLatitude),lon=d(meta.GPSLongitude);
  if(meta.GPSLatitudeRef==="S")lat=-lat;
  if(meta.GPSLongitudeRef==="W")lon=-lon;
  return {lat,lon};
}

/* REVERSE GEOCODE */
async function reverseGeocode(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    const d=await r.json();
    return d.display_name;
  }catch{return null;}
}

/* RESIZE */
async function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image(),reader=new FileReader();
    reader.onload=e=>img.src=e.target.result;
    img.onload=()=>{
      try{
        const canvas=document.createElement("canvas");
        let w=img.width,h=img.height,MAX=1280;
        if(w>MAX){h*=MAX/w;w=MAX;}
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        canvas.toBlob(b=>resolve(b?new File([b],"resized.jpg",{type:"image/jpeg"}):file));
      }catch{resolve(file);}
    };
    img.onerror=()=>resolve(file);
    reader.readAsDataURL(file);
  });
}

/* ANALYZE */
async function analyzeImage(){
  if(!selectedFile)return alert("Select image");

  showProgress();
  setProgress(20,"Preparing...");

  const resized=await resizeImage(selectedFile);

  setProgress(40,"Uploading...");

  const form=new FormData();
  form.append("image",resized);
  form.append("metadata",JSON.stringify(metadata));
  form.append("gps",JSON.stringify(gps));

  let res;
  try{
    res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  }catch{
    hideProgress();
    alert("Server unreachable");
    return;
  }

  setProgress(80,"Processing...");

  const data=await res.json();

  setProgress(100,"Done");

  setTimeout(()=>{
    hideProgress();
    render(data.result);
  },300);
}

/* GAUGE */
function advancedGauge(v,label){
  const r=50,c=2*Math.PI*r,o=c-(v/100)*c;
  const col=v>70?"#ef4444":v>40?"#f59e0b":"#22c55e";
  return `<div style="text-align:center">
    <svg width="120" height="120" style="transform:rotate(-90deg)">
      <circle cx="60" cy="60" r="${r}" stroke="#1e293b" stroke-width="10" fill="none"/>
      <circle cx="60" cy="60" r="${r}" stroke="${col}" stroke-width="10"
        stroke-dasharray="${c}" stroke-dashoffset="${o}" fill="none"/>
    </svg>
    <div style="margin-top:-70px;font-weight:bold;">${v}%</div>
    <div style="margin-top:40px;">${label}</div>
  </div>`;
}

/* RENDER */
async function render(d){

window.lastGPS=d.gps;

let addr="";
if(d.gps){
  const a=await reverseGeocode(d.gps.lat,d.gps.lon);
  if(a) addr=`<p><b>Location:</b> ${a}</p>`;
}

const verdictColor = d.score>70?"#ef4444":d.score>40?"#f59e0b":"#22c55e";
const verdictText = d.score>70?"Likely Edited":d.score>40?"Possibly Edited":"Likely Original";

result.innerHTML=`

<div class="tabs">
<div class="tab active" onclick="tab(event,'r')">Results</div>
<div class="tab" onclick="tab(event,'mapTab')">Map</div>
<div class="tab" onclick="tab(event,'metaTab')">Metadata</div>
<div class="tab" onclick="tab(event,'detailTab')">Detailed</div>
</div>

<div id="r" class="tab-content active">
<div class="card">

<h2>${d.analysis}</h2>

<div class="badge" style="background:${verdictColor}">
${verdictText}
</div>

<div style="display:flex;gap:30px;flex-wrap:wrap;margin-top:15px;">
${advancedGauge(d.score,"Score")}
${advancedGauge(d.confidence,"Confidence")}
</div>

${addr}

<p><b>Summary:</b> ${d.simple_explanation}</p>
<p><b>Technical:</b> ${d.technical_explanation}</p>
<p><b>Conclusion:</b> ${d.legal_explanation}</p>
<p><b>Confidence:</b> ${d.confidence_note}</p>

${d.pdf_report?`<a href="${d.pdf_report}" target="_blank">Download PDF</a>`:""}

<h3>Signals</h3>
${Object.entries(d.signals||{}).map(([k,v])=>`
<div>${k}: ${v}%</div>
<div class="bar"><div class="bar-fill" style="width:${v}%"></div></div>
`).join("")}

</div>

<div class="image-row">
<div class="image-box"><img src="${previewURL}"></div>
<div class="image-box"><img src="${d.heatmap}?t=${Date.now()}"></div>
</div>

</div>

<div id="detailTab" class="tab-content">
<div class="card">

<h2>Detailed Forensic Analysis</h2>

<p>This system evaluates multiple forensic signals to determine image integrity.</p>

<h3>Score (${d.score}%)</h3>
<p>Higher score = more anomalies → more likely edited.</p>

<h3>Confidence (${d.confidence}%)</h3>
<p>Confidence reflects agreement between signals.</p>

<h3>Signals</h3>
${Object.entries(d.signals||{}).map(([k,v])=>`<p><b>${k}</b>: ${v}%</p>`).join("")}

</div>
</div>

<div id="mapTab" class="tab-content"><div id="map"></div></div>

<div id="metaTab" class="tab-content"><div class="card meta-container">
${Object.entries(d.metadata.all||{}).map(([k,v])=>`<p><b>${k}:</b> ${v}</p>`).join("")}
</div></div>
`;
}

/* MAP */
function initMap(gps){
if(!gps)return;
if(mapInstance){mapInstance.remove();}
mapInstance=L.map('map').setView([gps.lat,gps.lon],15);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(mapInstance);
L.marker([gps.lat,gps.lon]).addTo(mapInstance);
if(gps.accuracy){
  L.circle([gps.lat,gps.lon],{radius:gps.accuracy}).addTo(mapInstance);
}
}

/* TABS */
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
if(id==="mapTab"){setTimeout(()=>initMap(window.lastGPS),100);}
}

</script>

</body>
</html>
