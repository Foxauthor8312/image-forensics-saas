<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  text-align: center;
  padding: 30px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
}

.green { background: #064e3b; }
.yellow { background: #78350f; }
.red { background: #7f1d1d; }

img {
  max-width: 100%;
  margin-top: 15px;
  border-radius: 8px;
}

h2 { margin-bottom: 10px; }
</style>
</head>

<body>

<div class="container">

<h1>PixelProof</h1>
<p>Analyze an image for signs of editing or recompression</p>

<input type="file" id="file">

<div id="resultCard" class="card"></div>

<h3>Uploaded Image</h3>
<img id="originalImage">

<h3>Analysis Overlay</h3>
<img id="elaImage" style="display:none;">

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function interpret(type) {
  if (type === "Likely Original") {
    return {
      color: "green",
      message: "This appears to be an original, unaltered camera image."
    };
  }
  if (type === "Recompressed") {
    return {
      color: "yellow",
      message: "This image was likely saved, downloaded, or shared again. This is normal behavior."
    };
  }
  if (type === "Edited") {
    return {
      color: "red",
      message: "This image shows strong indicators of possible modification."
    };
  }
  return {
    color: "yellow",
    message: "The result is inconclusive."
  };
}

document.getElementById("file").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  // SHOW ORIGINAL IMAGE
  document.getElementById("originalImage").src =
    URL.createObjectURL(file);

  const form = new FormData();
  form.append("image", file);

  let data;

  try {
    const res = await fetch(API + "/analyze", {
      method: "POST",
      body: form
    });

    data = await res.json();

  } catch (err) {
    document.getElementById("resultCard").innerHTML =
      "<h2>Error</h2><p>Upload failed. Please try again.</p>";
    return;
  }

  const type = data.classification?.type || "Unknown";
  const conf = Math.round((data.classification?.confidence || 0.5) * 100);

  const ui = interpret(type);

  const card = document.getElementById("resultCard");

  card.className = "card " + ui.color;

  card.innerHTML = `
    <h2>${type}</h2>
    <p>${ui.message}</p>
    <p><strong>Confidence:</strong> ${conf}%</p>
  `;

  // OPTIONAL HEATMAP
  const elaImg = document.getElementById("elaImage");

  if (data.ela && data.ela.overlay) {
    elaImg.src = data.ela.overlay;
    elaImg.style.display = "block";
  } else {
    elaImg.style.display = "none";
  }
};
</script>

</body>
</html>
