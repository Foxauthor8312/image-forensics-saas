<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1000px; margin:auto; padding:20px; }

.tabs { display:flex; gap:10px; margin-top:20px; }
.tab { padding:10px; background:#334155; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:10px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";
let selectedFile = null;

file.onchange = e => selectedFile = e.target.files[0];

// -----------------------------
async function upload(){
  if(!selectedFile) return alert("Select a file");

  document.getElementById("result").innerHTML = "Processing...";

  const form = new FormData();
  form.append("image", selectedFile);

  try {
    await fetch(API + "/health");
  } catch {}

  try {
    const res = await fetch(API + "/api/analyze", {
      method:"POST",
      body:form
    });

    const data = await res.json();

    if(data.status === "done"){
      render(data.result);
    } else {
      document.getElementById("result").innerHTML = "Error: " + data.error;
    }

  } catch(err){
    document.getElementById("result").innerHTML = "Connection failed.";
  }
}

// -----------------------------
function render(data){

  document.getElementById("result").innerHTML = `

<h3>${data.message}</h3>

<div class="tabs">
<div class="tab active" onclick="tab(event,'res')">Results</div>
<div class="tab" onclick="tab(event,'map')">Map</div>
<div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<!-- RESULTS -->
<div id="res" class="tab-content active">
<div class="card">
<p><b>Analysis:</b> ${data.analysis}</p>
<p><b>Score:</b> ${data.score}</p>
<p><b>Confidence:</b> ${data.confidence}</p>
</div>
</div>

<!-- MAP -->
<div id="map" class="tab-content">
<div class="card">
${
data.gps
? `
<p>${data.gps.lat}, ${data.gps.lon}</p>
<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed"></iframe>
`
: "<p>No GPS data found</p>"
}
</div>
</div>

<!-- METADATA -->
<div id="meta" class="tab-content">
<div class="card">
${
data.metadata?.available
? Object.entries(data.metadata.all)
    .map(([k,v]) => `<p><b>${k}:</b> ${v}</p>`)
    .join("")
: "<p>No metadata found</p>"
}
</div>
</div>

`;
}

// -----------------------------
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}
</script>

</body>
</html>
