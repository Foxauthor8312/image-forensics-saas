<!DOCTYPE html>
<html>
<head>
  <title>PixelProof</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
    }

    h1 {
      font-size: 36px;
    }

    button {
      background: #3b82f6;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #2563eb;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin-top: 25px;
      border-radius: 10px;
      text-align: left;
    }

    .comparison {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .comparison div {
      flex: 1;
      min-width: 250px;
    }

    img {
      margin-top: 10px;
      border-radius: 8px;
      width: 100%;
    }

    pre {
      background: #020617;
      padding: 10px;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>PixelProof 🔍</h1>

    <input type="file" id="fileInput"><br>
    <button onclick="upload()">Analyze Image</button>

    <div id="result"></div>

    <br>
    <button id="pdfBtn" onclick="downloadReport()" style="display:none;">
      Download PDF Report
    </button>
  </div>

  <script>
    const API_BASE = "https://pixelproof-backend-v2.onrender.com";

    async function upload() {
      const file = document.getElementById("fileInput").files[0];
      const resultDiv = document.getElementById("result");
      const pdfBtn = document.getElementById("pdfBtn");

      if (!file) {
        alert("Please select a file");
        return;
      }

      resultDiv.innerHTML = "<p>Analyzing image...</p>";
      pdfBtn.style.display = "none";

      const formData = new FormData();
      formData.append("image", file);

      try {
        const res = await fetch(`${API_BASE}/api/analyze`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        window.lastResult = data;
        pdfBtn.style.display = "inline-block";

        const confidenceLabel =
          data.confidence > 70 ? "High suspicion" :
          data.confidence > 40 ? "Moderate" :
          "Low";

        const originalURL = URL.createObjectURL(file);

        resultDiv.innerHTML = `
          <div class="card">
            <h2>Analysis Result</h2>

            <p><strong>Score:</strong> ${data.score}</p>
            <p><strong>Confidence:</strong> ${data.confidence || 0}% (${confidenceLabel})</p>
            <p><strong>Conclusion:</strong> ${data.ela_result}</p>

            <h3>Findings</h3>
            <ul>
              ${data.findings.map(f => `<li>${f}</li>`).join("")}
            </ul>

            <h3>Image Comparison</h3>
            <div class="comparison">
              <div>
                <p><strong>Original</strong></p>
                <img src="${originalURL}" />
              </div>
              <div>
                <p><strong>ELA</strong></p>
                <img src="${data.ela_image}" />
              </div>
            </div>

            <h3>Metadata</h3>
            ${
              Object.keys(data.metadata || {}).length === 0
              ? "<p>No metadata found</p>"
              : `<pre>${JSON.stringify(data.metadata, null, 2)}</pre>`
            }
          </div>
        `;

      } catch (err) {
        console.error(err);
        resultDiv.innerHTML = "<p style='color:red;'>Error analyzing image</p>";
      }
    }

    async function downloadReport() {
      if (!window.lastResult) {
        alert("Run analysis first");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/report`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(window.lastResult)
        });

        const data = await res.json();

        if (data.report) {
          window.open(data.report, "_blank");
        } else {
          alert("Report generation failed");
        }

      } catch (err) {
        console.error(err);
        alert("Failed to generate report");
      }
    }
  </script>
</body>
</html>
