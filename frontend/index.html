<!DOCTYPE html>
<html>
<head>
  <title>PixelProof</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
    }

    button {
      padding: 10px 20px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin-top: 20px;
      border-radius: 8px;
      text-align: left;
    }

    .comparison {
      display: flex;
      gap: 10px;
    }

    img {
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>PixelProof 🔍</h1>

    <input type="file" id="fileInput"><br>
    <button onclick="upload()">Analyze</button>

    <div id="result"></div>

    <button id="pdfBtn" style="display:none;" onclick="downloadReport()">
      Download PDF
    </button>
  </div>

  <script>
    const API = "https://pixelproof-backend-v2.onrender.com";

    async function upload() {
      const file = document.getElementById("fileInput").files[0];
      const result = document.getElementById("result");
      const pdfBtn = document.getElementById("pdfBtn");

      if (!file) return alert("Select a file");

      result.innerHTML = "Analyzing...";
      pdfBtn.style.display = "none";

      const form = new FormData();
      form.append("image", file);

      try {
        const res = await fetch(API + "/api/analyze", {
          method: "POST",
          body: form
        });

        const data = await res.json();
        window.lastResult = data;

        pdfBtn.style.display = "block";

        const original = URL.createObjectURL(file);

        result.innerHTML = `
          <div class="card">
            <h3>Result</h3>
            Score: ${data.score}<br>
            Confidence: ${data.confidence}%<br>
            ${data.ela_result}

            <h4>Images</h4>
            <div class="comparison">
              <div><img src="${original}"></div>
              <div><img src="${data.ela_image}"></div>
            </div>

            <h4>Metadata</h4>
            <pre>${JSON.stringify(data.metadata, null, 2)}</pre>
          </div>
        `;
      } catch (e) {
        result.innerHTML = "Error: " + e;
      }
    }

    async function downloadReport() {
      const res = await fetch(API + "/api/report", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(window.lastResult)
      });

      const data = await res.json();
      window.open(data.report);
    }
  </script>
</body>
</html>
