<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

button { padding:10px; background:#3b82f6; border:none; color:white; border-radius:6px; margin:5px; cursor:pointer; }
#analyzeBtn { background:#22c55e; }

.tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tab { padding:10px; background:#1e293b; border-radius:6px; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:#020617; padding:18px; border-radius:10px; }

.image-row { display:flex; gap:15px; flex-wrap:wrap; margin-top:20px; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:400px; object-fit:contain; }

#map { height:400px; border-radius:10px; }

.meta-container { max-height:400px; overflow-y:auto; }
.card p { word-break:break-word; }
</style>
</head>

<body>

<!-- ================= PROGRESS OVERLAY ================= -->
<div id="progressOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;align-items:center;justify-content:center;">
  <div style="width:300px;background:#020617;padding:20px;border-radius:10px;text-align:center;">
    <h3>Analyzing Image</h3>
    <div style="background:#1e293b;height:10px;border-radius:5px;margin:15px 0;">
      <div id="progressBar" style="height:10px;width:0%;background:#3b82f6;border-radius:5px;"></div>
    </div>
    <div id="progressPercent">0%</div>
    <div id="progressText" style="margin-top:10px;font-size:14px;">Starting...</div>
  </div>
</div>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file"><br>

<button onclick="capturePhoto()">📷 Capture</button>
<button id="analyzeBtn" onclick="analyzeImage()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null, previewURL=null, metadata={}, gps=null, mapInstance=null;

/* ================= PROGRESS ================= */
function showProgress(){ document.getElementById("progressOverlay").style.display="flex"; }
function hideProgress(){ document.getElementById("progressOverlay").style.display="none"; }
function setProgress(p,t){
  document.getElementById("progressBar").style.width=p+"%";
  document.getElementById("progressPercent").innerText=p+"%";
  document.getElementById("progressText").innerText=t;
}

/* ================= RESIZE ================= */
async function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image(), r=new FileReader();
    r.onload=e=>img.src=e.target.result;
    img.onload=()=>{
      const c=document.createElement("canvas"), MAX=1280;
      let w=img.width,h=img.height;
      if(w>h&&w>MAX){h*=MAX/w;w=MAX;} else if(h>MAX){w*=MAX/h;h=MAX;}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>resolve(new File([b],"resized.jpg",{type:"image/jpeg"})),"image/jpeg",0.85);
    };
    r.readAsDataURL(file);
  });
}

/* ================= EXIF ================= */
function extractGPS(meta){
  if(!meta.GPSLatitude||!meta.GPSLongitude) return null;
  const d=c=>c[0]+c[1]/60+c[2]/3600;
  let lat=d(meta.GPSLatitude),lon=d(meta.GPSLongitude);
  if(meta.GPSLatitudeRef==="S")lat=-lat;
  if(meta.GPSLongitudeRef==="W")lon=-lon;
  return {lat,lon,source:"EXIF"};
}

file.onchange=async e=>{
  selectedFile=e.target.files[0];
  previewURL=URL.createObjectURL(selectedFile);
  await new Promise(r=>EXIF.getData(selectedFile,function(){
    metadata=EXIF.getAllTags(this)||{};
    gps=extractGPS(metadata);
    r();
  }));
};

/* ================= GPS ================= */
function getDeviceLocation(){
  return new Promise(r=>{
    navigator.geolocation.getCurrentPosition(
      p=>r({lat:p.coords.latitude,lon:p.coords.longitude,accuracy:p.coords.accuracy,source:"Device"}),
      ()=>r(null)
    );
  });
}

/* ================= CAMERA ================= */
async function capturePhoto(){
  const s=await navigator.mediaDevices.getUserMedia({video:true});
  const v=document.createElement("video");v.srcObject=s;v.play();
  const o=document.createElement("div");o.style="position:fixed;inset:0;background:#000;z-index:9999;";o.appendChild(v);
  const b=document.createElement("button");b.innerText="Capture";b.style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%)";o.appendChild(b);
  document.body.appendChild(o);
  b.onclick=async()=>{
    const c=document.createElement("canvas");
    c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext("2d").drawImage(v,0,0);
    c.toBlob(async blob=>{
      selectedFile=new File([blob],"capture.jpg");
      previewURL=URL.createObjectURL(selectedFile);
      gps=await getDeviceLocation();
    });
    s.getTracks().forEach(t=>t.stop());
    document.body.removeChild(o);
  };
}

/* ================= ANALYZE ================= */
async function analyzeImage(){

  if(!selectedFile) return alert("Select image");

  showProgress();
  setProgress(10,"Preparing...");

  const resized=await resizeImage(selectedFile);

  setProgress(30,"Getting location...");
  let finalGPS=gps||await getDeviceLocation();

  setProgress(60,"Uploading...");

  const form=new FormData();
  form.append("image",resized);
  form.append("metadata",JSON.stringify(metadata));
  form.append("gps",JSON.stringify(finalGPS));

  let res;
  try{ res=await fetch(API+"/api/analyze",{method:"POST",body:form}); }
  catch{ hideProgress(); return alert("Upload failed"); }

  setProgress(85,"Processing...");
  const data=await res.json();

  setProgress(100,"Done");

  setTimeout(()=>{
    hideProgress();
    render(data.result);
  },400);
}

/* ================= GAUGE ================= */
function gauge(v,label){
  const r=50,c=2*Math.PI*r,o=c-(v/100)*c;
  const color=v>70?"#ef4444":v>40?"#f59e0b":"#22c55e";
  return `<div style="text-align:center">
    <svg width="120" height="120" style="transform:rotate(-90deg)">
      <circle cx="60" cy="60" r="${r}" stroke="#1e293b" stroke-width="10" fill="none"/>
      <circle cx="60" cy="60" r="${r}" stroke="${color}" stroke-width="10"
        stroke-dasharray="${c}" stroke-dashoffset="${o}" fill="none"/>
    </svg>
    <div style="margin-top:-70px;font-weight:bold;">${v}%</div>
    <div style="margin-top:40px;">${label}</div>
  </div>`;
}

/* ================= RENDER ================= */
function render(d){

window.lastGPS=d.gps;

document.getElementById("result").innerHTML=`

<div class="tabs">
<div class="tab active" onclick="tab(event,'r')">Results</div>
<div class="tab" onclick="tab(event,'mapTab')">Map</div>
<div class="tab" onclick="tab(event,'metaTab')">Metadata</div>
<div class="tab" onclick="tab(event,'detailTab')">Detailed</div>
<div class="tab" onclick="tab(event,'aboutTab')">About</div>
</div>

<div id="r" class="tab-content active">
<div class="card">

<h2>${d.analysis}</h2>

<div style="display:flex;gap:30px;flex-wrap:wrap;">
${gauge(d.score,"Manipulation Score")}
${gauge(d.confidence,"Confidence")}
</div>

<div style="margin-top:15px;background:#020617;padding:12px;border-radius:8px;font-size:14px;">
<b>How to Read These Results</b>
<p>Low score = likely original • High score = likely edited</p>
</div>

<p><b>Summary:</b> ${d.simple_explanation}</p>
<p><b>Technical:</b> ${d.technical_explanation}</p>
<p><b>Conclusion:</b> ${d.legal_explanation}</p>
<p><b>Confidence:</b> ${d.confidence_note}</p>

<div style="margin:10px 0;">
${d.pdf_report ? `<a href="${d.pdf_report}" target="_blank">Download PDF Report</a>` : ""}
</div>

<h3>Signals</h3>
${Object.entries(d.signals||{}).map(([k,v])=>`
<div>${k}: ${v}</div>
<div style="background:#1e293b;height:8px;">
<div style="width:${v}%;height:8px;background:#3b82f6;"></div>
</div>`).join("")}

</div>

<div class="image-row">
<div class="image-box"><img src="${previewURL}"></div>
<div class="image-box"><img src="${d.heatmap}?t=${Date.now()}"></div>
</div>

</div>

<div id="mapTab" class="tab-content"><div id="map"></div></div>

<div id="metaTab" class="tab-content"><div class="card"><div class="meta-container">
${d.metadata?.available ? Object.entries(d.metadata.all).map(([k,v])=>`<p><b>${k}:</b> ${v}</p>`).join(""):"No metadata"}
</div></div></div>

<div id="detailTab" class="tab-content"><div class="card">
Score = likelihood of manipulation. Confidence = agreement between signals.
</div></div>

<div id="aboutTab" class="tab-content"><div class="card">
PixelProof — Barry Mattison-Off Road Artist Photography
</div></div>
`;
}

/* ================= MAP ================= */
function initMap(gps){
  if(mapInstance){ mapInstance.remove(); mapInstance=null; }

  if(!gps || isNaN(gps.lat) || isNaN(gps.lon)){
    document.getElementById("map").innerHTML="No valid location data";
    return;
  }

  mapInstance=L.map('map').setView([gps.lat,gps.lon],15);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    .addTo(mapInstance);

  L.marker([gps.lat,gps.lon]).addTo(mapInstance);

  if(gps.accuracy){
    L.circle([gps.lat,gps.lon],{radius:gps.accuracy}).addTo(mapInstance);
  }

  setTimeout(()=>mapInstance.invalidateSize(),200);
}

/* ================= TABS ================= */
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
if(id==="mapTab"){ setTimeout(()=>initMap(window.lastGPS),100); }
}

</script>

</body>
</html>
