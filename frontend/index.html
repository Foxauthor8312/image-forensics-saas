<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:900px;margin:auto}
.panel{background:#1e293b;padding:20px;border-radius:12px}
.drop{border:2px dashed #555;padding:30px;text-align:center;cursor:pointer}
.progress{height:6px;background:#111;margin:10px 0;display:none}
.fill{height:100%;width:0;background:#3b82f6}
img.preview{max-width:100%;margin-top:10px;border-radius:8px}
</style>

</head>

<body>
<div class="container">
<div class="panel">

<h2>PixelProof</h2>

<div id="drop" class="drop">Tap to Upload Image</div>
<input type="file" id="file" accept="image/*" hidden>

<div id="status"></div>
<div class="progress" id="bar"><div class="fill" id="fill"></div></div>

<div id="result"></div>

</div>
</div>

<script>
const API = "https://image-forensics-saas.onrender.com";

const file = document.getElementById("file");
const drop = document.getElementById("drop");
const result = document.getElementById("result");
const bar = document.getElementById("bar");
const fill = document.getElementById("fill");
const status = document.getElementById("status");

drop.onclick = () => file.click();

file.onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  analyze(f);
};

async function analyze(f){

  const form = new FormData();
  form.append("image", f);

  bar.style.display = "block";
  fill.style.width = "20%";
  status.innerText = "Uploading...";

  try{

    const res = await fetch(API + "/analyze", {
      method: "POST",
      body: form
    });

    console.log("Response:", res);

    if (!res.ok) {
      throw new Error("Server error: " + res.status);
    }

    fill.style.width = "70%";
    status.innerText = "Processing...";

    const data = await res.json();

    console.log("Data:", data);

    fill.style.width = "100%";
    status.innerText = "Done";

    setTimeout(()=>bar.style.display="none",500);

    render(data);

  } catch(err){

    console.error(err);
    bar.style.display = "none";
    status.innerText = "Error: " + err.message;

  }
}

function render(d){

  const likelihood = d.tampering?.likelihood || 0;

  const label = d.tampering?.label || "Unknown";

  const percent = Math.round(likelihood * 100);

  const color =
    likelihood > 0.7 ? "#ef4444" :
    likelihood > 0.4 ? "#facc15" :
    "#22c55e";

  result.innerHTML = `
    <img class="preview" src="${d.ela?.overlay || ""}">

    <h3 style="color:${color}">${label}</h3>
    <p>Likelihood: ${percent}%</p>

    <p><strong>Camera:</strong> ${d.exif?.data?.camera?.make || "Unknown"} ${d.exif?.data?.camera?.model || ""}</p>
    <p><strong>Date:</strong> ${d.exif?.data?.capture?.date || "Unknown"}</p>

    <p><strong>ELA Score:</strong> ${d.ela?.score || 0} (${d.ela?.level || ""})</p>
  `;
}
</script>

</body>
</html>
