<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0a;
  --panel: #0f172a;
  --border: #1e293b;
  --muted: #9ca3af;
  --text: #e5e7eb;
  --blue: #3b82f6;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 32px;
}
.header img { height: 56px; }
.header span { opacity: 0.7; font-size: 15px; }

/* LAYOUT */
.wrapper {
  display: grid;
  grid-template-columns: 420px 1fr;
  min-height: calc(100vh - 80px);
}

/* LEFT */
.left {
  padding: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tagline {
  color: var(--muted);
  text-align: center;
  margin-bottom: 30px;
  font-size: 15px;
  line-height: 1.5;
}

/* UPLOAD */
.upload {
  width: 100%;
  max-width: 320px;
  border: 2px dashed #2a2a2a;
  padding: 26px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}
.upload:hover {
  border-color: var(--blue);
  background: rgba(59,130,246,0.05);
}

/* RIGHT */
.right {
  background: #111;
  padding: 40px;
}

/* PANEL */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 18px;
  border-radius: 12px;
  max-width: 520px;
  margin: 0 auto 20px auto;
}

/* RESULT */
.result-title {
  font-size: 18px;
  font-weight: 600;
}
.conf-bar {
  height: 6px;
  background: var(--border);
  margin: 10px 0;
}
.conf-fill {
  height: 100%;
  background: var(--blue);
}

/* SLIDER */
.viewer {
  max-width: 520px;
  margin: 0 auto;
}
.slider-container {
  position: relative;
}
.slider-container img {
  width: 100%;
  border-radius: 8px;
}
.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}
.overlay img {
  width: 100%;
  mix-blend-mode: screen;
  opacity: 0.8;
}
.slider {
  display: block;
  width: 100%;
  margin-top: 12px;
}

/* META */
.meta { font-size: 14px; margin-bottom: 6px; }
.label { color: var(--muted); }

/* SMALL */
.small { font-size: 13px; color: var(--muted); }
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <span>PixelProof</span>
</div>

<div class="wrapper">

<div class="left">
  <div class="tagline">
    Detect edits and verify image authenticity instantly.
  </div>

  <label class="upload">
    <input type="file" id="file" hidden>
    Select an image
  </label>
</div>

<div class="right">

<div id="result" class="panel"></div>
<div id="meta" class="panel" style="display:none;"></div>

<div id="viewer" class="viewer" style="display:none;">
  <div class="slider-container">
    <img id="img">
    <div class="overlay" id="overlay">
      <img id="ela">
    </div>
  </div>
  <input type="range" id="slider" min="0" max="100" value="50" class="slider">
</div>

</div>
</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

const slider = document.getElementById("slider");
const overlay = document.getElementById("overlay");

slider.oninput = () => {
  overlay.style.width = slider.value + "%";
};

document.getElementById("file").onchange = async e => {

  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("viewer").style.display = "block";
  document.getElementById("img").src = URL.createObjectURL(file);

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const conf = Math.round((data.classification?.confidence || 0.5) * 100);
  const type = data.classification?.type || "Unknown";

  let breakdown = [];
  if (data.ela?.score > 25) breakdown.push(["High compression anomalies", -30]);
  else if (data.ela?.score > 10) breakdown.push(["Moderate variation", -15]);
  else breakdown.push(["Consistent compression", +20]);

  if (data.exif?.make) breakdown.push(["Camera metadata present", +10]);
  else breakdown.push(["Missing metadata", -15]);

  if (data.exif?.gps) breakdown.push(["GPS present", +5]);

  document.getElementById("result").innerHTML = `
    <div class="result-title">${type} (${conf}%)</div>

    <div class="conf-bar">
      <div class="conf-fill" style="width:${conf}%"></div>
    </div>

    <div class="small">Tampering Probability</div>
    <div class="conf-bar">
      <div style="width:${100-conf}%;height:100%;
        background:linear-gradient(90deg,green,orange,red);"></div>
    </div>

    <div class="small" style="margin-top:10px;">
      ${breakdown.map(b => `${b[0]} (${b[1]})`).join("<br>")}
    </div>
  `;

  if (data.exif) {
    const ex = data.exif;
    let html = "";

    if (ex.make) html += `<div class="meta"><span class="label">Camera:</span> ${ex.make} ${ex.model||""}</div>`;
    if (ex.date) html += `<div class="meta"><span class="label">Date:</span> ${new Date(ex.date).toLocaleString()}</div>`;
    if (ex.iso) html += `<div class="meta"><span class="label">ISO:</span> ${ex.iso}</div>`;

    if (ex.gps) {
      html += `<div class="meta"><span class="label">Location:</span> ${ex.gps.lat.toFixed(5)}, ${ex.gps.lon.toFixed(5)}</div>`;
      html += `<iframe width="100%" height="200"
        src="https://maps.google.com/maps?q=${ex.gps.lat},${ex.gps.lon}&z=14&output=embed"></iframe>`;
    }

    let score = 100;
    if (!ex.make) score -= 20;
    if (!ex.date) score -= 20;
    if (!ex.gps) score -= 10;

    html += `<div class="meta"><span class="label">Metadata Integrity:</span> ${score}%</div>`;

    document.getElementById("meta").innerHTML = html;
    document.getElementById("meta").style.display = "block";
  }

  if (data.ela?.overlay) {
    document.getElementById("ela").src = data.ela.overlay;
  }
};
</script>

</body>
</html>
