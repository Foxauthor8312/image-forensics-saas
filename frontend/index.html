<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 20px;
}

img {
  max-width: 100%;
  margin-top: 15px;
  border: 2px solid #444;
}

.container {
  margin-top: 20px;
}
</style>
</head>
<body>

<h2>PixelProof</h2>

<input type="file" id="file">

<div class="container">
  <h3>ELA Heatmap</h3>
  <img id="elaImage" />
  <p id="elaScore"></p>
</div>

<div id="output"></div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

document.getElementById("file").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  const form = new FormData();
  form.append("image", file);

  try {
    const res = await fetch(API + "/analyze", {
      method: "POST",
      body: form
    });

    const data = await res.json();
    console.log(data);

    // 🔥 SHOW ELA IMAGE
    if (data.ela && data.ela.overlay) {
      document.getElementById("elaImage").src = data.ela.overlay;
      document.getElementById("elaScore").innerText =
        "ELA Score: " + data.ela.score;
    }

    // KEEP JSON OUTPUT
    document.getElementById("output").innerHTML =
      "<pre>" + JSON.stringify(data, null, 2) + "</pre>";

  } catch (err) {
    console.error(err);
  }
};
</script>

</body>
</html>
