<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#020617;
  --muted:#1e293b;
  --primary:#3b82f6;
  --success:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
}
*{box-sizing:border-box}
body { background:var(--bg); color:white; font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

button { padding:10px 14px; background:var(--primary); border:none; color:white; border-radius:8px; margin:6px 6px 0 0; cursor:pointer; }
button.secondary{background:var(--muted)}
#analyzeBtn { background:var(--success); }

.tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tab { padding:10px; background:var(--muted); border-radius:8px; cursor:pointer; }
.tab.active { background:var(--primary); }

.tab-content { display:none; margin-top:20px; }
.tab-content.active { display:block; }

.card { background:var(--card); padding:18px; border-radius:12px; }

.image-row { display:flex; gap:15px; flex-wrap:wrap; margin-top:20px; }
.image-box { flex:1 1 48%; }
.image-box img { width:100%; max-height:420px; object-fit:contain; border-radius:10px; background:#000; }

#map { height:420px; border-radius:12px; }

.meta-container { max-height:420px; overflow-y:auto; }
.card p { word-break:break-word; }

.row { display:flex; flex-wrap:wrap; align-items:center; gap:10px; }

/* Progress Overlay */
#progressOverlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
  z-index:9999; align-items:center; justify-content:center;
}
#progressOverlay .panel{
  width:320px; background:var(--card); padding:20px; border-radius:14px; text-align:center;
}
.progress-bar{background:var(--muted); height:10px; border-radius:6px; margin:16px 0;}
.progress-fill{height:10px; width:0%; background:var(--primary); border-radius:6px;}

/* Camera Bottom Sheet */
.sheet-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:none; z-index:9000;
}
.sheet{
  position:fixed; left:0; right:0; bottom:-320px;
  background:var(--card); border-radius:16px 16px 0 0;
  padding:16px; z-index:9001; transition:bottom .25s ease;
  box-shadow:0 -10px 30px rgba(0,0,0,0.5);
}
.sheet.open{ bottom:0; }
.sheet-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.sheet-title{ font-weight:600; }
.sheet-close{ background:transparent; color:#cbd5f5; border:1px solid var(--muted); border-radius:8px; padding:6px 10px;}
.option{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px; border-radius:10px; background:var(--muted); margin-top:8px; cursor:pointer;
}
.option:hover{ filter:brightness(1.1); }
.option .left{ display:flex; align-items:center; gap:10px; }
.badge{ font-size:12px; opacity:.8; }

/* Small helpers */
.spacer{ height:8px; }
.link{ color:#93c5fd; text-decoration:none; }
.link:hover{ text-decoration:underline; }
</style>
</head>

<body>

<!-- ================= PROGRESS OVERLAY ================= -->
<div id="progressOverlay">
  <div class="panel">
    <h3>Analyzing Image</h3>
    <div class="progress-bar">
      <div id="progressBar" class="progress-fill"></div>
    </div>
    <div id="progressPercent">0%</div>
    <div id="progressText" style="margin-top:10px;font-size:14px;">Starting...</div>
  </div>
</div>

<!-- ================= CAMERA SHEET ================= -->
<div id="sheetBackdrop" class="sheet-backdrop" onclick="closeCameraSheet()"></div>

<div id="cameraSheet" class="sheet">
  <div class="sheet-header">
    <div class="sheet-title">Take Photo</div>
    <button class="sheet-close" onclick="closeCameraSheet()">Close</button>
  </div>

  <!-- Rear Camera -->
  <label class="option">
    <div class="left">
      <span>📷</span>
      <div>
        <div>Rear Camera</div>
        <div class="badge">Best for GPS + EXIF</div>
      </div>
    </div>
    <input type="file" id="cameraRear" accept="image/*" capture="environment" style="display:none;">
  </label>

  <!-- Front Camera -->
  <label class="option">
    <div class="left">
      <span>🤳</span>
      <div>
        <div>Front Camera</div>
        <div class="badge">Selfie</div>
      </div>
    </div>
    <input type="file" id="cameraFront" accept="image/*" capture="user" style="display:none;">
  </label>
</div>

<div class="container">

<h1>PixelProof 🔍</h1>

<div class="row">
  <input type="file" id="file" accept="image/*" class="secondary">

  <button onclick="openCameraSheet()">📷 Take Photo</button>
  <button id="analyzeBtn" onclick="analyzeImage()">Analyze</button>
</div>

<div id="result"></div>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null, previewURL=null, metadata={}, gps=null, mapInstance=null;

/* ================= CAMERA SHEET ================= */
function openCameraSheet(){
  document.getElementById("sheetBackdrop").style.display="block";
  document.getElementById("cameraSheet").classList.add("open");
}
function closeCameraSheet(){
  document.getElementById("sheetBackdrop").style.display="none";
  document.getElementById("cameraSheet").classList.remove("open");
}

/* ================= FILE PROCESS ================= */
async function processFile(file){
  if(!file) return;
  selectedFile=file;
  previewURL=URL.createObjectURL(file);

  await new Promise(r=>{
    EXIF.getData(file,function(){
      metadata=EXIF.getAllTags(this)||{};
      gps=extractGPS(metadata);
      r();
    });
  });
}

/* FILE INPUT */
document.getElementById("file").onchange = e=>{
  processFile(e.target.files[0]);
};

/* CAMERA INPUTS */
document.getElementById("cameraRear").onchange = e=>{
  processFile(e.target.files[0]);
  closeCameraSheet();
};
document.getElementById("cameraFront").onchange = e=>{
  processFile(e.target.files[0]);
  closeCameraSheet();
};

/* ================= GPS ================= */
function extractGPS(meta){
  if(!meta.GPSLatitude||!meta.GPSLongitude) return null;
  const d=c=>c[0]+c[1]/60+c[2]/3600;
  let lat=d(meta.GPSLatitude),lon=d(meta.GPSLongitude);
  if(meta.GPSLatitudeRef==="S")lat=-lat;
  if(meta.GPSLongitudeRef==="W")lon=-lon;
  return {lat,lon,source:"EXIF"};
}
function getDeviceLocation(){
  return new Promise(r=>{
    navigator.geolocation.getCurrentPosition(
      p=>r({lat:p.coords.latitude,lon:p.coords.longitude,accuracy:p.coords.accuracy,source:"Device"}),
      ()=>r(null)
    );
  });
}

/* ================= PROGRESS ================= */
function showProgress(){ document.getElementById("progressOverlay").style.display="flex"; }
function hideProgress(){ document.getElementById("progressOverlay").style.display="none"; }
function setProgress(p,t){
  document.getElementById("progressBar").style.width=p+"%";
  document.getElementById("progressPercent").innerText=p+"%";
  document.getElementById("progressText").innerText=t;
}

/* ================= RESIZE ================= */
async function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image(), r=new FileReader();
    r.onload=e=>img.src=e.target.result;
    img.onload=()=>{
      const c=document.createElement("canvas"), MAX=1280;
      let w=img.width,h=img.height;
      if(w>h&&w>MAX){h*=MAX/w;w=MAX;}
      else if(h>MAX){w*=MAX/h;h=MAX;}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>resolve(new File([b],"resized.jpg",{type:"image/jpeg"})),"image/jpeg",0.85);
    };
    r.readAsDataURL(file);
  });
}

/* ================= ANALYZE ================= */
async function analyzeImage(){
  if(!selectedFile) return alert("Select or capture an image");

  showProgress();
  setProgress(10,"Preparing image...");

  const resized=await resizeImage(selectedFile);

  setProgress(35,"Checking GPS...");
  let finalGPS=gps || await getDeviceLocation();

  setProgress(65,"Uploading...");

  const form=new FormData();
  form.append("image",resized);
  form.append("metadata",JSON.stringify(metadata));
  form.append("gps",JSON.stringify(finalGPS));

  let res;
  try{
    res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  }catch{
    hideProgress();
    return alert("Upload failed");
  }

  setProgress(85,"Processing...");
  const data=await res.json();

  setProgress(100,"Done");

  setTimeout(()=>{
    hideProgress();
    render(data.result);
  },350);
}

/* ================= GAUGE ================= */
function gauge(v,label){
  const r=50,c=2*Math.PI*r,o=c-(v/100)*c;
  const col=v>70?"#ef4444":v>40?"#f59e0b":"#22c55e";
  return `<div style="text-align:center">
    <svg width="120" height="120" style="transform:rotate(-90deg)">
      <circle cx="60" cy="60" r="${r}" stroke="#1e293b" stroke-width="10" fill="none"/>
      <circle cx="60" cy="60" r="${r}" stroke="${col}" stroke-width="10"
        stroke-dasharray="${c}" stroke-dashoffset="${o}" fill="none"/>
    </svg>
    <div style="margin-top:-70px;font-weight:bold;">${v}%</div>
    <div style="margin-top:40px;">${label}</div>
  </div>`;
}

/* ================= RENDER ================= */
function render(d){
  window.lastGPS=d.gps;

  document.getElementById("result").innerHTML=`

  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'mapTab')">Map</div>
    <div class="tab" onclick="tab(event,'metaTab')">Metadata</div>
    <div class="tab" onclick="tab(event,'detailTab')">Detailed</div>
    <div class="tab" onclick="tab(event,'aboutTab')">About</div>
  </div>

  <div id="r" class="tab-content active">
    <div class="card">

      <h2>${d.analysis}</h2>

      <div style="display:flex;gap:30px;flex-wrap:wrap;">
        ${gauge(d.score,"Manipulation Score")}
        ${gauge(d.confidence,"Confidence")}
      </div>

      <div class="spacer"></div>
      <div style="background:#020617;padding:12px;border-radius:10px;font-size:14px;">
        <b>How to read:</b> Low score = likely original • High score = likely edited
      </div>

      <p><b>Summary:</b> ${d.simple_explanation || "N/A"}</p>
      <p><b>Technical:</b> ${d.technical_explanation || "N/A"}</p>
      <p><b>Conclusion:</b> ${d.legal_explanation || "N/A"}</p>
      <p><b>Confidence:</b> ${d.confidence_note || "N/A"}</p>

      <div class="spacer"></div>
      ${d.pdf_report ? `<a class="link" href="${d.pdf_report}" target="_blank">Download PDF Report</a>` : ""}

      <h3>Signals</h3>
      ${
        Object.entries(d.signals||{}).map(([k,v])=>`
          <div>${k}: ${v}</div>
          <div style="background:#1e293b;height:8px;border-radius:6px;margin-bottom:10px;">
            <div style="width:${v}%;height:8px;background:#3b82f6;border-radius:6px;"></div>
          </div>
        `).join("")
      }

    </div>

    <div class="image-row">
      <div class="image-box"><img src="${previewURL || ""}"></div>
      <div class="image-box"><img src="${d.heatmap ? d.heatmap + "?t=" + Date.now() : ""}"></div>
    </div>

  </div>

  <div id="mapTab" class="tab-content">
    <div id="map"></div>
  </div>

  <div id="metaTab" class="tab-content">
    <div class="card">
      <div class="meta-container">
        ${
          d.metadata?.available
          ? Object.entries(d.metadata.all||{}).map(([k,v])=>`<p><b>${k}:</b> ${v}</p>`).join("")
          : "No metadata"
        }
      </div>
    </div>
  </div>

  <div id="detailTab" class="tab-content">
    <div class="card">
      Score = likelihood of manipulation. Confidence = agreement between signals.
    </div>
  </div>

  <div id="aboutTab" class="tab-content">
    <div class="card">
      PixelProof — Barry Mattison-Off Road Artist Photography
    </div>
  </div>
  `;
}

/* ================= MAP ================= */
function initMap(gps){
  if(mapInstance){ mapInstance.remove(); mapInstance=null; }

  if(!gps || isNaN(gps.lat) || isNaN(gps.lon)){
    document.getElementById("map").innerHTML="No valid location data";
    return;
  }

  mapInstance=L.map('map').setView([gps.lat,gps.lon],15);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    .addTo(mapInstance);

  L.marker([gps.lat,gps.lon]).addTo(mapInstance);

  if(gps.accuracy){
    L.circle([gps.lat,gps.lon],{radius:gps.accuracy}).addTo(mapInstance);
  }

  setTimeout(()=>mapInstance.invalidateSize(),200);
}

/* ================= TABS ================= */
function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
  if(id==="mapTab"){ setTimeout(()=>initMap(window.lastGPS),100); }
}
</script>

</body>
</html>
