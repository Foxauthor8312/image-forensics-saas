<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}
.panel{background:#1e293b;padding:20px;border-radius:12px}

.drop{border:2px dashed #555;padding:30px;text-align:center;cursor:pointer}

.tabs{display:flex;gap:10px;margin-top:15px}
.tab{padding:6px 10px;background:#111;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}

.tab-content{display:none;margin-top:10px}
.tab-content.active{display:block}

#map{height:300px;border-radius:10px;margin-top:10px}

.progress{height:6px;background:#111;margin:10px 0;display:none}
.fill{height:100%;width:0;background:#3b82f6}

img.preview{
  max-width:100%;
  max-height:300px;
  object-fit:contain;
  margin-bottom:10px;
  border-radius:8px;
}

footer{margin-top:20px;font-size:12px;opacity:.6}
</style>
</head>

<body>
<div class="container">
<header class="app-header">
  <div class="logo-badge">
    <img src="/icon-192.png">
  </div>
  <div>
    <div class="brand-title">PixelProof</div>
    <div class="brand-sub">AI Image Forensics Engine</div>
  </div>
</header>

<div class="panel">
  <h2>PixelProof</h2>

  <div id="drop" class="drop">Click or Drop Image</div>
  <input type="file" id="file" hidden>

  <div id="status"></div>
  <div class="progress" id="bar"><div class="fill" id="fill"></div></div>

  <div id="result"></div>
</div>

<footer>
  © <span id="year"></span> PixelProof
</footer>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";

const file=document.getElementById("file");
const drop=document.getElementById("drop");
const result=document.getElementById("result");
const bar=document.getElementById("bar");
const fill=document.getElementById("fill");
const status=document.getElementById("status");

drop.onclick=()=>file.click();

file.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  window.lastFile=f;
  analyze(f);
};

async function analyze(f){
  const form=new FormData();
  form.append("image",f);

  bar.style.display="block";
  fill.style.width="10%";
  status.innerText="Analyzing...";

  let p=10;
  const int=setInterval(()=>{
    p+=Math.random()*10;
    if(p<90) fill.style.width=p+"%";
  },300);

  try{
    const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
    const data=await res.json();

    clearInterval(int);
    fill.style.width="100%";
    status.innerText="Done";
    setTimeout(()=>bar.style.display="none",500);

    render(data.result || data);

  }catch(err){
    clearInterval(int);
    status.innerText="Error";
    console.error(err);
  }
}

function render(d){

  const preview = window.lastFile
    ? `<img class="preview" src="${URL.createObjectURL(window.lastFile)}">`
    : "";

  result.innerHTML = `
    ${preview}

    <div class="tabs">
      <div class="tab active" onclick="tab(event,'r')">Results</div>
      <div class="tab" onclick="tab(event,'d')">Detailed</div>
      <div class="tab" onclick="tab(event,'m')">Metadata</div>
      <div class="tab" onclick="tab(event,'mapTab')">Map</div>
    </div>

    <div id="r" class="tab-content active">
      <h3>${d.conclusion || ""}</h3>
      <p>${d.analysis || ""}</p>

      ${
        d.signals
        ? Object.entries(d.signals).map(([k,v])=>`<div>${k}: ${v}%</div>`).join("")
        : ""
      }
    </div>

    <div id="d" class="tab-content">
  <h3>Forensic Analysis</h3>

  <p><strong>Conclusion:</strong> ${d.conclusion || "N/A"}</p>

  <p><strong>Summary:</strong><br>
  ${d.analysis || "No analysis available"}
  </p>

  <h4>Signal Breakdown</h4>
  ${
    d.signals
      ? Object.entries(d.signals).map(([k,v])=>`
          <div>${k.toUpperCase()}: ${v}%</div>
        `).join("")
      : "<div>No signal data</div>"
  }

  <h4>Technical Notes</h4>
  <p style="opacity:.7">
    This analysis evaluates compression artifacts, noise distribution,
    and metadata consistency. These indicators are suggestive and not
    independently conclusive.
  </p>
</div>

    <div id="m" class="tab-content">
      ${
        d.metadata && Object.keys(d.metadata).length
        ? Object.entries(d.metadata).map(([k,v])=>`
            <div><strong>${k}</strong>: ${
              typeof v === "object" ? JSON.stringify(v) : v
            }</div>
          `).join("")
        : "No metadata available"
      }
    </div>

    <div id="mapTab" class="tab-content">
      ${
        d.metadata?.gps
        ? `<div id="map"></div>`
        : "No GPS data available"
      }
    </div>
  `;

  // MAP INIT (safe + stable)
  if(d.metadata?.gps){
    setTimeout(()=>{
      const map=L.map('map').setView(
        [d.metadata.gps.lat, d.metadata.gps.lon],
        13
      );

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
        .addTo(map);

      L.marker([d.metadata.gps.lat, d.metadata.gps.lon])
        .addTo(map);

      window._mapInstance = map;
    },200);
  }
}

function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");

  if(id==="mapTab" && window._mapInstance){
    setTimeout(()=>window._mapInstance.invalidateSize(),200);
  }
}

document.getElementById("year").innerText=new Date().getFullYear();

// SERVICE WORKER (safe)
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement("button");
  btn.innerText = "📲 Install PixelProof";
  btn.style.marginTop = "10px";

  btn.onclick = async () => {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    btn.remove();
  };

  document.querySelector(".panel").prepend(btn);
});
</script>

</body>
</html>
