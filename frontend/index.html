<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1000px; margin:auto; padding:20px; }
.card { background:#020617; padding:15px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/jpeg">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;
let extractedMetadata = {};
let gpsData = null;

// -----------------------------
// EXTRACT METADATA IN BROWSER
// -----------------------------
document.getElementById("file").onchange = function(e){

  selectedFile = e.target.files[0];

  EXIF.getData(selectedFile, function(){

    extractedMetadata = EXIF.getAllTags(this);

    if(extractedMetadata.GPSLatitude && extractedMetadata.GPSLongitude){

      function convert(coord){
        return coord[0] + coord[1]/60 + coord[2]/3600;
      }

      let lat = convert(extractedMetadata.GPSLatitude);
      let lon = convert(extractedMetadata.GPSLongitude);

      if(extractedMetadata.GPSLatitudeRef === "S") lat = -lat;
      if(extractedMetadata.GPSLongitudeRef === "W") lon = -lon;

      gpsData = {lat, lon};
    }

    console.log("EXIF:", extractedMetadata);
  });
};

// -----------------------------
// RESIZE IMAGE (FOR ANALYSIS)
// -----------------------------
function resizeImage(file){
  return new Promise(resolve=>{
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;
    reader.readAsDataURL(file);

    img.onload = ()=>{
      const canvas = document.createElement("canvas");

      let w = img.width;
      let h = img.height;
      const MAX = 1200;

      if(w > MAX || h > MAX){
        if(w > h){
          h *= MAX / w;
          w = MAX;
        } else {
          w *= MAX / h;
          h = MAX;
        }
      }

      canvas.width = w;
      canvas.height = h;

      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(blob=>{
        resolve(new File([blob], file.name, {type:"image/jpeg"}));
      }, "image/jpeg", 0.7);
    };
  });
}

// -----------------------------
// UPLOAD
// -----------------------------
async function upload(){

  if(!selectedFile){
    alert("Select file");
    return;
  }

  const resized = await resizeImage(selectedFile);

  const form = new FormData();
  form.append("image", resized);

  // 🔥 SEND METADATA SEPARATELY
  form.append("metadata", JSON.stringify(extractedMetadata));
  form.append("gps", JSON.stringify(gpsData));

  const res = await fetch(API + "/api/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  render(data.result);
}

// -----------------------------
function render(data){

document.getElementById("result").innerHTML = `
<div class="card">

<h2>${data.analysis}</h2>

<p>Score: ${data.score}</p>
<p>Confidence: ${data.confidence}%</p>

<hr>

<p><b>Summary:</b> ${data.simple_explanation}</p>

<hr>

<p><b>Metadata:</b></p>
<pre>${JSON.stringify(data.metadata, null, 2)}</pre>

<p><b>GPS:</b> ${JSON.stringify(data.gps)}</p>

</div>
`;
}

</script>

</body>
</html>
