<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelProof</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  /* This makes the black cover the top 60% before fading */
background: linear-gradient(to bottom, #000000 60%, #000080 100%);

  color:#e5e7eb;
  font-family:-apple-system,Segoe UI,Roboto;
}

.wrapper {
  text-align:center;
  width:100%;
  max-width:420px;
  padding:20px;
}

/* LOGO */
.logo {
  width:260px;
  max-width:80%;
  height:auto;
  margin-bottom:20px;
}

/* TITLE */
h1 {
  font-weight:600;
  margin-bottom:10px;
}

/* TEXT */
.small {
  font-size:13px;
  color:#9ca3af;
  margin-top:8px;
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:10px;
  border:1px solid #374151;
  background:#111827;
  color:white;
  font-size:16px;
  transition:all 0.2s ease;
}

button:hover {
  background:#1f2937;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #374151;
  background:#020617;
  color:white;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- 🔥 ADD YOUR LOGO FILE HERE -->
<!-- Replace "logo.png" with your actual file name -->
<img src="logo.png" class="logo">

<h1>PixelProof</h1>

<div class="small" id="usageText"></div>

<button onclick="startAnalysis()">Start Analysis</button>
<div class="small" id="usageText"></div>
  
<div class="small">Enter override code</div>
<input id="codeInput" placeholder="Enter code">
<button onclick="applyCode()">Apply Code</button>

</div>

<script>

const MAX_FREE = 3;

function getUsage(){
  return parseInt(localStorage.getItem("usage") || "0");
}

function updateDisplay(){
  const remaining = Math.max(0, MAX_FREE - getUsage());
  document.getElementById("usageText").innerText =
    `You have ${remaining} free analyses remaining`;
}

function startAnalysis(){

  const used = getUsage();
  const override = localStorage.getItem("override");

  if(used >= MAX_FREE && !override){
    alert("Free limit reached. Enter override code.");
    return;
  }

  localStorage.setItem("usage", used + 1);
  window.location.href = "analyze.html";
}

function applyCode(){

  const code = document.getElementById("codeInput").value;

  if(code === "PIXELVIP"){
    localStorage.setItem("override", "true");
    alert("Override activated");
    updateDisplay();
  } else {
    alert("Invalid code");
  }
}

updateDisplay();

</script>

</body>
</html>
