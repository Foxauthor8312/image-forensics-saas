<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof — AI Image Forensics</title>

<link rel="icon" href="/favicon.ico?v=2">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}

.app-header{
  display:flex;align-items:center;gap:12px;
  padding:15px;margin-bottom:20px;
  background:linear-gradient(135deg,#1e293b,#0f172a);
  border-radius:14px;
}
.logo-badge{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(59,130,246,0.5);
}
.logo-badge img{width:28px}
.brand-title{font-size:22px;font-weight:700}
.brand-sub{font-size:12px;opacity:.7}

.dashboard{display:grid;grid-template-columns:300px 1fr;gap:20px}
.panel{background:#1e293b;padding:20px;border-radius:12px}

.drop-zone{border:2px dashed #555;padding:40px;text-align:center;border-radius:12px;cursor:pointer}
.drop-zone.dragover{border-color:#22c55e}

.tabs{display:flex;gap:10px;margin-top:15px}
.tab{padding:6px 10px;background:#111;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:10px}

.bar{height:6px;background:#111;margin:5px 0}
.bar-fill{height:6px;background:#3b82f6}

#map{height:300px;border-radius:10px;margin-top:10px}

button{margin-top:10px;padding:6px 10px;border:none;border-radius:6px;background:#3b82f6;color:white;cursor:pointer}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal-content{background:#1e293b;padding:20px;border-radius:12px;max-width:600px}
.modal-close{margin-top:10px;padding:6px 10px;background:#3b82f6;border:none;border-radius:6px;color:white}
</style>
</head>

<body>
<div class="container">

<header class="app-header">
  <div class="logo-badge">
    <img src="/icon-192.png">
  </div>
  <div>
    <div class="brand-title">PixelProof</div>
    <div class="brand-sub">AI Image Forensics Engine</div>
  </div>
</header>

<div class="dashboard">
  <div class="panel">
    <div id="dropZone" class="drop-zone">Drag & Drop Image</div>
    <input type="file" id="file" hidden>
  </div>

  <div class="panel">
    <div id="result"></div>
  </div>
</div>

</div>

<div id="legalModal" class="modal">
  <div class="modal-content">
    <h2>Legal Disclaimer</h2>
    <p>Results are probabilistic and not definitive forensic evidence.</p>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";

const dropZone=document.getElementById("dropZone");
const file=document.getElementById("file");
const result=document.getElementById("result");

dropZone.onclick=()=>file.click();
dropZone.ondragover=e=>{e.preventDefault();dropZone.classList.add("dragover");};
dropZone.ondragleave=()=>dropZone.classList.remove("dragover");
dropZone.ondrop=e=>{
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handle({target:{files:e.dataTransfer.files}});
};

file.onchange=handle;

function handle(e){
  const f=e.target.files[0];
  if(!f)return;
  analyze(f);
}

async function analyze(f){
  const form=new FormData();
  form.append("image",f);

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();

  render(data.result||data);
}

function render(d){
  const signals=d.signals||{};
  const meta=d.metadata||{};
  const gps=meta.gps||null;

  window.last=d;

  const bars=Object.entries(signals).map(([k,v])=>`
    <div>${k}: ${v}%<div class="bar"><div class="bar-fill" style="width:${v}%"></div></div></div>
  `).join("");

  result.innerHTML=`
  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'d')">Detailed</div>
    <div class="tab" onclick="tab(event,'m')">Metadata</div>
    <div class="tab" onclick="tab(event,'mapTab')">Map</div>
  </div>

  <div id="r" class="tab-content active">
    <h2>${d.conclusion}</h2>
    <p>Score: ${d.score}%</p>
    <p><strong>${d.analysis}</strong></p>
    <button onclick="exportPDF()">Download Report</button>
    ${bars}
  </div>

  <div id="d" class="tab-content">
    <h3>Forensic Analysis</h3>
    <p>${d.analysis}</p>

    ${Object.entries(signals).map(([k,v])=>`
      <div><strong>${k}</strong>: ${v}%</div>
    `).join("")}
  </div>

  <div id="m" class="tab-content">
    ${Object.keys(meta).length
      ? Object.entries(meta).map(([k,v])=>`
        <div><strong>${k}</strong>: ${typeof v==="object" ? JSON.stringify(v) : v}</div>
      `).join("")
      : "No metadata"}
  </div>

  <div id="mapTab" class="tab-content">
    ${gps ? `
      <button onclick="setMapLayer('street')">Street</button>
      <button onclick="setMapLayer('satellite')">Satellite</button>
      <div id="map"></div>
    ` : "No GPS data"}
  </div>
  `;

  if(gps){
    setTimeout(()=>{
      const map=L.map('map').setView([gps.lat,gps.lon],13);
      window._mapInstance=map;

      window._streetLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
      window._satLayer=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

      window._streetLayer.addTo(map);
      L.marker([gps.lat,gps.lon]).addTo(map);
    },200);
  }
}

function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");

  if(id==="mapTab" && window._mapInstance){
    setTimeout(()=>window._mapInstance.invalidateSize(),200);
  }
}

function setMapLayer(type){
  if(!window._mapInstance)return;

  window._mapInstance.eachLayer(layer=>{
    if(layer instanceof L.TileLayer){
      window._mapInstance.removeLayer(layer);
    }
  });

  if(type==="satellite"){
    window._satLayer.addTo(window._mapInstance);
  } else {
    window._streetLayer.addTo(window._mapInstance);
  }
}

function exportPDF(){
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF();

  doc.text("PixelProof Report",10,10);
  doc.text(window.last.analysis,10,20);
  doc.save("report.pdf");
}

function openModal(){document.getElementById("legalModal").style.display="flex";}
function closeModal(){document.getElementById("legalModal").style.display="none";}
</script>

</body>
</html>
