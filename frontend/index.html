<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}
button{padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:8px;margin:5px}
.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:8px;background:#1e293b;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:20px}
#map{height:400px;border-radius:10px}
.bar{height:6px;background:#1e293b}
.bar-fill{height:6px;background:#3b82f6}
.footer {margin-top:40px;padding:15px 20px;background:#020617;border-top:1px solid #1e293b;font-size:13px;color:#94a3b8;}
.footer-inner {max-width:1100px;margin:auto;display:flex;justify-content:space-between;}
.footer-links {display:flex;gap:15px;}
.footer-links a {color:#60a5fa;text-decoration:none;}
</style>
</head>

<body>
<div class="container">

<h1>PixelProof</h1>

<input type="file" id="file">
<button id="rearBtn">Rear</button>
<button id="frontBtn">Front</button>

<input id="rear" type="file" accept="image/*" capture="environment" hidden>
<input id="front" type="file" accept="image/*" capture="user" hidden>

<div id="progress" style="display:none;margin-top:15px;">
  <div style="background:#1e293b;height:8px;border-radius:6px;">
    <div id="bar" style="height:8px;width:0%;background:#3b82f6;"></div>
  </div>
  <div id="progressText" style="font-size:12px;margin-top:5px;">Starting...</div>
</div>

<div id="result"></div>

</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

// DOM bindings (FIXED)
const file = document.getElementById("file");
const rear = document.getElementById("rear");
const front = document.getElementById("front");
const rearBtn = document.getElementById("rearBtn");
const frontBtn = document.getElementById("frontBtn");
const result = document.getElementById("result");

rearBtn.onclick = () => rear.click();
frontBtn.onclick = () => front.click();

let selectedFile, metadata = {}, gps = null, mapInstance;

// Handlers
file.onchange = handle;
rear.onchange = handle;
front.onchange = handle;

function extractGPS(meta){
  if(!meta.GPSLatitude || !meta.GPSLongitude) return null;

  const convert = (coord) =>
    coord.reduce((acc,val,i)=>{
      const v = val.numerator ? val.numerator/val.denominator : val;
      return acc + v/(i===0?1:i===1?60:3600);
    },0);

  let lat = convert(meta.GPSLatitude);
  let lon = convert(meta.GPSLongitude);

  if(meta.GPSLatitudeRef==="S") lat=-lat;
  if(meta.GPSLongitudeRef==="W") lon=-lon;

  return {lat,lon};
}

async function handle(e){
  const f = e.target.files[0];
  if(!f) return;

  selectedFile = f;

  await new Promise(r=>{
    EXIF.getData(f,function(){
      metadata = EXIF.getAllTags(this) || {};
      gps = extractGPS(metadata);
      r();
    });
  });

  analyze();
}

async function resizeImage(file){
  return new Promise(res=>{
    const img=new Image(), reader=new FileReader();
    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height,MAX=1280;
      if(w>MAX){h*=MAX/w;w=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      canvas.toBlob(b=>res(new File([b],"resized.jpg",{type:"image/jpeg"})));
    };

    reader.readAsDataURL(file);
  });
}

async function analyze(){
  try{
    showProgress();
    setProgress(10,"Preparing...");

    let finalGPS = gps;

    if(!finalGPS){
      finalGPS = await new Promise(res=>{
        navigator.geolocation.getCurrentPosition(
          p=>res({lat:p.coords.latitude,lon:p.coords.longitude,accuracy:p.coords.accuracy}),
          ()=>res(null)
        );
      });
    }

    setProgress(30,"Resizing...");
    const resized = await resizeImage(selectedFile);

    const form = new FormData();
    form.append("image",resized);
    form.append("metadata",JSON.stringify(metadata));
    form.append("gps",JSON.stringify(finalGPS));

    setProgress(60,"Uploading...");

    const controller = new AbortController();
    setTimeout(()=>controller.abort(),30000);

    const res = await fetch(API+"/api/analyze",{method:"POST",body:form,signal:controller.signal});
    if(!res.ok) throw new Error(res.status);

    setProgress(90,"Processing...");
    const data = await res.json();

    console.log("FULL RESPONSE:", data);

    setProgress(100,"Done");
    setTimeout(hideProgress,1200);

    render(data.result || data);

  }catch(err){
    console.error("ERROR:",err);
    hideProgress();
    alert("Analysis failed. Check console.");
  }
}

function render(d){
  window.lastGPS = d?.gps || null;

  const signals = d.signals || d.indicators || {};
  const metadataAll = d.metadata?.all || d.metadata || {};

  result.innerHTML = `
  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'mapTab')">Map</div>
    <div class="tab" onclick="tab(event,'metaTab')">Metadata</div>
    <div class="tab" onclick="tab(event,'detailTab')">Detailed</div>
    <div class="tab" onclick="downloadPDF()">PDF</div>
  </div>

  <div id="r" class="tab-content active">
    <h2>${d.analysis || "No analysis available"}</h2>
    <p>Score: ${d.score ?? "N/A"}%</p>
    <p>Confidence: ${d.confidence ?? "N/A"}%</p>

    ${Object.entries(signals).map(([k,v])=>`
      <div>${k}: ${v}%</div>
      <div class="bar"><div class="bar-fill" style="width:${v}%"></div></div>
    `).join("")}

    ${d.heatmap ? `<img src="${API+d.heatmap}?t=${Date.now()}" style="width:100%">` : ""}
  </div>

  <div id="mapTab" class="tab-content"><div id="map"></div></div>

  <div id="metaTab" class="tab-content">
    ${Object.entries(metadataAll).map(([k,v])=>`<p>${k}: ${v}</p>`).join("")}
  </div>

  <div id="detailTab" class="tab-content">
    <p>${d.technical_explanation || d.details?.technical || "No technical explanation."}</p>
    <p>${d.legal_explanation || d.details?.legal || "No legal explanation."}</p>
  </div>
  `;
}

function initMap(g){
  if(!g || !g.lat || !g.lon) return;
  if(mapInstance) mapInstance.remove();

  mapInstance = L.map('map').setView([g.lat,g.lon],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
  L.marker([g.lat,g.lon]).addTo(mapInstance);
}

function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");

  if(id==="mapTab"){
    setTimeout(()=>initMap(window.lastGPS),100);
  }
}

function downloadPDF(){
  alert("PDF export coming from backend");
}

function showProgress(){document.getElementById("progress").style.display="block";}
function hideProgress(){document.getElementById("progress").style.display="none";}
function setProgress(p,t){
  document.getElementById("bar").style.width=p+"%";
  document.getElementById("progressText").innerText=t;
}
</script>

</body>
</html>
