<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0a;
  color: #e5e7eb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 32px;
}

.header img {
  height: 56px;
}

.header span {
  font-size: 16px;
  opacity: 0.7;
}

/* LAYOUT */
.wrapper {
  display: grid;
  grid-template-columns: 420px 1fr;
}

/* LEFT */
.left {
  padding: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tagline {
  font-size: 16px;
  color: #9ca3af;
  margin-bottom: 30px;
  max-width: 320px;
  text-align: center;
}

/* UPLOAD */
.upload {
  display: block;
  width: 100%;
  max-width: 320px;
  border: 2px dashed #2a2a2a;
  padding: 24px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.upload:hover {
  border-color: #3b82f6;
  background: rgba(59,130,246,0.05);
}

.upload-content {
  text-align: center;
}

.upload-title {
  font-weight: 600;
}

.upload-sub {
  font-size: 13px;
  color: #9ca3af;
}

/* RIGHT */
.right {
  background: #111;
  padding: 40px;
}

/* RESULT */
#resultCard {
  background: #0f172a;
  border: 1px solid #1e293b;
  padding: 20px;
  border-radius: 12px;
  max-width: 520px;
  margin: 0 auto 20px auto;
}

/* METADATA */
#metaBlock {
  background: #0f172a;
  border: 1px solid #1e293b;
  padding: 16px;
  border-radius: 12px;
  max-width: 520px;
  margin: 0 auto 20px auto;
  font-size: 14px;
}

.meta-row {
  margin-bottom: 6px;
  color: #cbd5f5;
}

.meta-label {
  color: #9ca3af;
}

.map {
  margin-top: 10px;
  border-radius: 8px;
  overflow: hidden;
}

/* SLIDER */
.slider-container {
  position: relative;
  max-width: 520px;
  margin: auto;
}

.slider-container img {
  width: 100%;
  border-radius: 8px;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay img {
  width: 100%;
  mix-blend-mode: difference;
}

.slider {
  width: 100%;
  max-width: 520px;
  margin: 10px auto;
  display: block;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <span>PixelProof</span>
</div>

<div class="wrapper">

<div class="left">

<div class="tagline">
Detect edits and verify image authenticity instantly.
</div>

<label class="upload">
  <input type="file" id="file" hidden>
  <div class="upload-content">
    <div class="upload-title">Select an image</div>
    <div class="upload-sub">JPG or PNG • Instant analysis</div>
  </div>
</label>

</div>

<div class="right">

<div id="resultCard"></div>
<div id="metaBlock" style="display:none;"></div>

<div id="viewerBlock" style="display:none;">

  <div class="slider-container">
    <img id="originalImage">

    <div class="overlay" id="overlay">
      <img id="elaOverlay">
    </div>
  </div>

  <input type="range" min="0" max="100" value="50" id="slider" class="slider">

</div>

</div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

const slider = document.getElementById("slider");
const overlay = document.getElementById("overlay");

slider.addEventListener("input", () => {
  overlay.style.width = slider.value + "%";
});

function interpret(type) {
  if (type === "Likely Original") return "No strong evidence of manipulation.";
  if (type === "Recompressed") return "Image has been resaved or shared.";
  if (type === "Edited") return "Possible modification detected.";
  return "Inconclusive.";
}

document.getElementById("file").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("viewerBlock").style.display = "block";
  document.getElementById("originalImage").src = URL.createObjectURL(file);

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification?.type || "Result";
  const conf = Math.round((data.classification?.confidence || 0.5) * 100);

  document.getElementById("resultCard").innerHTML = `
    <h2>${type}</h2>
    <p>${interpret(type)}</p>
    <p><strong>Confidence:</strong> ${conf}%</p>
  `;

  // ===== METADATA =====
  const metaBlock = document.getElementById("metaBlock");

  if (data.exif) {
    const ex = data.exif;
    let html = "";

    if (ex.make || ex.model) {
      html += `<div class="meta-row"><span class="meta-label">Camera:</span> ${ex.make} ${ex.model}</div>`;
    }

    if (ex.date) {
      html += `<div class="meta-row"><span class="meta-label">Date:</span> ${new Date(ex.date).toLocaleString()}</div>`;
    }

    if (ex.iso) {
      html += `<div class="meta-row"><span class="meta-label">ISO:</span> ${ex.iso}</div>`;
    }

    if (ex.exposureTime) {
      html += `<div class="meta-row"><span class="meta-label">Shutter:</span> ${ex.exposureTime}</div>`;
    }

    if (ex.fNumber) {
      html += `<div class="meta-row"><span class="meta-label">Aperture:</span> f/${ex.fNumber}</div>`;
    }

    if (ex.focalLength) {
      html += `<div class="meta-row"><span class="meta-label">Focal Length:</span> ${ex.focalLength}mm</div>`;
    }

    if (ex.lens) {
      html += `<div class="meta-row"><span class="meta-label">Lens:</span> ${ex.lens}</div>`;
    }

    if (data.size) {
      html += `<div class="meta-row"><span class="meta-label">File Size:</span> ${(data.size / 1024).toFixed(1)} KB</div>`;
    }

    if (ex.gps) {
      const { lat, lon } = ex.gps;

      html += `<div class="meta-row"><span class="meta-label">Location:</span> ${lat.toFixed(5)}, ${lon.toFixed(5)}</div>`;

      html += `
        <div class="map">
          <iframe
            width="100%"
            height="200"
            src="https://maps.google.com/maps?q=${lat},${lon}&z=14&output=embed">
          </iframe>
        </div>
      `;
    }

    metaBlock.innerHTML = html;
    metaBlock.style.display = "block";
  } else {
    metaBlock.style.display = "none";
  }

  if (data.ela && data.ela.overlay) {
    document.getElementById("elaOverlay").src = data.ela.overlay;
  }
};
</script>

</body>
</html>
