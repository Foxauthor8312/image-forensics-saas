<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:system-ui, sans-serif;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* HEADER */
h1 {
  font-size:28px;
  margin-bottom:10px;
}

/* BUTTON */
button {
  padding:10px 16px;
  background:#3b82f6;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

button:disabled {
  opacity:0.5;
}

/* PROGRESS */
#progress-container { display:none; margin-top:20px; }

.progress-bar {
  width:100%;
  height:8px;
  background:#1e293b;
  border-radius:5px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:#3b82f6;
  animation: progressAnim 2s infinite;
}

@keyframes progressAnim {
  0% { width:0%; }
  50% { width:70%; }
  100% { width:100%; }
}

/* TABS */
.tabs {
  display:flex;
  gap:10px;
  margin-top:20px;
}

.tab {
  padding:10px 14px;
  background:#1e293b;
  border-radius:6px;
  cursor:pointer;
}

.tab.active {
  background:#3b82f6;
}

.tab-content {
  display:none;
  margin-top:20px;
}

.tab-content.active {
  display:block;
}

/* CARD */
.card {
  background:#020617;
  padding:18px;
  border-radius:10px;
  margin-top:15px;
}

/* SCORE BADGE */
.score-badge {
  display:inline-block;
  padding:6px 12px;
  border-radius:6px;
  font-weight:bold;
  margin-top:10px;
}

/* IMAGE LAYOUT */
.image-row {
  display:flex;
  gap:15px;
  margin-top:20px;
  flex-wrap:wrap;
}

.image-box {
  flex:1 1 48%;
  text-align:center;
}

.image-box img {
  width:100%;
  max-height:420px;
  object-fit:contain;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/jpeg">
<button id="analyzeBtn" onclick="upload()">Analyze</button>

<div id="progress-container">
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  <p id="status">Processing...</p>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile=null;
let extractedMetadata={};
let gpsData=null;

/* EXIF */
file.onchange = function(e){
  selectedFile = e.target.files[0];

  EXIF.getData(selectedFile,function(){
    extractedMetadata = EXIF.getAllTags(this);

    if(extractedMetadata.GPSLatitude){
      let lat = extractedMetadata.GPSLatitude[0] + extractedMetadata.GPSLatitude[1]/60 + extractedMetadata.GPSLatitude[2]/3600;
      let lon = extractedMetadata.GPSLongitude[0] + extractedMetadata.GPSLongitude[1]/60 + extractedMetadata.GPSLongitude[2]/3600;

      if(extractedMetadata.GPSLatitudeRef==="S") lat=-lat;
      if(extractedMetadata.GPSLongitudeRef==="W") lon=-lon;

      gpsData={lat,lon};
    }
  });
};

/* RESIZE */
function resizeImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>img.src=e.target.result;
    reader.readAsDataURL(file);

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height;
      const MAX=1200;

      if(w>MAX||h>MAX){
        if(w>h){h*=MAX/w;w=MAX;}
        else{w*=MAX/h;h=MAX;}
      }

      canvas.width=w;
      canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(blob=>{
        resolve(new File([blob],file.name,{type:"image/jpeg"}));
      },"image/jpeg",0.7);
    };
  });
}

/* UPLOAD */
async function upload(){

  if(!selectedFile) return alert("Select file");

  document.getElementById("progress-container").style.display="block";
  document.getElementById("analyzeBtn").disabled=true;

  const resized = await resizeImage(selectedFile);

  const form=new FormData();
  form.append("image",resized);
  form.append("metadata",JSON.stringify(extractedMetadata));
  form.append("gps",JSON.stringify(gpsData));

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();

  document.getElementById("progress-container").style.display="none";
  document.getElementById("analyzeBtn").disabled=false;

  render(data.result);
}

/* RENDER */
function render(data){

const scoreColor =
  data.score > 70 ? "#ef4444" :
  data.score > 40 ? "#f59e0b" :
  "#22c55e";

document.getElementById("result").innerHTML = `

<div class="tabs">
  <div class="tab active" onclick="tab(event,'r')">Results</div>
  <div class="tab" onclick="tab(event,'map')">Map</div>
  <div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">

<div class="card">

<h2>${data.analysis}</h2>

<div class="score-badge" style="background:${scoreColor}">
Score: ${data.score}
</div>

<p><b>Confidence:</b> ${data.confidence}%</p>

<hr>

<p>${data.simple_explanation}</p>

<p style="opacity:0.8">${data.technical_explanation}</p>

<p style="margin-top:10px"><b>Conclusion:</b> ${data.legal_explanation}</p>

<br>

<a href="${data.pdf_report}" target="_blank"
style="padding:10px;background:#22c55e;color:white;border-radius:6px;">
Download Report
</a>

</div>

<div class="image-row">

<div class="image-box">
<p><b>Original</b></p>
<img src="${URL.createObjectURL(selectedFile)}">
</div>

<div class="image-box">
<p><b>Heatmap</b></p>
<img src="${data.heatmap}">
</div>

</div>

</div>

<div id="map" class="tab-content">
${
data.gps
? `<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed"></iframe>`
: "<p>No GPS data</p>"
}
</div>

<div id="meta" class="tab-content">
<div class="card">
${
data.metadata?.available
? Object.entries(data.metadata.all).map(([k,v])=>`<p>${k}: ${v}</p>`).join("")
: "<p>No metadata found</p>"
}
</div>
</div>

`;
}

/* TAB SWITCH */
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>

</body>
</html>
