<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
  margin: 0;
}

/* LAYOUT */
.wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

/* LEFT SIDE */
.left {
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start; /* FIX */
}

h1 {
  font-size: 42px;
  margin-bottom: 15px;
}

.sub {
  color: #9ca3af;
  font-size: 18px;
  margin-bottom: 30px;
}

/* UPLOAD */
.upload {
  border: 2px dashed #374151;
  padding: 25px;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;

  max-width: 320px;   /* FIX */
  width: 100%;
  margin-top: 20px;
}

.upload:hover {
  border-color: #60a5fa;
}

/* RIGHT SIDE */
.right {
  background: #111827;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* RESULT */
.card {
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.green { background: #064e3b; }
.yellow { background: #78350f; }
.red { background: #7f1d1d; }

/* IMAGE */
.viewer {
  position: relative;
}

.viewer img {
  width: 100%;
  border-radius: 8px;
}

#elaOverlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  mix-blend-mode: difference;
  pointer-events: none;
}

/* FOOTER */
.footer {
  margin-top: 20px;
  color: #6b7280;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<h1>Detect image manipulation instantly</h1>

<p class="sub">
PixelProof analyzes compression patterns and metadata to identify edits, recompression, and authenticity.
</p>

<label class="upload">
  <input type="file" id="file" style="display:none;">
  <strong>Upload Image</strong><br>
  <span style="color:#9ca3af;font-size:14px;">
    JPG or PNG • Instant analysis
  </span>
</label>

</div>

<!-- RIGHT -->
<div class="right">

<div id="resultCard" class="card"></div>

<div class="viewer">
  <img id="originalImage">
  <img id="elaOverlay">
</div>

<div class="footer">
Brighter differences indicate compression inconsistencies.
</div>

</div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function interpret(type) {
  if (type === "Likely Original") {
    return { color: "green", message: "No signs of editing detected." };
  }
  if (type === "Recompressed") {
    return { color: "yellow", message: "Image was saved or shared again." };
  }
  if (type === "Edited") {
    return { color: "red", message: "Possible image manipulation detected." };
  }
  return { color: "yellow", message: "Inconclusive result." };
}

document.getElementById("file").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("originalImage").src =
    URL.createObjectURL(file);

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const conf = Math.round((data.classification?.confidence || 0.5) * 100);
  const ui = interpret(type);

  const card = document.getElementById("resultCard");
  card.className = "card " + ui.color;

  card.innerHTML = `
    <h2>${type}</h2>
    <p>${ui.message}</p>
    <p><strong>Confidence:</strong> ${conf}%</p>
  `;

  if (data.ela && data.ela.overlay) {
    document.getElementById("elaOverlay").src = data.ela.overlay;
  }
};
</script>

</body>
</html>
