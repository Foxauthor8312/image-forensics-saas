<!DOCTYPE html>
<html>
<head>
  <title>PixelProof</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
    }

    h1 {
      font-size: 36px;
    }

    input {
      margin-top: 20px;
    }

    button {
      background: #3b82f6;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #2563eb;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin-top: 25px;
      border-radius: 10px;
      text-align: left;
    }

    img {
      margin-top: 10px;
      border-radius: 8px;
    }

    pre {
      background: #020617;
      padding: 10px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>PixelProof 🔍</h1>

    <input type="file" id="fileInput"><br>
    <button onclick="upload()">Analyze Image</button>

    <div id="result"></div>
  </div>

  <script>
    async function upload() {
      const file = document.getElementById("fileInput").files[0];
      const resultDiv = document.getElementById("result");

      if (!file) {
        alert("Please select a file");
        return;
      }

      resultDiv.innerHTML = "<p>Analyzing image...</p>";

      const formData = new FormData();
      formData.append("image", file);

      try {
        const res = await fetch("https://pixelproof-backend-v2.onrender.com", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        // Save result for PDF
        window.lastResult = data;

        resultDiv.innerHTML = `
          <div class="card">
            <h2>Analysis Result</h2>

            <p><strong>Score:</strong> ${data.score}</p>
            <p><strong>Conclusion:</strong> ${data.ela_result}</p>

            <h3>Findings</h3>
            <ul>
              ${data.findings.map(f => `<li>${f}</li>`).join("")}
            </ul>

            <h3>Metadata</h3>
            ${
              Object.keys(data.metadata || {}).length === 0
              ? "<p>No metadata found</p>"
              : `<pre>${JSON.stringify(data.metadata, null, 2)}</pre>`
            }

            <h3>ELA Visualization</h3>
            ${
              data.ela_image
              ? `<img src="${data.ela_image}" width="100%"/>`
              : "<p>No ELA image available</p>"
            }

            <br>
            <button onclick="downloadReport()">Download PDF Report</button>
          </div>
        `;

      } catch (err) {
        console.error(err);
        resultDiv.innerHTML = "<p style='color:red;'>Error analyzing image</p>";
      }
    }

    async function downloadReport() {
      if (!window.lastResult) {
        alert("Run analysis first");
        return;
      }

      try {
        const res = await fetch("https://YOUR-RENDER-URL.onrender.com/api/report", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(window.lastResult)
        });

        const data = await res.json();

        window.open(data.report, "_blank");

      } catch (err) {
        console.error(err);
        alert("Failed to generate report");
      }
    }
  </script>
</body>
</html>
