<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { background:#0f172a; color:white; font-family:system-ui; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

button { padding:10px; background:#3b82f6; border:none; color:white; border-radius:8px; margin:5px; cursor:pointer; }
#analyzeBtn { background:#22c55e; }

.card { background:#020617; padding:18px; border-radius:12px; margin-top:15px; }

.tabs { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tab { padding:10px; background:#1e293b; border-radius:8px; cursor:pointer; }
.tab.active { background:#3b82f6; }

.tab-content { display:none; }
.tab-content.active { display:block; }

.image-row { display:flex; gap:15px; flex-wrap:wrap; }
.image-row img { width:48%; max-height:400px; object-fit:contain; }

#map { height:400px; border-radius:12px; margin-top:15px; }

.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;}
.sheet{position:fixed;left:0;right:0;bottom:-300px;background:#020617;border-radius:16px 16px 0 0;padding:16px;transition:.25s;}
.sheet.open{bottom:0;}
.option{padding:12px;background:#1e293b;border-radius:8px;margin-top:8px;cursor:pointer;}

.badge{
padding:6px 12px;
border-radius:20px;
display:inline-block;
font-weight:bold;
}

.bar{
height:10px;
background:#1e293b;
border-radius:6px;
overflow:hidden;
margin-bottom:8px;
}
.bar-fill{
height:10px;
background:#3b82f6;
}
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/*">
<button onclick="openSheet()">📷 Take Photo</button>
<button id="analyzeBtn" onclick="analyzeImage()">Analyze</button>

<div id="result"></div>

</div>

<!-- CAMERA -->
<div id="sheetBackdrop" class="sheet-backdrop" onclick="closeSheet()"></div>
<div id="cameraSheet" class="sheet">
<label class="option">Rear Camera<input type="file" id="cameraRear" accept="image/*" capture="environment" hidden></label>
<label class="option">Front Camera<input type="file" id="cameraFront" accept="image/*" capture="user" hidden></label>
</div>

<script>

const API="https://pixelproof-backend-v2.onrender.com";

let selectedFile=null, previewURL=null, metadata={}, gps=null;

/* CAMERA */
function openSheet(){sheetBackdrop.style.display="block";cameraSheet.classList.add("open");}
function closeSheet(){sheetBackdrop.style.display="none";cameraSheet.classList.remove("open");}

/* FILE */
async function processFile(file){
selectedFile=file;
previewURL=URL.createObjectURL(file);
await new Promise(r=>{
EXIF.getData(file,function(){
metadata=EXIF.getAllTags(this)||{};
gps=extractGPS(metadata);
r();
});
});
}

file.onchange=e=>processFile(e.target.files[0]);
cameraRear.onchange=e=>{processFile(e.target.files[0]);closeSheet();}
cameraFront.onchange=e=>{processFile(e.target.files[0]);closeSheet();}

/* GPS */
function extractGPS(meta){
if(!meta.GPSLatitude||!meta.GPSLongitude)return null;
const d=c=>c[0]+c[1]/60+c[2]/3600;
let lat=d(meta.GPSLatitude),lon=d(meta.GPSLongitude);
if(meta.GPSLatitudeRef==="S")lat=-lat;
if(meta.GPSLongitudeRef==="W")lon=-lon;
return {lat,lon};
}

/* RESIZE FIX */
async function resizeImage(file){
return new Promise(resolve=>{
const img=new Image(),reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
img.onload=()=>{
const canvas=document.createElement("canvas");
let w=img.width,h=img.height,MAX=1280;
if(w>MAX){h*=MAX/w;w=MAX;}
canvas.width=w;canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
canvas.toBlob(b=>resolve(b?new File([b],"resized.jpg",{type:"image/jpeg"}):file));
};
img.onerror=()=>resolve(file);
reader.readAsDataURL(file);
});
}

/* ANALYZE */
async function analyzeImage(){
if(!selectedFile)return alert("Select image");

const resized=await resizeImage(selectedFile);

const form=new FormData();
form.append("image",resized);
form.append("metadata",JSON.stringify(metadata));
form.append("gps",JSON.stringify(gps));

const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
const data=await res.json();

render(data.result);
}

/* GAUGE */
function gauge(v,label){
const color=v>70?"#ef4444":v>40?"#f59e0b":"#22c55e";
return `<div style="text-align:center">
<svg width="120" height="120" style="transform:rotate(-90deg)">
<circle cx="60" cy="60" r="50" stroke="#1e293b" stroke-width="10" fill="none"/>
<circle cx="60" cy="60" r="50" stroke="${color}" stroke-width="10"
stroke-dasharray="314" stroke-dashoffset="${314-(v/100)*314}" fill="none"/>
</svg>
<div style="margin-top:-70px">${v}%</div>
<div>${label}</div>
</div>`;
}

/* RENDER */
function render(d){

const verdictColor = d.score>70?"#ef4444":d.score>40?"#f59e0b":"#22c55e";
const verdictText = d.score>70?"Likely Edited":d.score>40?"Possibly Edited":"Likely Original";

result.innerHTML=`

<div class="tabs">
<div class="tab active" onclick="tab(event,'r')">Results</div>
<div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">

<div class="card">

<h2>${d.analysis}</h2>

<div class="badge" style="background:${verdictColor}">
${verdictText}
</div>

<div style="display:flex;gap:30px;flex-wrap:wrap;margin-top:15px;">
${gauge(d.score,"Score")}
${gauge(d.confidence,"Confidence")}
</div>

<p>${d.simple_explanation}</p>

${d.pdf_report?`<a href="${d.pdf_report}" target="_blank">Download PDF</a>`:""}

<h3>Signal Breakdown</h3>

${Object.entries(d.signals).map(([k,v])=>`
<div>${k}: ${v}%</div>
<div class="bar"><div class="bar-fill" style="width:${v}%"></div></div>
`).join("")}

</div>

<div class="image-row">
<img src="${previewURL}">
<img src="${d.heatmap}">
</div>

</div>

<div id="meta" class="tab-content">
<div class="card">
${Object.entries(d.metadata.all||{}).map(([k,v])=>`<p>${k}: ${v}</p>`).join("")}
</div>
</div>

`;
}

/* TABS */
function tab(e,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
}

</script>

</body>
</html>
