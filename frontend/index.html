<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

html, body {
  background: #000;
  color: #fff;
  font-family: Arial;
  margin: 0;
  padding: 16px;
  text-align: center;
}

.hero {
  max-width: 700px;
  margin: 80px auto;
}

.logo {
  width: 280px;
  max-width: 90%;
  margin-bottom: 30px;
}

h1 { font-size: 2rem; }

p {
  font-size: 15px;
  color: #d1d5db;
}

.cta {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 28px;
  background: #1f2937;
  border-radius: 8px;
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<div class="hero">

  <img src="logo.png" class="logo" />

  <h1>Is this image real?</h1>

  <p>Detect edits, manipulation, and hidden changes using forensic analysis.</p>

  <a href="analyze.html" class="cta">Analyze a Photo</a>

</div>

</body>
</html>
