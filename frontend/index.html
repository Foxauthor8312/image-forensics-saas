<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}
button{padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:8px;margin:5px}
.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:8px;background:#1e293b;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:20px}
.bar{height:6px;background:#1e293b}
.bar-fill{height:6px}
#map{height:400px;border-radius:10px}
</style>
</head>

<body>
<div class="container">

<h1>PixelProof</h1>

<input type="file" id="file">
<button id="rearBtn">Rear</button>
<button id="frontBtn">Front</button>

<input id="rear" type="file" accept="image/*" capture="environment" hidden>
<input id="front" type="file" accept="image/*" capture="user" hidden>

<div id="progress" style="display:none;margin-top:15px;">
  <div style="background:#1e293b;height:8px;border-radius:6px;">
    <div id="bar" style="height:8px;width:0%;background:#3b82f6;"></div>
  </div>
  <div id="progressText" style="font-size:12px;margin-top:5px;">Starting...</div>
</div>

<div id="result"></div>

</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

// DOM
const file = document.getElementById("file");
const rear = document.getElementById("rear");
const front = document.getElementById("front");
const rearBtn = document.getElementById("rearBtn");
const frontBtn = document.getElementById("frontBtn");
const result = document.getElementById("result");

rearBtn.onclick = () => rear.click();
frontBtn.onclick = () => front.click();

let selectedFile, metadata={}, gps=null;

// 🔥 DEBUG SIGNALS
const SIGNAL_INFO = {
  ela:{label:"Compression Artifacts",weight:0.25},
  noise:{label:"Sensor Noise",weight:0.2},
  lighting:{label:"Lighting",weight:0.2},
  edges:{label:"Edges",weight:0.15},
  metadata:{label:"Metadata",weight:0.2}
};

file.onchange=handle;
rear.onchange=handle;
front.onchange=handle;

// 🔍 HANDLE FILE
async function handle(e){
  console.log("📂 FILE SELECTED");

  const f = e.target.files[0];
  if(!f) return;

  selectedFile = f;

  // 🔥 BYPASS EXIF (for debugging)
  metadata = {};
  gps = null;

  analyze();
}

// 🔄 Resize image
async function resizeImage(file){
  return new Promise(res=>{
    const img=new Image(), reader=new FileReader();

    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height,MAX=800;

      if(w>MAX){h*=MAX/w;w=MAX;}

      canvas.width=w;
      canvas.height=h;

      canvas.getContext("2d").drawImage(img,0,0,w,h);

      canvas.toBlob(b=>{
        console.log("🖼️ Image resized");
        res(new File([b],"resized.jpg",{type:"image/jpeg"}));
      });
    };

    reader.readAsDataURL(file);
  });
}

// 🔄 ANALYZE
async function analyze(){
  try{
    console.log("🚀 ANALYZE STARTED");

    showProgress();
    setProgress(10,"Preparing...");

    setProgress(30,"Resizing...");
    const resized = await resizeImage(selectedFile);

    const form=new FormData();
    form.append("image",resized);
    form.append("metadata",JSON.stringify(metadata));
    form.append("gps",JSON.stringify(gps));

    console.log("📡 SENDING REQUEST");

    setProgress(60,"Uploading...");

    const res = await fetch(API+"/api/analyze",{
      method:"POST",
      body:form
    });

    console.log("📥 RESPONSE RECEIVED");

    const text = await res.text();

    let data;
    try{
      data = JSON.parse(text);
    }catch(e){
      console.error("❌ NOT JSON:", text);
      alert("Server returned HTML instead of JSON");
      return;
    }

    console.log("✅ DATA:",data);

    setProgress(100,"Done");
    setTimeout(hideProgress,1000);

    render(data.result || data);

  }catch(err){
    console.error("❌ ERROR:",err);
    hideProgress();
    alert("Something failed — check console");
  }
}

// 📊 SCORE
function computeScore(signals){
  let total=0,weightSum=0;

  for(const [k,v] of Object.entries(signals)){
    const def=SIGNAL_INFO[k];
    if(!def) continue;

    total+=v*def.weight;
    weightSum+=def.weight;
  }

  return weightSum?Math.round(total/weightSum):0;
}

// 🖼️ RENDER
function render(d){
  console.log("🎯 RENDERING");

  const signals=d.signals||{};
  const score=computeScore(signals);

  const breakdown=Object.entries(signals).map(([k,v])=>`
    <div>${k}: ${v}%</div>
    <div class="bar"><div class="bar-fill" style="width:${v}%"></div></div>
  `).join("");

  result.innerHTML=`
    <h2>Score: ${score}%</h2>
    ${breakdown}
  `;
}

// UI helpers
function showProgress(){document.getElementById("progress").style.display="block";}
function hideProgress(){document.getElementById("progress").style.display="none";}
function setProgress(p,t){
  document.getElementById("bar").style.width=p+"%";
  document.getElementById("progressText").innerText=t;
}
</script>


</body>
</html>
