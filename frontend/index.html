<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<style>
body{background:#0f172a;color:white;font-family:Arial}
.container{max-width:1000px;margin:auto;padding:20px}
.tabs{display:flex;gap:10px;margin-top:20px}
.tab{padding:10px;background:#334155;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block}
img{width:100%;max-height:400px}
.overlay div{position:absolute;border:2px solid red}
</style>
</head>

<body>
<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<button onclick="upload()">Analyze</button>
<button onclick="downloadPDF()">PDF</button>

<div id="result"></div>

</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";
let selectedFile=null;
let currentData=null;

file.onchange=e=>selectedFile=e.target.files[0];

async function upload(){
  const form=new FormData();
  form.append("image",selectedFile);

  const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data=await res.json();
  poll(data.job_id);
}

function poll(id){
  const interval=setInterval(async()=>{
    const res=await fetch(API+"/api/status/"+id);
    const d=await res.json();

    if(d.status==="done"){
      clearInterval(interval);
      currentData=d.result;
      render(d.result);
    }

  },1500);
}

function render(data){
  const original=URL.createObjectURL(selectedFile);

  document.getElementById("result").innerHTML=`

<div class="tabs">
<div class="tab active" onclick="tab(event,'r')">Results</div>
<div class="tab" onclick="tab(event,'h')">Heatmap</div>
<div class="tab" onclick="tab(event,'s')">Simple</div>
<div class="tab" onclick="tab(event,'m')">Map</div>
<div class="tab" onclick="tab(event,'meta')">Metadata</div>
</div>

<div id="r" class="tab-content active">
<img src="${original}">
<img src="${data.ela_image}">
</div>

<div id="h" class="tab-content">
<div style="position:relative">
<img src="${data.heatmap}">
<div id="overlay"></div>
</div>
<div id="info"></div>
</div>

<div id="s" class="tab-content">
<h2>${data.simple_explanation.result}</h2>
<p>${data.simple_explanation.meaning}</p>
${data.simple_explanation.reasons.map(r=>`<p>• ${r}</p>`).join("")}
</div>

<div id="m" class="tab-content">
${data.gps ? `
<p>${data.gps.lat}, ${data.gps.lon}</p>
<iframe width="100%" height="400"
src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed"></iframe>
` : "<p>No GPS found</p>"}
</div>

<div id="meta" class="tab-content">
${data.metadata?.available ? `
<p>Camera: ${data.metadata.Make||""} ${data.metadata.Model||""}</p>
<p>Date: ${data.metadata.DateTime||""}</p>
<p>Software: ${data.metadata.Software||""}</p>
<p>Size: ${data.metadata.ImageWidth}x${data.metadata.ImageHeight}</p>
` : "<p>No metadata</p>"}
</div>
`;

setTimeout(()=>draw(data.regions),300);
}

function draw(regions){
  const overlay=document.getElementById("overlay");
  overlay.innerHTML="";
  regions.forEach((r,i)=>{
    const box=document.createElement("div");
    box.style.left=r.x+"px";
    box.style.top=r.y+"px";
    box.style.width=r.w+"px";
    box.style.height=r.h+"px";
    box.onclick=()=>document.getElementById("info").innerHTML=r.reason;
    overlay.appendChild(box);
  });
}

function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
}

function downloadPDF(){
  if(!currentData?.report) return alert("No report");
  window.open(currentData.report);
}
</script>

</body>
</html>
