<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelProof</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0a;
  --panel: #0f172a;
  --border: #1e293b;
  --muted: #9ca3af;
  --text: #e5e7eb;
  --blue: #3b82f6;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
}

/* SCREENS */
.screen {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.screen.active {
  display: flex;
}

/* INTRO */
.logo {
  height: 80px;
  margin-bottom: 20px;
}

.title {
  font-size: 28px;
  font-weight: 600;
}

.subtitle {
  color: var(--muted);
  margin: 10px 0 30px;
  text-align: center;
  max-width: 400px;
}

.button {
  background: var(--blue);
  padding: 12px 22px;
  border-radius: 8px;
  cursor: pointer;
}

/* UPLOAD */
.upload {
  border: 2px dashed #2a2a2a;
  padding: 30px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  margin-top: 20px;
}

/* PANEL */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 18px;
  border-radius: 12px;
  max-width: 520px;
  width: 90%;
  margin-top: 20px;
}

/* VIEWER */
.viewer {
  max-width: 520px;
  width: 90%;
}

.slider-container {
  position: relative;
}

.slider-container img {
  width: 100%;
  border-radius: 8px;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay img {
  width: 100%;
  mix-blend-mode: screen;
  opacity: 0.8;
}

.slider {
  width: 100%;
  margin-top: 10px;
}

/* TEXT */
.small {
  font-size: 13px;
  color: var(--muted);
}
  /* HERO */

.hero {
  text-align: center;
  max-width: 520px;
  padding: 40px 20px;
}

.hero-logo {
  height: 70px;
  margin-bottom: 25px;
}

.hero-title {
  font-size: 36px;
  font-weight: 600;
  line-height: 1.2;
  margin-bottom: 14px;
}

.hero-sub {
  font-size: 15px;
  color: #9ca3af;
  line-height: 1.6;
  margin-bottom: 30px;
}

.hero-cta {
  display: inline-block;
  background: #3b82f6;
  padding: 14px 26px;
  border-radius: 10px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.hero-cta:hover {
  transform: translateY(-2px);
  background: #2563eb;
}

.hero-note {
  font-size: 12px;
  color: #6b7280;
  margin-top: 12px;
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="intro" class="screen active">

  <div class="hero">

    <img src="logo.png" class="hero-logo">

    <div class="hero-title">
      Verify Images.<br>Expose Edits.
    </div>

    <div class="hero-sub">
      PixelProof analyzes compression patterns and metadata to detect manipulation, recompression, and authenticity with forensic-level insight.
    </div>

    <div class="hero-cta" onclick="goToUpload()">
      Analyze an Image
    </div>

    <div class="hero-note">
      No upload stored • Instant analysis
    </div>

  </div>

</div>

<!-- UPLOAD SCREEN -->
<div id="uploadScreen" class="screen">

  <div class="title">Upload Image</div>

  <label class="upload">
    <input type="file" id="file" hidden>
    Click to select image
  </label>

</div>

<!-- RESULT SCREEN -->
<div id="resultScreen" class="screen">

  <div id="result" class="panel"></div>
  <div id="meta" class="panel" style="display:none;"></div>

  <div id="viewer" class="viewer" style="display:none;">
    <div class="slider-container">
      <img id="img">
      <div class="overlay" id="overlay">
        <img id="ela">
      </div>
    </div>
    <input type="range" id="slider" min="0" max="100" value="50" class="slider">
  </div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function show(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

function goToUpload() {
  show("uploadScreen");
}

const slider = document.getElementById("slider");
const overlay = document.getElementById("overlay");

slider.oninput = () => {
  overlay.style.width = slider.value + "%";
};

document.getElementById("file").onchange = async e => {

  const file = e.target.files[0];
  if (!file) return;

  show("resultScreen");

  document.getElementById("viewer").style.display = "block";
  document.getElementById("img").src = URL.createObjectURL(file);

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const conf = Math.round((data.classification?.confidence || 0.5) * 100);
  const type = data.classification?.type || "Unknown";

  document.getElementById("result").innerHTML = `
    <strong>${type}</strong> (${conf}%)

    <div style="height:6px;background:#1e293b;margin:10px 0;">
      <div style="width:${conf}%;height:100%;background:#3b82f6;"></div>
    </div>

    <div class="small">Tampering Probability</div>
    <div style="height:8px;background:#1e293b;">
      <div style="width:${100-conf}%;height:100%;background:linear-gradient(90deg,green,orange,red);"></div>
    </div>
  `;

  if (data.exif) {
    let html = "";
    if (data.exif.make) html += `Camera: ${data.exif.make} ${data.exif.model||""}<br>`;
    if (data.exif.date) html += `Date: ${new Date(data.exif.date).toLocaleString()}<br>`;

    if (data.exif.gps) {
      html += `Location: ${data.exif.gps.lat.toFixed(5)}, ${data.exif.gps.lon.toFixed(5)}<br>`;
      html += `<iframe width="100%" height="200"
        src="https://maps.google.com/maps?q=${data.exif.gps.lat},${data.exif.gps.lon}&z=14&output=embed"></iframe>`;
    }

    document.getElementById("meta").innerHTML = html;
    document.getElementById("meta").style.display = "block";
  }

  if (data.ela?.overlay) {
    document.getElementById("ela").src = data.ela.overlay;
  }
};
</script>

</body>
</html>
