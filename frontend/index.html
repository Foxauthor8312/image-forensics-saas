<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
.container{max-width:1000px;margin:40px auto;padding:20px}
.drop{border:2px dashed #334155;padding:40px;text-align:center;border-radius:10px;cursor:pointer}
.tabs{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.tab{padding:10px;background:#334155;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none;margin-top:20px}
.tab-content.active{display:block}
img{width:100%;max-height:400px;object-fit:contain}
.bar{background:#1e293b;border-radius:6px}
.bar-inner{background:#3b82f6;height:10px;border-radius:6px}
</style>
</head>

<body>
<div class="container">
<h1>PixelProof</h1>

<div class="drop" id="drop">Drop or Click<input type="file" id="file" hidden></div>
<button onclick="upload()">Analyze</button>

<div id="result"></div>
</div>

<script>
const API="https://pixelproof-backend-v2.onrender.com";
let file=null, map=null;

drop.onclick=()=>file.click();
file.onchange=e=>file=e.target.files[0];
drop.ondrop=e=>{e.preventDefault();file=e.dataTransfer.files[0]};

async function upload(){
 const f=document.getElementById("file").files[0];
 if(!f) return alert("select file");

 const form=new FormData();
 form.append("image",f);

 const res=await fetch(API+"/api/analyze",{method:"POST",body:form});
 const {job_id}=await res.json();
 poll(job_id,f);
}

async function poll(id,f){
 const int=setInterval(async()=>{
  const res=await fetch(API+"/api/status/"+id);
  const d=await res.json();

  if(d.status==="done"){
    clearInterval(int);
    render(d.result,f);
  }
 },1500);
}

function render(d,f){
 const orig=URL.createObjectURL(f);

 document.getElementById("result").innerHTML=`
 <div>
  <div>${d.score} | ${d.confidence}% | ${d.ela_result}</div>

  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'h')">Heatmap</div>
    <div class="tab" onclick="tab(event,'m')">Metadata</div>
    <div class="tab" onclick="tab(event,'e')">Explanation</div>
    <div class="tab" onclick="tab(event,'map')">Map</div>
  </div>

  <div id="r" class="tab-content active">
    <img src="${orig}">
    <img src="${d.ela_image}">
  </div>

  <div id="h" class="tab-content">
    <img src="${d.heatmap}">
  </div>

  <div id="m" class="tab-content">
    <pre>${JSON.stringify(d.metadata,null,2)}</pre>
  </div>

  <div id="e" class="tab-content">
    <p>${d.narrative}</p>
    ${bar("ELA",d.confidence_breakdown.ela)}
    ${bar("Noise",d.confidence_breakdown.noise)}
    ${bar("Sharp",d.confidence_breakdown.sharpness)}
  </div>

  <div id="map" class="tab-content">
    <div id="mapBox" style="height:400px"></div>
    <p id="mapMsg"></p>
  </div>
 </div>`;

 renderMap(d.gps);
}

function tab(e,id){
 document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));
 document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 e.target.classList.add("active");
}

function bar(n,v){
 return `<div>${n}:${v}<div class="bar"><div class="bar-inner" style="width:${v}%"></div></div></div>`;
}

function renderMap(gps){
 const msg=document.getElementById("mapMsg");
 if(!gps){msg.innerHTML="No GPS data";return;}

 if(map){map.remove();}
 map=L.map("mapBox").setView(gps,13);

 L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

 const icon=L.divIcon({html:`<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid white;"></div>`});

 L.marker(gps,{icon}).addTo(map);
 msg.innerHTML=`Lat:${gps[0]}, Lon:${gps[1]}`;
}
</script>
</body>
</html>
