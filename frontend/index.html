<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
}

button {
  padding:10px 20px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

/* Tabs */
.tabs {
  display:flex;
  gap:10px;
  margin-top:20px;
}

.tab {
  padding:10px;
  background:#334155;
  cursor:pointer;
  border-radius:6px;
}

.tab.active {
  background:#3b82f6;
}

.tab-content {
  display:none;
  margin-top:20px;
}

.tab-content.active {
  display:block;
}

/* Images */
img {
  width:100%;
  max-height:420px;
  object-fit:contain;
  border-radius:6px;
}

.row {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.row div {
  flex:1 1 45%;
}

/* Overlay */
.overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.overlay div {
  position:absolute;
  border:2px solid red;
  cursor:pointer;
}

/* Cards */
.card {
  background:#020617;
  padding:15px;
  border-radius:8px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file">
<br>
<button onclick="upload()">Analyze</button>
<button id="pdfBtn" style="display:none;" onclick="downloadPDF()">Download PDF</button>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";

let selectedFile = null;
let currentData = null;

file.onchange = e => selectedFile = e.target.files[0];

// -----------------------------
// UPLOAD
// -----------------------------
async function upload() {
  if (!selectedFile) return alert("Select an image");

  document.getElementById("result").innerHTML = "Starting analysis...";

  await fetch(API + "/health").catch(()=>{});

  const form = new FormData();
  form.append("image", selectedFile);

  const res = await fetch(API + "/api/analyze", {
    method:"POST",
    body:form
  });

  const data = await res.json();
  poll(data.job_id);
}

// -----------------------------
// POLL
// -----------------------------
function poll(id){
  const interval = setInterval(async ()=>{
    const res = await fetch(API + "/api/status/" + id);
    const d = await res.json();

    if (d.status === "processing") {
      document.getElementById("result").innerHTML = "Processing...";
    }

    if (d.status === "done") {
      clearInterval(interval);
      currentData = d.result;
      render(d.result);
    }

    if (d.status === "error") {
      clearInterval(interval);
      document.getElementById("result").innerHTML = "Error: " + d.error;
    }

  },1500);
}

// -----------------------------
// RENDER
// -----------------------------
function render(data){

  const original = URL.createObjectURL(selectedFile);
  document.getElementById("pdfBtn").style.display = "inline-block";

  document.getElementById("result").innerHTML = `

    <div>
      <b>Score:</b> ${data.score} |
      <b>Confidence:</b> ${data.confidence}%
    </div>

    <div class="tabs">
      <div class="tab active" onclick="openTab(event,'results')">Results</div>
      <div class="tab" onclick="openTab(event,'heatmap')">Heatmap</div>
      <div class="tab" onclick="openTab(event,'simple')">Simple</div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="tab-content active">
      <div class="row">
        <div><img src="${original}"></div>
        <div><img src="${data.ela_image}"></div>
      </div>
    </div>

    <!-- HEATMAP -->
    <div id="heatmap" class="tab-content">
      <div style="position:relative">

        ${data.heatmap ? `<img id="heatmapImg" src="${data.heatmap}">` : "<p>No heatmap available</p>"}

        <div id="overlay" class="overlay"></div>
      </div>

      <div id="regionInfo" class="card"></div>
    </div>

    <!-- SIMPLE -->
    <div id="simple" class="tab-content">
      <div class="card">

        <h2>${data.simple_explanation?.result || "N/A"}</h2>

        <p>${data.simple_explanation?.meaning || ""}</p>

        ${(data.simple_explanation?.reasons || []).map(r => `<p>• ${r}</p>`).join("")}

      </div>
    </div>
  `;

  setTimeout(()=>drawRegions(data.regions),300);
}

// -----------------------------
// DRAW REGIONS
// -----------------------------
function drawRegions(regions){
  const overlay = document.getElementById("overlay");
  overlay.innerHTML = "";

  if (!regions) return;

  regions.forEach((r,i)=>{
    const box = document.createElement("div");

    box.style.left = r.x + "px";
    box.style.top = r.y + "px";
    box.style.width = r.w + "px";
    box.style.height = r.h + "px";

    box.onclick = ()=>{
      document.getElementById("regionInfo").innerHTML =
        "<b>Region "+(i+1)+"</b><br>"+r.reason;
    };

    overlay.appendChild(box);
  });
}

// -----------------------------
// TABS
// -----------------------------
function openTab(evt, name){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(name).classList.add("active");
  evt.target.classList.add("active");
}

// -----------------------------
// PDF
// -----------------------------
function downloadPDF(){
  if (!currentData?.report) return alert("No report available");
  window.open(currentData.report);
}

</script>

</body>
</html>
