<!DOCTYPE html>
<html>
<head>
<title>PixelProof</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { max-width:1000px; margin:auto; padding:20px; }
.card { background:#020617; padding:15px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>PixelProof 🔍</h1>

<input type="file" id="file" accept="image/jpeg">
<button onclick="upload()">Analyze</button>

<div id="result"></div>

</div>

<script>

const API = "https://pixelproof-backend-v2.onrender.com";
let selectedFile = null;

// 🔥 RAW FILE ONLY (NO PROCESSING)
document.getElementById("file").onchange = (e) => {
  selectedFile = e.target.files[0];
  console.log("RAW FILE SELECTED:", selectedFile);
};

async function upload(){

  if(!selectedFile){
    alert("Select file");
    return;
  }

  // 🚨 DO NOT MODIFY FILE
  const form = new FormData();
  form.append("image", selectedFile);
  form.append("original", selectedFile);

  try {

    const res = await fetch(API + "/api/analyze", {
      method: "POST",
      body: form
    });

    const data = await res.json();

    console.log("SERVER RESPONSE:", data);

    document.getElementById("result").innerHTML = `
      <div class="card">
        <h2>${data.result.analysis}</h2>
        <p>Score: ${data.result.score}</p>
        <p>Confidence: ${data.result.confidence}%</p>

        <hr>

        <p><b>Metadata Available:</b> ${data.result.metadata?.available}</p>
        <pre style="white-space:pre-wrap;">
${JSON.stringify(data.result.metadata?.all, null, 2)}
        </pre>

        <p><b>GPS:</b> ${JSON.stringify(data.result.gps)}</p>
      </div>
    `;

  } catch(err){
    console.error(err);
    document.getElementById("result").innerHTML = "Upload failed";
  }
}

</script>

</body>
</html>
