<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.ico?v=2">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;margin:0}
.container{padding:20px;max-width:1100px;margin:auto}

/* HEADER */
.app-header{
  display:flex;align-items:center;gap:12px;
  padding:15px;margin-bottom:20px;
  background:#1e293b;border-radius:12px;
}
.logo img{width:40px;border-radius:8px}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
}
.panel{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

/* DROP ZONE */
.drop-zone{
  border:2px dashed rgba(255,255,255,0.2);
  padding:40px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}
.drop-zone.dragover{border-color:#22c55e}

/* RESULTS */
.bar{height:6px;background:#111;margin:5px 0}
.bar-fill{height:6px;background:#3b82f6}

.tabs{display:flex;gap:10px;margin-top:15px}
.tab{padding:6px 10px;background:#111;border-radius:6px;cursor:pointer}
.tab.active{background:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block;margin-top:10px}

pre{white-space:pre-wrap;font-size:12px;opacity:0.8}

/* FOOTER */
.app-footer{
  margin-top:30px;padding:15px 20px;
  display:flex;justify-content:space-between;
  background:#1e293b;border-radius:12px;
  font-size:12px;opacity:.85;
}
.footer-sub{font-size:11px;opacity:.6}
</style>
</head>

<body>
<div class="container">

<header class="app-header">
  <div class="logo"><img src="/icon-192.png"></div>
  <div>
    <div style="font-size:20px;font-weight:600;">PixelProof</div>
    <div style="font-size:12px;opacity:0.6;">AI forensic image analysis</div>
  </div>
</header>

<div class="dashboard">

  <!-- LEFT -->
  <div class="panel">
    <div id="dropZone" class="drop-zone">
      Drag & Drop Image<br><span style="opacity:.6">or click</span>
    </div>
    <input type="file" id="file" hidden>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <div id="result"></div>
  </div>

</div>

<footer class="app-footer">
  <div>
    <strong>PixelProof</strong>
    <div class="footer-sub">Results are probabilistic and not legal evidence</div>
  </div>
  <div>
    <div id="buildInfo"></div>
    <div id="backendStatus">Backend: checking…</div>
  </div>
</footer>

</div>

<script>
const API = "https://pixelproof-backend-v2.onrender.com";

const file = document.getElementById("file");
const dropZone = document.getElementById("dropZone");
const result = document.getElementById("result");

let selectedFile = null;

/* DRAG + CLICK */
dropZone.onclick = () => file.click();

dropZone.addEventListener("dragover", e=>{
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", ()=>{
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e=>{
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handle({target:{files:e.dataTransfer.files}});
});

file.onchange = handle;

/* HANDLE */
function handle(e){
  const f = e.target.files[0];
  if(!f) return;
  selectedFile = f;
  analyze();
}

/* RESIZE */
function resize(file){
  return new Promise(res=>{
    const img=new Image(), r=new FileReader();
    r.onload=e=>img.src=e.target.result;
    img.onload=()=>{
      const c=document.createElement("canvas");
      let w=img.width,h=img.height;
      if(w>800){h*=800/w;w=800;}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>res(new File([b],"x.jpg")));
    };
    r.readAsDataURL(file);
  });
}

/* ANALYZE */
async function analyze(){
  const resized = await resize(selectedFile);
  const form=new FormData();
  form.append("image",resized);

  const res = await fetch(API+"/api/analyze",{method:"POST",body:form});
  const data = await res.json();

  render(data.result || data);
}

/* SCORE */
function score(signals){
  let t=0,w=0;
  for(let k in signals){
    let wt={ela:.5,noise:.25,metadata:.25}[k]||0;
    t+=signals[k]*wt; w+=wt;
  }
  return w?Math.round(t/w):0;
}

/* CONFIDENCE (SMART) */
function signalConfidence(signals){
  const conf = {};
  const vals = Object.values(signals);
  const avg = vals.reduce((a,b)=>a+b,0)/(vals.length||1);

  for(let k in signals){
    let v=signals[k], c=50;

    if(v>75) c=90;
    else if(v>60) c=80;
    else if(v>45) c=70;
    else if(v>30) c=60;

    if(Math.abs(v-avg)<15) c+=5;
    if(k==="ela") c+=5;
    if(k==="metadata") c-=5;

    conf[k]=Math.min(95,Math.max(45,Math.round(c)));
  }
  return conf;
}

/* EXPLANATION */
function explain(signals,s){
  const conf = signalConfidence(signals);
  let parts=[];

  if(signals.ela>60) parts.push(`compression artifacts (conf ${conf.ela}%)`);
  if(signals.noise>50) parts.push(`noise mismatch (conf ${conf.noise}%)`);
  if(signals.metadata>40) parts.push(`metadata anomalies (conf ${conf.metadata}%)`);

  if(!parts.length) parts.push("no strong anomalies detected");

  let conclusion = s>70
    ? "strong evidence of alteration"
    : s>40
    ? "possible modification"
    : "likely authentic";

  return { narrative: parts.join(", "), conclusion };
}

/* REPORT */
function report(signals,s){
  return `Based on forensic analysis:

ELA: ${signals.ela}%
Noise: ${signals.noise}%
Metadata: ${signals.metadata}%

Conclusion: ${
    s>70?"Altered image likely":
    s>40?"Possible modification":
    "No significant manipulation"
  }`;
}

/* RENDER */
function render(d){
  
const signals=d.signals||{};
const s=score(signals);
const conf=signalConfidence(signals);
const exp=explain(signals,s);
const rep=report(signals,s);

// 👇 ADD THIS BLOCK RIGHT HERE
window.lastSignals = signals;
window.lastScore = s;
window.lastExplanation = exp;
window.lastReport = rep;
window.lastHeatmap = d.heatmap ? API + d.heatmap : null;
  

  const bars = Object.entries(signals).map(([k,v])=>`
    <div>
      <div style="display:flex;justify-content:space-between">
        <span>${k}: ${v}%</span>
        <span style="opacity:.7">conf ${conf[k]}%</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${v}%"></div></div>
      <div class="bar" style="opacity:.3">
        <div class="bar-fill" style="width:${conf[k]}%;background:#22c55e"></div>
      </div>
    </div>
  `).join("");

  result.innerHTML = `
  <div class="tabs">
    <div class="tab active" onclick="tab(event,'r')">Results</div>
    <div class="tab" onclick="tab(event,'d')">Detailed</div>
  </div>

  <div id="r" class="tab-content active">
    <h2>${s>70?"Likely Altered":s>40?"Possibly Modified":"Likely Authentic"}</h2>
   <p>Score: ${s}%</p>

<button onclick="exportPDF()" style="margin-top:10px">
  Download Report (PDF)
</button>
    ${bars}
    ${d.heatmap?`<img src="${API+d.heatmap}" style="width:100%;margin-top:10px">`:""}
  </div>

  <div id="d" class="tab-content">
    <p><strong>Analysis:</strong> ${exp.narrative}</p>
    <p><strong>Conclusion:</strong> ${exp.conclusion}</p>
    <pre>${rep}</pre>
  </div>
  `;
}

/* TABS */
function tab(e,id){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
}
async function exportPDF(){
const { jsPDF } = window.jspdf;

const doc = new jsPDF();
let y = 10;

doc.text(`Generated: ${new Date().toLocaleString()}`, 10, y);
y += 8;

  doc.setFontSize(16);
  doc.text("PixelProof Forensic Report", 10, y);
  y += 10;

  doc.setFontSize(12);
  doc.text(`Score: ${window.lastScore}%`, 10, y);
  y += 8;

  doc.text("Signals:", 10, y);
  y += 6;

  Object.entries(window.lastSignals).forEach(([k,v])=>{
    doc.text(`${k}: ${v}%`, 12, y);
    y += 6;
  });

  y += 4;

  doc.text("Analysis:", 10, y);
  y += 6;
  doc.text(doc.splitTextToSize(window.lastExplanation.narrative, 180), 10, y);
  y += 10;

  doc.text("Conclusion:", 10, y);
  y += 6;
  doc.text(doc.splitTextToSize(window.lastExplanation.conclusion, 180), 10, y);
  y += 10;

  doc.text("Forensic Report:", 10, y);
  y += 6;
  doc.text(doc.splitTextToSize(window.lastReport, 180), 10, y);

  if(window.lastHeatmap){
    try{
     const dataUrl = await loadImageAsDataURL(window.lastHeatmap);

doc.addPage();
doc.text("Heatmap Analysis", 10, 10);
doc.addImage(dataUrl, "PNG", 10, 20, 180, 120);
    }catch{}
  }

  doc.save("pixelproof-report.pdf");
}

function loadImageAsDataURL(url){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.crossOrigin = "anonymous";

    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      resolve(canvas.toDataURL("image/png"));
    };

    img.onerror = reject;
    img.src = url;
  });
}
/* FOOTER INFO */
document.getElementById("buildInfo").innerText =
  "Build: " + new Date().toLocaleDateString();

async function checkBackend(){
  try{
    const r=await fetch(API);
    document.getElementById("backendStatus").innerText =
      r.ok?"Backend: online":"Backend: error";
  }catch{
    document.getElementById("backendStatus").innerText = "Backend: offline";
  }
}
checkBackend();
</script>

</body>
</html>
