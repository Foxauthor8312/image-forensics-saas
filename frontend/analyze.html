<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

html, body {
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.back {
  color: #9ca3af;
  text-decoration: none;
  font-size: 14px;
}

/* INPUT + BUTTON */
input { width: 100%; margin: 15px 0; }

button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  background: #1f2937;
  border: none;
  color: white;
  border-radius: 8px;
}

/* LOADER */
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #1e293b;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loader-text {
  margin-top: 10px;
  color: #9ca3af;
  font-size: 14px;
  text-align: center;
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  margin-top: 20px;
  border-bottom: 1px solid #333;
  overflow-x: auto;
}

.tab {
  padding: 12px 16px;
  cursor: pointer;
  color: #9ca3af;
  white-space: nowrap;
}

.tab.active {
  color: #fff;
  border-bottom: 2px solid #fff;
}

.tab-content {
  display: none;
  margin-top: 15px;
}

.tab-content.active {
  display: block;
}

/* META */
.meta-row {
  padding: 6px 0;
  border-bottom: 1px solid #222;
}

/* SIGNALS */
.signal { margin: 6px 0; }
.good { color: #22c55e; }
.warn { color: #f59e0b; }
.bad { color: #ef4444; }

/* SLIDER */
.slider-container {
  position: relative;
  touch-action: pan-y;
}

.slider-container img {
  width: 100%;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay img {
  width: 100%;
  opacity: 0.9;
}

.divider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: white;
}

.slider {
  width: 100%;
  height: 30px;
  margin-top: 10px;
}

/* MAP */
.map-container {
  width: 100%;
  height: 300px;
  border-radius: 8px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" accept="image/*" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function buildForensicReport(type, conf, hasExif, hasGPS) {

  const integrity = Math.round(conf);
  let risk = "Moderate";

  if (integrity >= 80) risk = "Low";
  else if (integrity <= 50) risk = "High";

  const explanations = {
    "Likely Original": {
      summary: "No strong indicators of manipulation were detected.",
      detail: "Compression patterns are consistent across the image, and no localized anomalies were identified in the ELA overlay.",
      whatToLook: "Uniform brightness across the ELA map with no isolated hotspots.",
      conclusion: "The image is likely authentic."
    },

    "Recompressed": {
      summary: "The image shows signs of recompression.",
      detail: "Compression differences are distributed broadly, which typically occurs when an image is resaved or processed.",
      whatToLook: "Even compression variation across the entire image.",
      conclusion: "Recompression is present, but does not confirm editing."
    },

    "Edited": {
      summary: "Compression inconsistencies suggest localized changes.",
      detail: "The ELA overlay reveals uneven compression patterns, often associated with edited regions.",
      whatToLook: "Brighter or patchy areas in specific regions of the image.",
      conclusion: "This image may have been altered."
    },

    "Unknown": {
      summary: "No strong or consistent signal was detected.",
      detail: "The compression pattern does not clearly match known indicators.",
      whatToLook: "Weak or inconsistent ELA signals.",
      conclusion: "Result is inconclusive."
    }
  };

  const base = explanations[type] || explanations["Unknown"];

  return {
    integrity,
    risk,
    ...base,
    metaNote: hasExif
      ? "Metadata is present and supports structural analysis."
      : "Metadata is missing, which may indicate removal or privacy filtering.",
    gpsNote: hasGPS
      ? "Location data is embedded in the image."
      : "No GPS data found."
  };
}
  
function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));

  document.getElementById("tab-" + name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

function getCompressionExplanation(type) {
  const base = "The ELA overlay highlights compression differences. Brighter areas indicate regions that compress differently.";

  const map = {
    "Likely Original": "Compression appears uniform across the image.",
    "Recompressed": "Compression differences are spread across the image.",
    "Edited": "Localized bright areas suggest possible editing.",
    "Unknown": "No clear compression pattern detected."
  };

  return base + " " + (map[type] || map["Unknown"]);
}

async function analyze() {

  const file = document.getElementById("fileInput").files[0];
  const resultEl = document.getElementById("result");

  if (!file) return alert("Select an image");

  // ✅ LOADER START
  resultEl.innerHTML = `
    <div style="text-align:center;margin-top:40px;">
      <div class="spinner"></div>
      <div class="loader-text">Analyzing image...</div>
    </div>
  `;

  const form = new FormData();
  form.append("image", file);

  try {

    const res = await fetch(API + "/analyze", {
      method: "POST",
      body: form
    });

    const data = await res.json();

    const type = data.classification?.type || "Unknown";
    const conf = Math.round((data.classification?.confidence || 0.5) * 100);

    const lat = data.gps?.lat;
    const lon = data.gps?.lon;

    const report = buildForensicReport(
  type,
  (data.classification?.confidence || 0.5) * 100,
  !!data.exif,
  !!(lat && lon)
);
    
    const signals = [];

    if (data.exif) signals.push('<div class="signal good">✔ Camera data intact</div>');
    else signals.push('<div class="signal warn">⚠ Metadata missing</div>');

    if (lat && lon) signals.push('<div class="signal good">✔ Location data present</div>');
    else signals.push('<div class="signal warn">⚠ No GPS data</div>');

    if (type === "Edited") signals.push('<div class="signal bad">✖ Compression anomalies</div>');

    resultEl.innerHTML = `
      <div style="font-size:22px;font-weight:600;">${type}</div>
      <div style="color:#9ca3af;margin-bottom:12px;">Confidence: ${conf}%</div>

      <div class="tabs">
        <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
        <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
        <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
        <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      </div>

      <div id="overview" class="tab-content active">

  <div style="margin-bottom:14px;">
    <div style="font-size:18px;font-weight:600;">
      Integrity Score: ${report.integrity} / 100
    </div>
    <div style="color:#9ca3af;">
      Risk Level: ${report.risk}
    </div>
  </div>

  <div style="margin-bottom:14px;">
    <strong>Summary</strong>
    <div style="margin-top:6px;color:#cbd5f5;">
      ${report.summary}
    </div>
  </div>

  <div style="margin-bottom:14px;">
    <strong>Technical Findings</strong>
    <div style="margin-top:6px;color:#cbd5f5;">
      ${report.detail}
    </div>
  </div>

  <div style="margin-bottom:14px;">
    <strong>What to Look For</strong>
    <div style="margin-top:6px;color:#cbd5f5;">
      ${report.whatToLook}
    </div>
  </div>

  <div style="margin-bottom:14px;">
    <strong>Conclusion</strong>
    <div style="margin-top:6px;color:#cbd5f5;">
      ${report.conclusion}
    </div>
  </div>

  <div style="margin-top:14px;">
    ${signals.join("")}
  </div>

  <div style="margin-top:12px;color:#9ca3af;font-size:13px;">
    ${report.metaNote}<br>
    ${report.gpsNote}
  </div>

</div>

      <div id="ela" class="tab-content">
        <div class="slider-container">
          <img src="${URL.createObjectURL(file)}">
          <div class="overlay" id="overlay">
            <img src="${data.ela?.overlay}">
          </div>
          <div class="divider" id="divider"></div>
        </div>
        <input type="range" id="slider" min="0" max="100" value="50" class="slider">
      </div>

      <div id="metadata" class="tab-content">
        <div class="meta-row">Camera: ${data.exif?.Make ?? "-"}</div>
        <div class="meta-row">Model: ${data.exif?.Model ?? "-"}</div>
        <div class="meta-row">Date: ${data.exif?.DateTimeOriginal ?? "-"}</div>
        <div class="meta-row">Latitude: ${lat ?? "-"}</div>
        <div class="meta-row">Longitude: ${lon ?? "-"}</div>
      </div>

      <div id="map" class="tab-content">
        ${
          (lat && lon)
          ? `<div class="map-container">
               <iframe src="https://www.google.com/maps?q=${lat},${lon}&z=18&output=embed&t=k"></iframe>
             </div>`
          : `<div style="color:#9ca3af;">No GPS data available</div>`
        }
      </div>
    `;

    const slider = document.getElementById("slider");
    const overlay = document.getElementById("overlay");
    const divider = document.getElementById("divider");

    if (slider && overlay) {
      slider.oninput = () => {
        overlay.style.width = slider.value + "%";
        divider.style.left = slider.value + "%";
      };
    }

  } catch (err) {
    console.error(err);
    resultEl.innerHTML = "Server waking up — try again";
  }
}
</script>

</body>
</html>
