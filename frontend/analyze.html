<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PixelProof Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { background:#0a0f1a; color:#e5e7eb; font-family:-apple-system,Segoe UI; padding:16px; }
.container { max-width:900px; margin:auto; }

.header { font-size:22px; font-weight:600; margin-bottom:6px; }
.sub { font-size:13px; color:#9ca3af; margin-bottom:20px; }

button {
  width:100%; padding:12px;
  background:#1f2937; border:1px solid #374151;
  border-radius:8px; color:white;
  margin-top:10px;
}

.secondary { background:#111827; }

.card {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.section-title { font-weight:600; margin-bottom:8px; }
.score { font-size:36px; font-weight:700; }

.low { color:#22c55e; }
.mid { color:#f59e0b; }
.high { color:#ef4444; }

.tabs { display:flex; gap:8px; border-bottom:1px solid #1f2937; }
.tab { padding:10px; cursor:pointer; color:#9ca3af; }
.tab.active { color:white; border-bottom:2px solid #3b82f6; }

.tab-content { display:none; margin-top:16px; }
.tab-content.active { display:block; }

.slider-container { position:relative; }
.slider-container img { width:100%; }
.overlay { position:absolute; top:0; left:0; width:50%; overflow:hidden; }

.verify-buttons a {
  display:block;
  margin-top:8px;
  padding:10px;
  background:#111827;
  border:1px solid #374151;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  color:#e5e7eb;
}
</style>
</head>

<body>

<div class="container">

<div class="header">PixelProof Analysis</div>
<div class="sub">Clear explanation of what was found and what it means</div>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";
let currentFile = null;

/* ===== NARRATIVE ENGINE ===== */
function buildNarrative(s, score){

  const edited = s.anomalies > 65;
  const strong = score >= 70;

  return {

    who:
    edited
    ? "This analysis system detected patterns commonly associated with edited images."
    : "This analysis system detected patterns consistent with normal image processing.",

    what:
    edited
    ? "Different areas of the image behave differently when analyzed, indicating uneven processing."
    : "The image behaves consistently across all areas when analyzed.",

    why:
    edited
    ? "When part of an image is edited, that section is often saved differently from the rest of the image."
    : "Images that have not been selectively edited tend to be saved in a uniform way.",

    how:
    "The system compares how the image is compressed internally. Edited areas often compress differently, which can be detected mathematically.",

    where:
    edited
    ? "The differences appear in localized areas, not across the entire image."
    : "No specific areas stand out as inconsistent.",

    meaning:
    strong
    ? "There is a meaningful likelihood this image has been altered. Verification is recommended before relying on it."
    : "There is no strong evidence of manipulation, but results should still be considered alongside other information."
  };
}

/* ===== SCORE ===== */
function buildSignals(data){
  const ela = data.ela.score;
  return {
    compression: Math.max(0,100-ela*4),
    anomalies: Math.min(ela*4,100),
    metadata: data.exif?85:30,
    ai: data.ai?.likelihood||0
  };
}

function calcScore(s){
  return Math.round(
    s.compression*0.3 +
    s.anomalies*0.3 +
    s.metadata*0.2 +
    s.ai*0.2
  );
}

/* ===== ANALYZE ===== */
async function analyze(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  currentFile = file;

  const form=new FormData();
  form.append("image",file);

  const res = await fetch(API+"/analyze",{method:"POST",body:form});
  const data = await res.json();

  const signals = buildSignals(data);
  const score = calcScore(signals);
  const narrative = buildNarrative(signals, score);

  const riskClass = score>=80?"low":score>=55?"mid":"high";

  document.getElementById("result").innerHTML=`

    <button onclick="downloadPDF()">Download Full Report</button>
    <button class="secondary" onclick="resetAnalysis()">Analyze Another Image</button>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview')">Overview</div>
      <div class="tab" onclick="switchTab('ela')">ELA</div>
      <div class="tab" onclick="switchTab('metadata')">Metadata</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <div class="score ${riskClass}">${score}/100</div>
      </div>

      <div class="card"><div class="section-title">Who</div>${narrative.who}</div>
      <div class="card"><div class="section-title">What</div>${narrative.what}</div>
      <div class="card"><div class="section-title">Why</div>${narrative.why}</div>
      <div class="card"><div class="section-title">How</div>${narrative.how}</div>
      <div class="card"><div class="section-title">Where</div>${narrative.where}</div>
      <div class="card"><div class="section-title">What this means</div>${narrative.meaning}</div>

      <div class="card">
        <div class="section-title">Verify this image</div>
        <div class="verify-buttons">
          <a href="https://images.google.com" target="_blank">Search image online</a>
          <a href="https://news.google.com" target="_blank">Check news sources</a>
        </div>
      </div>

    </div>

    <div id="ela" class="tab-content">
      <div class="card">
        ELA shows compression differences. Bright areas may indicate edits.
      </div>

      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>

      <input type="range" id="slider" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        Make: ${data.exif?.Make || "-"}<br>
        Model: ${data.exif?.Model || "-"}<br>
        Date: ${data.exif?.DateTimeOriginal || "-"}
      </div>
    </div>
  `;

  document.getElementById("slider").oninput=e=>{
    document.getElementById("overlay").style.width=e.target.value+"%";
  };
}

/* ===== PDF ===== */
async function downloadPDF(){
  const form = new FormData();
  form.append("image", currentFile);

  const res = await fetch(API + "/report", { method:"POST", body:form });
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "report.pdf";
  a.click();
}

/* ===== RESET ===== */
function resetAnalysis(){
  document.getElementById("fileInput").value="";
  document.getElementById("result").innerHTML="";
}

/* ===== TABS ===== */
function switchTab(name){
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById(name).classList.add("active");
}

</script>

</body>
</html>
