<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  padding:16px;
}

.container { max-width:720px; margin:auto; }

button {
  width:100%;
  padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  color:white;
  border-radius:8px;
}

/* tabs */
.tabs {
  display:flex;
  gap:6px;
  border-bottom:1px solid #1f2937;
  overflow-x:auto;
  margin-top:16px;
}

.tab {
  padding:10px;
  color:#9ca3af;
  cursor:pointer;
}
.tab.active {
  color:white;
  background:#111827;
}

.tab-content { display:none; margin-top:14px; }
.tab-content.active { display:block; }

/* cards */
.card {
  background:#0b0f19;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
}

/* score colors */
.low { color:#22c55e; }
.mid { color:#f59e0b; }
.high { color:#ef4444; }

/* slider */
.slider-container { position:relative; }
.slider-container img { width:100%; border-radius:8px; }

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}
.overlay::after {
  content:"";
  position:absolute;
  right:0;
  width:6px;
  height:100%;
  background:linear-gradient(to right,transparent,rgba(255,255,255,0.6));
}

/* preview */
.preview {
  position:relative;
  background:#05070d;
  padding:20px;
  border:1px solid #374151;
}

.watermark {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(-20deg);
  font-size:34px;
  color:rgba(255,255,255,0.08);
}

/* map */
.map-container {
  width:100%;
  height:60vh;
  min-height:320px;
}
</style>
</head>

<body>

<div class="container">

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";

let currentFile = null;

/* ===== TAB SWITCH ===== */
function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

/* ===== DOWNLOAD PDF ===== */
async function downloadReport(){
  try {
    const form = new FormData();
    form.append("image", currentFile);

    const res = await fetch(API + "/report", {
      method:"POST",
      body:form
    });

    if(!res.ok) throw new Error();

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "pixelproof-report.pdf";
    a.click();

  } catch {
    alert("Server waking up — try again");
  }
}

/* ===== REPORT ===== */
function buildReport(type, score){

  const risk = score >= 80 ? "Low" : score <= 50 ? "High" : "Moderate";

  const reports = {

    "Likely Original": {
      summary: "No clear signs of editing were found.",
      details: "Compression patterns are consistent across the image.",
      meaning: "This image appears authentic and can generally be trusted."
    },

    "Recompressed": {
      summary: "This image has been saved or processed multiple times.",
      details: "Recompression changes how an image is stored but does not necessarily mean it was edited.",
      meaning: "The image may be legitimate, but earlier edits could be hidden."
    },

    "Edited": {
      summary: "Parts of this image may have been altered.",
      details: "Some regions show different compression patterns than surrounding areas.",
      meaning: "Do not rely on this image without verifying the source."
    },

    "Unknown": {
      summary: "The result is inconclusive.",
      details: "The image lacks clear compression patterns.",
      meaning: "Try analyzing a higher-quality version."
    }
  };

  return {
    risk,
    ...(reports[type] || reports["Unknown"])
  };
}

/* ===== CONFIDENCE BREAKDOWN ===== */
function buildConfidenceBreakdown(data){

  const elaScore = data.ela?.score || 0;
  const hasExif = !!data.exif;
  const hasGPS = !!(data.gps?.lat && data.gps?.lon);

  return [
    {
      label:"Compression Consistency",
      value:Math.round(Math.max(0, 100 - elaScore * 4)),
      note:"Measures uniformity of image compression"
    },
    {
      label:"Localized Anomalies",
      value:Math.round(Math.min(elaScore * 4, 100)),
      note:"Detects unusual compression in specific areas"
    },
    {
      label:"Metadata Presence",
      value:hasExif ? 85 : 30,
      note:hasExif ? "Camera metadata detected" : "Metadata missing"
    },
    {
      label:"GPS Data",
      value:hasGPS ? 80 : 40,
      note:hasGPS ? "Location data present" : "No GPS data"
    }
  ];
}

/* ===== PREVIEW ===== */
function showPreview(report){

  document.getElementById("overview").innerHTML += `
    <div class="card preview">
      <div class="watermark">FORENSIC PREVIEW</div>

      <h3>Forensic Report Preview</h3>

      Score: ${report.score}/100 (${report.risk})<br><br>

      ${report.summary}<br><br>

      ${report.details}<br><br>

      ${report.meaning}<br><br>

      <button onclick="downloadReport()">Unlock Full Report</button>
    </div>
  `;
}

/* ===== ANALYZE ===== */
async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  currentFile = file;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method:"POST",
    body:form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const confidence = data.classification?.confidence || 0.5;

  const score = Math.round(confidence * 100);

  const report = buildReport(type, score);
  report.score = score;

  const breakdown = buildConfidenceBreakdown(data);

  const riskClass = report.risk === "Low" ? "low" :
                    report.risk === "Moderate" ? "mid" : "high";

  document.getElementById("result").innerHTML = `
    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
      <div class="tab" id="tab-guide" onclick="switchTab('guide')">How to Read</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <strong>${type}</strong><br>
        Score: ${score}/100 <span class="${riskClass}">(${report.risk} Risk)</span>
      </div>

      <div class="card"><strong>Summary</strong><br><br>${report.summary}</div>
      <div class="card"><strong>Technical Findings</strong><br><br>${report.details}</div>
      <div class="card"><strong>What this means for you</strong><br><br>${report.meaning}</div>

      <div class="card">
        <strong>Confidence Reasoning</strong><br><br>

        ${breakdown.map(item => `
          <div style="margin-bottom:10px;">
            <div style="font-size:14px;">${item.label}</div>

            <div style="height:6px;background:#1e293b;border-radius:4px;margin:4px 0;">
              <div style="width:${item.value}%;height:100%;
                background:${
                  item.value > 70 ? '#22c55e' :
                  item.value > 40 ? '#f59e0b' : '#ef4444'
                };">
              </div>
            </div>

            <div style="font-size:12px;color:#9ca3af;">
              ${item.note}
            </div>
          </div>
        `).join("")}
      </div>

      <div class="card">
        <button onclick='showPreview(${JSON.stringify(report)})'>
          Download Forensic Report
        </button>
      </div>

    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela?.overlay}">
        </div>
      </div>
      <input type="range" id="slider" min="0" max="100" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        Camera: ${data.exif?.Make || "-"}<br>
        Date: ${data.exif?.DateTimeOriginal || "-"}
      </div>
    </div>

    <div id="map" class="tab-content">
      ${
        data.gps?.lat && data.gps?.lon
        ? `<div class="map-container">
             <iframe width="100%" height="100%"
             src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&z=18&output=embed&t=k"></iframe>
           </div>`
        : "No GPS data"
      }
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.exif, null, 2)}</pre>
    </div>

    <div id="guide" class="tab-content">
      <div class="card">
        Bright patches = possible edits<br>
        Uniform image = likely original<br>
        Even brightness = recompression
      </div>
    </div>
  `;

  const slider = document.getElementById("slider");
  const overlay = document.getElementById("overlay");

  slider.oninput = () => {
    overlay.style.width = slider.value + "%";
  };
}

</script>

</body>
</html>
