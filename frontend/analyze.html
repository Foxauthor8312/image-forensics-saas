<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  background:#000;
  color:#fff;
  font-family:Arial;
  padding:16px;
}

.container { max-width:700px; margin:auto; }

button {
  width:100%;
  padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  color:white;
  border-radius:8px;
}

.card {
  background:#0b0f19;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
}

.slider-container { position:relative; }
.slider-container img { width:100%; }

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}
.overlay::after {
  content:"";
  position:absolute;
  right:0;
  width:6px;
  height:100%;
  background:linear-gradient(to right,transparent,rgba(255,255,255,0.6));
}

.preview {
  position:relative;
  padding:20px;
  border:1px solid #374151;
  background:#05070d;
}

.watermark {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(-20deg);
  font-size:36px;
  color:rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="container">

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";

let currentFile = null;

/* ===== DOWNLOAD PDF ===== */
async function downloadReport(){
  try {
    const form = new FormData();
    form.append("image", currentFile);

    const res = await fetch(API + "/report", {
      method:"POST",
      body:form
    });

    if(!res.ok) throw new Error();

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "pixelproof-report.pdf";
    a.click();

  } catch {
    alert("Server waking up — try again");
  }
}

/* ===== PREVIEW ===== */
function showPreview(report){

  document.getElementById("result").innerHTML += `
    <div class="card preview">
      <div class="watermark">FORENSIC PREVIEW</div>

      <h3>Forensic Report Preview</h3>

      Score: ${report.score}/100 (${report.risk})<br><br>

      ${report.summary}<br><br>

      ${report.meaning}<br><br>

      <button onclick="downloadReport()">Unlock Full Report</button>
    </div>
  `;
}

/* ===== ANALYZE ===== */
async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  currentFile = file;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method:"POST",
    body:form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const confidence = data.classification?.confidence || 0.5;

  const score = Math.round(confidence * 100);
  const risk = score >= 80 ? "Low" : score <= 50 ? "High" : "Moderate";

  const report = {
    score,
    risk,
    summary: type === "Edited"
      ? "Parts of this image may have been changed."
      : type === "Recompressed"
      ? "Image has been saved multiple times."
      : "No signs of editing detected.",
    meaning: type === "Edited"
      ? "Verify this image before trusting it."
      : "This image appears reliable."
  };

  document.getElementById("result").innerHTML = `
    <div class="card">
      <strong>${type}</strong><br>
      Score: ${score}/100 (${risk})
    </div>

    <div class="card">
      ${report.summary}<br><br>
      ${report.meaning}
    </div>

    <div class="card">
      <button onclick='showPreview(${JSON.stringify(report)})'>
        Download Forensic Report
      </button>
    </div>

    <div class="slider-container">
      <img src="${URL.createObjectURL(file)}">
      <div class="overlay" id="overlay">
        <img src="${data.ela?.overlay}">
      </div>
    </div>

    <input type="range" id="slider" min="0" max="100" value="50">
  `;

  const slider = document.getElementById("slider");
  const overlay = document.getElementById("overlay");

  slider.oninput = () => {
    overlay.style.width = slider.value + "%";
  };
}

</script>

</body>
</html>
