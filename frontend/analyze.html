<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 720px;
  margin: auto;
}

.back {
  color: #9ca3af;
  text-decoration: none;
  font-size: 14px;
}

/* buttons */
button {
  width: 100%;
  padding: 12px;
  background: #1f2937;
  border: 1px solid #374151;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* cards */
.card {
  background: #0b0f19;
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

/* slider */
.slider-container {
  position: relative;
}

.slider-container img {
  width: 100%;
  border-radius: 8px;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay::after {
  content: "";
  position: absolute;
  right: 0;
  width: 6px;
  height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.6));
}

/* watermark preview */
.preview-box {
  position: relative;
  border: 1px solid #374151;
  background: #05070d;
  padding: 20px;
  border-radius: 10px;
}

.watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-20deg);
  font-size: 34px;
  color: rgba(255,255,255,0.08);
  pointer-events: none;
  user-select: none;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

/* ===== REPORT BUILDER ===== */
function buildReport(type, confidence){

  const score = Math.round(confidence * 100);
  const risk = score >= 80 ? "Low" : score <= 50 ? "High" : "Moderate";

  const reports = {

    "Likely Original": {
      summary: "No clear signs of editing were found.",
      meaning: "This image appears authentic and has likely not been altered."
    },

    "Recompressed": {
      summary: "This image has been saved or shared multiple times.",
      meaning: "This does not mean it was edited, but repeated saving can hide earlier changes."
    },

    "Edited": {
      summary: "Parts of this image may have been changed.",
      meaning: "You should not fully trust this image without verifying the source."
    },

    "Unknown": {
      summary: "The result is not clear.",
      meaning: "Try analyzing a higher-quality version of the image."
    }
  };

  return {
    score,
    risk,
    ...(reports[type] || reports["Unknown"])
  };
}

/* ===== PREVIEW REPORT (WITH WATERMARK) ===== */
function showPreview(report){

  document.getElementById("result").innerHTML += `
    <div class="card preview-box">

      <div class="watermark">FORENSIC PREVIEW</div>

      <h3>Forensic Report (Preview)</h3>

      <div><strong>Integrity Score:</strong> ${report.score}/100 (${report.risk})</div><br>

      <strong>Summary</strong><br>
      ${report.summary}<br><br>

      <strong>What this means for you</strong><br>
      ${report.meaning}<br><br>

      <button onclick="alert('Upgrade required to download full report')">
        Unlock Full Report
      </button>

    </div>
  `;
}

/* ===== ANALYZE ===== */
async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  const resultEl = document.getElementById("result");

  if (!file) return alert("Select image");

  resultEl.innerHTML = "Analyzing...";

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const confidence = data.classification?.confidence || 0.5;

  const report = buildReport(type, confidence);

  resultEl.innerHTML = `
    <div class="card">
      <strong>${type}</strong><br>
      Score: ${report.score}/100 (${report.risk})
    </div>

    <div class="card">
      ${report.summary}<br><br>
      ${report.meaning}
    </div>

    <div class="card">
      <button onclick='showPreview(${JSON.stringify(report)})'>
        Download Forensic Report
      </button>
    </div>

    <div class="slider-container">
      <img src="${URL.createObjectURL(file)}">
      <div class="overlay" id="overlay">
        <img src="${data.ela?.overlay}">
      </div>
    </div>

    <input type="range" id="slider" min="0" max="100" value="50">
  `;

  const slider = document.getElementById("slider");
  const overlay = document.getElementById("overlay");

  if (slider) {
    slider.oninput = () => {
      overlay.style.width = slider.value + "%";
    };
  }
}
</script>

</body>
</html>
