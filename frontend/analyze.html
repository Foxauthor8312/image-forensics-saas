<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { background:#000; color:#fff; font-family:Arial; padding:16px; }
.container { max-width:720px; margin:auto; }

button {
  width:100%; padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  color:white; border-radius:8px;
}

.tabs { display:flex; gap:6px; margin-top:16px; border-bottom:1px solid #1f2937; }
.tab { padding:10px; color:#9ca3af; cursor:pointer; }
.tab.active { color:white; background:#111827; }

.tab-content { display:none; margin-top:14px; }
.tab-content.active { display:block; }

.card {
  background:#0b0f19;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
}

.slider-container { position:relative; }
.slider-container img { width:100%; }

.overlay {
  position:absolute; top:0; left:0;
  width:50%; overflow:hidden;
}

.preview {
  position:relative;
  background:#05070d;
  padding:20px;
  border:1px solid #374151;
}

.watermark {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(-20deg);
  font-size:34px;
  color:rgba(255,255,255,0.08);
}

.map-container { width:100%; height:60vh; }
</style>
</head>

<body>

<div class="container">

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";
let currentFile = null;

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

async function downloadReport(){
  const form = new FormData();
  form.append("image", currentFile);

  const res = await fetch(API + "/report", { method:"POST", body:form });
  const blob = await res.blob();

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "pixelproof-report.pdf";
  a.click();
}

function buildConfidence(data){

  const elaScore = data.ela.score;

  return [
    { label:"Compression", value:Math.max(0,100-elaScore*4) },
    { label:"Anomalies", value:Math.min(elaScore*4,100) },
    { label:"Metadata", value:data.exif ? 85 : 30 },
    { label:"AI Likelihood", value:data.ai?.likelihood || 0 }
  ];
}

async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  currentFile = file;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", { method:"POST", body:form });
  const data = await res.json();

  const type = data.classification.type;
  const score = Math.round(data.classification.confidence * 100);

  const breakdown = buildConfidence(data);

  document.getElementById("result").innerHTML = `

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-ai" onclick="switchTab('ai')">AI</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <strong>${type}</strong><br>
        Score: ${score}/100
      </div>

      <div class="card">
        <strong>Confidence Reasoning</strong><br><br>

        ${breakdown.map(b => `
          <div style="margin-bottom:10px;">
            ${b.label}
            <div style="height:6px;background:#1e293b;margin-top:4px;">
              <div style="width:${b.value}%;height:100%;
                background:${b.value>70?'#22c55e':b.value>40?'#f59e0b':'#ef4444'};">
              </div>
            </div>
          </div>
        `).join("")}
      </div>

      <button onclick="downloadReport()">Download Report</button>

    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>
      <input type="range" id="slider" value="50">
    </div>

    <div id="ai" class="tab-content">
      <div class="card">
        AI Likelihood: ${data.ai.likelihood}%<br><br>
        This is an estimate, not proof.
      </div>
    </div>

    <div id="map" class="tab-content">
      ${
        data.gps.lat
        ? `<iframe class="map-container"
            src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed&t=k"></iframe>`
        : "No GPS data"
      }
    </div>
  `;

  document.getElementById("slider").oninput = e=>{
    document.getElementById("overlay").style.width = e.target.value + "%";
  };
}

</script>

</body>
</html>
