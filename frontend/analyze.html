<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PixelProof Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  background:#0a0f1a;
  color:#e5e7eb;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  padding:16px;
}

.container { max-width:900px; margin:auto; }

.header { font-size:22px; font-weight:600; margin-bottom:6px; }
.sub { font-size:13px; color:#9ca3af; margin-bottom:20px; }

.back { color:#9ca3af; text-decoration:none; display:inline-block; margin-bottom:12px; }

button {
  width:100%;
  padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  border-radius:8px;
  color:white;
  margin-top:10px;
}

.spinner {
  width:40px;height:40px;
  border:4px solid #1e293b;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

.tabs { display:flex; gap:8px; border-bottom:1px solid #1f2937; overflow-x:auto; }
.tab { padding:10px 14px; cursor:pointer; color:#9ca3af; }
.tab.active { color:white; border-bottom:2px solid #3b82f6; }

.tab-content { display:none; margin-top:16px; }
.tab-content.active { display:block; }

.card {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.section-title { font-size:14px; font-weight:600; margin-bottom:8px; }

.score { font-size:36px; font-weight:700; }
.low { color:#22c55e; }
.mid { color:#f59e0b; }
.high { color:#ef4444; }

.small { font-size:12px; color:#9ca3af; }

.slider-container { position:relative; }
.slider-container img { width:100%; border-radius:8px; }

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.map-container { width:100%; height:60vh; border-radius:10px; }

.verify-buttons a {
  display:block;
  text-align:center;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  background:#111827;
  border:1px solid #374151;
  color:#e5e7eb;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<div class="header">PixelProof Analysis</div>
<div class="sub">Evaluate whether an image is likely authentic or altered</div>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="loader" style="display:none;text-align:center;margin:20px 0;">
  <div class="spinner"></div>
  <div class="small">Analyzing image...</div>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";

/* SAFE FETCH */
async function safeFetch(url, options, retries=2){
  try{
    const res = await fetch(url, options);
    if(!res.ok) throw new Error();
    return res;
  }catch(e){
    if(retries>0){
      await new Promise(r=>setTimeout(r,1500));
      return safeFetch(url,options,retries-1);
    }
    throw e;
  }
}

/* SCORING */
function buildSignals(data){
  const ela = data.ela.score;
  return {
    compression: Math.max(0,100-ela*4),
    anomalies: Math.min(ela*4,100),
    metadata: data.exif?85:30,
    ai: data.ai?.likelihood||0
  };
}

function calcScore(s){
  return Math.round(
    s.compression*0.3 +
    s.anomalies*0.3 +
    s.metadata*0.2 +
    s.ai*0.2
  );
}

/* CONFIDENCE */
function getConfidence(score){
  if(score>=85) return ["Very Strong","You can rely on this result."];
  if(score>=70) return ["Strong","Most indicators agree."];
  if(score>=55) return ["Moderate","Mixed signals—verify before trusting."];
  if(score>=40) return ["Weak","Uncertain result."];
  return ["Insufficient","Not enough reliable data."];
}

/* NARRATIVE */
function buildNarrative(s, score){

  let observation = s.anomalies>65
    ? "Parts of the image were saved differently than others."
    : "The image appears to have been processed uniformly.";

  let reasoning = s.anomalies>65
    ? "This often happens when only part of an image is edited and re-saved."
    : "This pattern is typical of normal resizing or compression.";

  let strength = score>=70
    ? "Multiple indicators support this finding."
    : "Indicators are limited or mixed.";

  let action = score>=70
    ? "You should verify this image before relying on it."
    : "This result is inconclusive—use caution.";

  return { observation, reasoning, strength, action };
}

/* VERIFY LINKS */
function buildVerifyLinks(gps){
  return {
    reverse:"https://images.google.com/",
    news:"https://news.google.com/",
    maps: gps?.lat ? `https://maps.google.com?q=${gps.lat},${gps.lon}` : null
  };
}

/* ANALYZE */
async function analyze(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";

  const form=new FormData();
  form.append("image",file);

  let data;

  try{
    const res = await safeFetch(API+"/analyze",{method:"POST",body:form});
    data = await res.json();
  }catch{
    document.getElementById("loader").style.display="none";
    alert("Server unavailable. Try again.");
    return;
  }

  document.getElementById("loader").style.display="none";

  const signals = buildSignals(data);
  const score = calcScore(signals);
  const confidence = getConfidence(score);
  const narrative = buildNarrative(signals, score);
  const links = buildVerifyLinks(data.gps);

  const riskClass = score>=80?"low":score>=55?"mid":"high";

  document.getElementById("result").innerHTML=`

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
      <div class="tab" id="tab-ai" onclick="switchTab('ai')">AI</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <div class="score ${riskClass}">${score}/100</div>
        <strong>${confidence[0]} confidence</strong><br>
        ${confidence[1]}
      </div>

      <div class="card">
        <div class="section-title">What was found</div>
        ${narrative.observation}
      </div>

      <div class="card">
        <div class="section-title">Why it matters</div>
        ${narrative.reasoning}
      </div>

      <div class="card">
        <div class="section-title">How strong is this</div>
        ${narrative.strength}
      </div>

      <div class="card">
        <div class="section-title">What you should do</div>
        ${narrative.action}
      </div>

      <div class="card">
        <div class="section-title">Verify this image</div>

        <div class="verify-buttons">
          <a href="${links.reverse}" target="_blank">Search image online</a>
          <a href="${links.news}" target="_blank">Check news sources</a>
          ${links.maps ? `<a href="${links.maps}" target="_blank">Verify location</a>` : ""}
        </div>
      </div>

    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>
      <input type="range" id="slider" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        Camera: ${data.exif?.Make||"-"}<br>
        Date: ${data.exif?.DateTimeOriginal||"-"}<br>
        Lat: ${data.gps?.lat ?? "N/A"}<br>
        Lon: ${data.gps?.lon ?? "N/A"}
      </div>
    </div>

    <div id="map" class="tab-content">
      ${
        data.gps?.lat
        ? `<iframe class="map-container"
           src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed&t=k"></iframe>`
        : "No GPS data"
      }
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.exif,null,2)}</pre>
    </div>

    <div id="ai" class="tab-content">
      <div class="card">
        AI Likelihood: ${data.ai.likelihood}%<br>
        This estimates whether the image may have been generated by AI.
      </div>
    </div>
  `;

  document.getElementById("slider").oninput=e=>{
    document.getElementById("overlay").style.width=e.target.value+"%";
  };
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

</script>

</body>
</html>
