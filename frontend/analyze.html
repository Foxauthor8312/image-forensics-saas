<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: Arial, sans-serif;
  background: #000000;
  color: #ffffff;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

/* BACK */
.back {
  color: #9ca3af;
  text-decoration: none;
  font-size: 14px;
}

/* INPUT */
input { width: 100%; margin: 15px 0; }

button {
  display: block;
  margin: auto;
  padding: 10px 20px;
  background: #1f2937;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* TABS */
.tabs {
  display: flex;
  gap: 20px;
  margin-top: 20px;
  border-bottom: 1px solid #333;
}

.tab {
  padding: 10px 0;
  cursor: pointer;
  color: #9ca3af;
}

.tab.active {
  color: #ffffff;
  border-bottom: 2px solid #ffffff;
}

.tab-content {
  display: none;
  margin-top: 15px;
}

.tab-content.active {
  display: block;
}

/* META */
.meta-row {
  padding: 6px 0;
  border-bottom: 1px solid #222;
}

/* SIGNALS */
.signal { margin: 6px 0; }
.good { color: #22c55e; }
.warn { color: #f59e0b; }
.bad { color: #ef4444; }

/* SLIDER */
.slider-container {
  position: relative;
}

.slider-container img {
  width: 100%;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay img {
  width: 100%;
  opacity: 0.9;
}

.divider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: white;
}

.slider {
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" accept="image/*" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));

  document.getElementById("tab-" + name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

async function analyze() {

  const file = document.getElementById("fileInput").files[0];
  const resultEl = document.getElementById("result");

  if (!file) return alert("Select an image");

  resultEl.innerHTML = "Analyzing...";

  const form = new FormData();
  form.append("image", file);

  try {

    const res = await fetch(API + "/analyze", {
      method: "POST",
      body: form
    });

    const data = await res.json();

    const type = data.classification?.type || "Unknown";
    const conf = Math.round((data.classification?.confidence || 0.5) * 100);

    let explanation = "";
    let guidance = "";
    let confidenceNote = "";

    if (type === "Likely Original") {
      explanation = "No strong indicators of manipulation were detected.";
      guidance = "This image appears authentic.";
      confidenceNote = "High confidence result.";
    } 
    else if (type === "Recompressed") {
      explanation = "Image has been resaved or processed.";
      guidance = "This may hide earlier edits.";
      confidenceNote = "Moderate confidence.";
    } 
    else if (type === "Edited") {
      explanation = "Compression inconsistencies detected.";
      guidance = "Possible manipulation.";
      confidenceNote = "Lower confidence possible.";
    } 
    else {
      explanation = "No strong signal detected.";
      guidance = "Inconclusive.";
      confidenceNote = "";
    }

    const lat = data.gps?.lat;
    const lon = data.gps?.lon;

    const signals = [];

    if (data.exif) signals.push('<div class="signal good">✔ Camera data intact</div>');
    else signals.push('<div class="signal warn">⚠ Metadata missing</div>');

    if (lat && lon) signals.push('<div class="signal good">✔ Location data present</div>');
    else signals.push('<div class="signal warn">⚠ No GPS data</div>');

    if (type === "Edited") signals.push('<div class="signal bad">✖ Compression anomalies detected</div>');

    resultEl.innerHTML = `
      <div style="font-size:24px;font-weight:600;">
        ${type}
      </div>

      <div style="color:#9ca3af;margin-bottom:15px;">
        Confidence: ${conf}%
      </div>

      <div class="tabs">
        <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
        <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
        <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      </div>

      <!-- OVERVIEW -->
      <div id="overview" class="tab-content active">
        <p>${explanation}</p>

        ${signals.join("")}

        <p style="margin-top:10px;">${guidance}</p>

        <div style="color:#9ca3af;font-size:13px;">
          ${confidenceNote}
        </div>
      </div>

      <!-- ELA -->
      <div id="ela" class="tab-content">
        <div class="slider-container">
          <img src="${URL.createObjectURL(file)}">

          <div class="overlay" id="overlay">
            <img src="${data.ela?.overlay}">
          </div>

          <div class="divider" id="divider"></div>
        </div>

        <input type="range" id="slider" min="0" max="100" value="50" class="slider">
      </div>

      <!-- METADATA -->
      <div id="metadata" class="tab-content">
        <div class="meta-row">Camera: ${data.exif?.Make ?? "-"}</div>
        <div class="meta-row">Model: ${data.exif?.Model ?? "-"}</div>
        <div class="meta-row">Date: ${data.exif?.DateTimeOriginal ?? "-"}</div>
        <div class="meta-row">Latitude: ${lat ?? "-"}</div>
        <div class="meta-row">Longitude: ${lon ?? "-"}</div>
      </div>
    `;

    const slider = document.getElementById("slider");
    const overlay = document.getElementById("overlay");
    const divider = document.getElementById("divider");

    if (slider && overlay) {
      slider.oninput = () => {
        overlay.style.width = slider.value + "%";
        divider.style.left = slider.value + "%";
      };
    }

  } catch (err) {
    console.error(err);
    resultEl.innerHTML = "Server waking up — try again";
  }
}
</script>

</body>
</html>
