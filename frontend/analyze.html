<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

html, body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 720px;
  margin: auto;
}

.back {
  color: #9ca3af;
  text-decoration: none;
  font-size: 14px;
}

input {
  width: 100%;
  margin: 16px 0;
}

button {
  width: 100%;
  padding: 14px;
  background: #1f2937;
  border: 1px solid #374151;
  color: white;
  border-radius: 8px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #1e293b;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.tabs {
  display: flex;
  gap: 6px;
  margin-top: 16px;
  border-bottom: 1px solid #1f2937;
  overflow-x: auto;
}

.tab {
  padding: 10px 14px;
  cursor: pointer;
  color: #9ca3af;
}

.tab.active {
  color: white;
  background: #111827;
}

.tab-content {
  display: none;
  margin-top: 14px;
}

.tab-content.active {
  display: block;
}

.card {
  background: #0b0f19;
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.meta-row {
  padding: 6px 0;
  border-bottom: 1px solid #1f2937;
}

.slider-container { position: relative; }
.slider-container img { width: 100%; border-radius: 8px; }

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.divider {
  position: absolute;
  left: 50%;
  width: 2px;
  height: 100%;
  background: white;
}

.map-container {
  width: 100%;
  height: 60vh;
  min-height: 320px;
  max-height: 500px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

function buildReport(type, confidence){
  const score = Math.round(confidence * 100);
  let risk = score >= 80 ? "Low" : score <= 50 ? "High" : "Moderate";

  return {
    score,
    risk,
    summary: "Compression analysis completed.",
    findings: "Patterns evaluated across image structure.",
    visual: "Inspect bright regions in ELA overlay.",
    conclusion: type
  };
}

async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  const resultEl = document.getElementById("result");

  if(!file) return alert("Select image");

  resultEl.innerHTML = `
    <div style="text-align:center;margin-top:40px;">
      <div class="spinner"></div>
      <div style="color:#9ca3af;">Analyzing image...</div>
    </div>
  `;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method:"POST",
    body:form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const confidence = data.classification?.confidence || 0.5;
  const lat = data.gps?.lat;
  const lon = data.gps?.lon;

  const report = buildReport(type, confidence);

  resultEl.innerHTML = `
    <div style="font-size:22px;">${type}</div>

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
      <div class="tab" id="tab-guide" onclick="switchTab('guide')">How to Read</div>
    </div>

    <div id="overview" class="tab-content active">
      <div class="card">
        <strong>Integrity Score:</strong> ${report.score}/100 (${report.risk})
      </div>

      <div class="card"><strong>Summary</strong><br>${report.summary}</div>
      <div class="card"><strong>Findings</strong><br>${report.findings}</div>
      <div class="card"><strong>Visual Guidance</strong><br>${report.visual}</div>
      <div class="card"><strong>Conclusion</strong><br>${report.conclusion}</div>
    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela?.overlay}">
        </div>
        <div class="divider" id="divider"></div>
      </div>
      <input type="range" id="slider" min="0" max="100" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        <div class="meta-row">Camera: ${data.exif?.Make ?? "-"}</div>
        <div class="meta-row">Date: ${data.exif?.DateTimeOriginal ?? "-"}</div>
        <div class="meta-row">Lat: ${lat ?? "-"}</div>
        <div class="meta-row">Lon: ${lon ?? "-"}</div>
      </div>
    </div>

    <div id="map" class="tab-content">
      ${lat && lon
        ? `<div class="map-container">
             <iframe width="100%" height="100%"
             src="https://www.google.com/maps?q=${lat},${lon}&z=18&output=embed&t=k"></iframe>
           </div>`
        : "No GPS data"}
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.rawMetadata, null, 2)}</pre>
    </div>

    <!-- ✅ GUIDE TAB FIXED -->
    <div id="guide" class="tab-content">

      <div class="card">
        <strong>Understanding the Analysis</strong><br><br>
        PixelProof analyzes compression patterns and metadata to identify signs of manipulation.
      </div>

      <div class="card">
        <strong>ELA (Error Level Analysis)</strong><br><br>
        Uniform = normal<br>
        Bright patches = possible edits
      </div>

      <div class="card">
        <strong>Metadata</strong><br><br>
        Metadata provides context but can be removed or altered.
      </div>

      <div class="card" style="font-size:13px;color:#9ca3af;">
        Results are indicators, not proof.
      </div>

    </div>
  `;

  const slider=document.getElementById("slider");
  const overlay=document.getElementById("overlay");
  const divider=document.getElementById("divider");

  if(slider){
    slider.oninput=()=>{
      overlay.style.width=slider.value+"%";
      divider.style.left=slider.value+"%";
    };
  }
}
</script>

</body>
</html>
