<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { background:#000; color:#fff; font-family:Arial; padding:16px; }
.container { max-width:720px; margin:auto; }

.back { color:#9ca3af; text-decoration:none; display:inline-block; margin-bottom:10px; }

button {
  width:100%; padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  color:white; border-radius:8px;
}

.spinner {
  width:40px;height:40px;
  border:4px solid #1e293b;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

.tabs { display:flex; gap:6px; border-bottom:1px solid #1f2937; overflow-x:auto; }
.tab { padding:10px; color:#9ca3af; cursor:pointer; }
.tab.active { color:#fff; background:#111827; }

.tab-content { display:none; margin-top:14px; }
.tab-content.active { display:block; }

.card {
  background:#0b0f19;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
}

.score {
  font-size:28px;
  font-weight:bold;
}

.low { color:#22c55e; }
.mid { color:#f59e0b; }
.high { color:#ef4444; }

.slider-container { position:relative; }
.slider-container img { width:100%; }
.overlay { position:absolute; top:0; left:0; width:50%; overflow:hidden; }

.map-container { width:100%; height:60vh; }
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="loader" style="display:none;text-align:center;margin:20px 0;">
  <div class="spinner"></div>
  <div style="margin-top:10px;">Running forensic analysis...</div>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";
let currentFile=null;

/* ===== SAFE FETCH ===== */
async function safeFetch(url, options, retries = 2) {
  try {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error();
    return res;
  } catch (e) {
    if (retries > 0) {
      await new Promise(r => setTimeout(r, 1500));
      return safeFetch(url, options, retries - 1);
    }
    throw e;
  }
}

/* ===== INTERPRETATION ENGINE ===== */
function buildInterpretation(type, score){

  let risk = score>=80?"Low":score<=50?"High":"Moderate";

  let confidenceText =
    score >= 85 ? "Very strong indicators"
    : score >= 70 ? "Strong indicators"
    : score >= 55 ? "Moderate indicators"
    : "Weak or conflicting indicators";

  const explanations = {

    "Edited": {
      headline: "Evidence of Possible Manipulation",
      summary: "The analysis detected localized inconsistencies in compression patterns.",
      detail: "When an image is edited, only specific areas are recompressed differently. These differences appear as uneven brightness in ELA and raise the anomaly score.",
      meaning: "This does not prove manipulation on its own, but it is a strong signal. You should verify this image before relying on it."
    },

    "Recompressed": {
      headline: "Image Has Been Re-Saved or Processed",
      summary: "The image shows global compression changes.",
      detail: "Recompression affects the entire image uniformly and often occurs when images are uploaded, resized, or shared.",
      meaning: "This is usually benign, but recompression can mask earlier edits."
    },

    "Likely Original": {
      headline: "No Significant Anomalies Detected",
      summary: "Compression patterns are consistent across the image.",
      detail: "Images that have not been altered tend to show uniform compression behavior across all regions.",
      meaning: "There are no strong indicators of manipulation, though no method can guarantee authenticity."
    },

    "Unknown": {
      headline: "Inconclusive Result",
      summary: "The analysis did not find strong or consistent signals.",
      detail: "Low resolution, heavy compression, or unusual formats can reduce reliability.",
      meaning: "Try analyzing a higher-quality version of the image."
    }
  };

  return {
    risk,
    confidenceText,
    ...(explanations[type] || explanations["Unknown"])
  };
}

/* ===== CONFIDENCE BREAKDOWN ===== */
function buildBreakdown(data){

  const ela=data.ela.score;

  return [
    {
      label:"Compression Consistency",
      value:Math.max(0,100-ela*4),
      explanation:"Measures how uniform compression is across the image."
    },
    {
      label:"Localized Anomalies",
      value:Math.min(ela*4,100),
      explanation:"Detects areas that differ from surrounding pixels."
    },
    {
      label:"Metadata Integrity",
      value:data.exif?85:30,
      explanation:"Presence of camera metadata supports authenticity."
    },
    {
      label:"AI Generation Likelihood",
      value:data.ai?.likelihood||0,
      explanation:"Estimates whether image characteristics resemble AI generation."
    }
  ];
}

/* ===== ANALYZE ===== */
async function analyze(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  currentFile=file;

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";

  const form=new FormData();
  form.append("image",file);

  let data;

  try {
    const res = await safeFetch(API+"/analyze",{method:"POST",body:form});
    data = await res.json();
  } catch {
    document.getElementById("loader").style.display="none";
    alert("Server unavailable. Try again.");
    return;
  }

  document.getElementById("loader").style.display="none";

  const type=data.classification.type;
  const score=Math.round(data.classification.confidence*100);

  const interp = buildInterpretation(type, score);
  const breakdown = buildBreakdown(data);

  const riskClass =
    interp.risk==="Low"?"low":
    interp.risk==="Moderate"?"mid":"high";

  document.getElementById("result").innerHTML=`

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-guide" onclick="switchTab('guide')">How to Read</div>
      <div class="tab" id="tab-ai" onclick="switchTab('ai')">AI</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <div class="score ${riskClass}">
          ${score}/100
        </div>
        ${interp.confidenceText}<br>
        <strong>${interp.headline}</strong>
      </div>

      <div class="card">
        <strong>Summary</strong><br><br>
        ${interp.summary}
      </div>

      <div class="card">
        <strong>Technical Explanation</strong><br><br>
        ${interp.detail}
      </div>

      <div class="card">
        <strong>What this means for you</strong><br><br>
        ${interp.meaning}
      </div>

      <div class="card">
        <strong>Confidence Breakdown</strong><br><br>

        ${breakdown.map(b=>`
          <div style="margin-bottom:12px;">
            <div>${b.label}</div>

            <div style="height:6px;background:#1e293b;margin:4px 0;">
              <div style="width:${b.value}%;height:100%;
                background:${b.value>70?'#22c55e':b.value>40?'#f59e0b':'#ef4444'};">
              </div>
            </div>

            <div style="font-size:12px;color:#9ca3af;">
              ${b.explanation}
            </div>
          </div>
        `).join("")}
      </div>

    </div>

    <div id="ela" class="tab-content">
      <div class="card">
        ELA shows compression differences. Bright areas may indicate edits.
      </div>

      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>

      <input type="range" id="slider" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        Camera: ${data.exif?.Make||"-"}<br>
        Date: ${data.exif?.DateTimeOriginal||"-"}
      </div>
    </div>

    <div id="map" class="tab-content">
      ${
        data.gps.lat
        ? `<iframe class="map-container"
           src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed&t=k"></iframe>`
        : "No GPS data"
      }
    </div>

    <div id="guide" class="tab-content">
      <div class="card">
        This tool analyzes compression patterns and metadata.<br><br>
        No single signal proves manipulation—results must be interpreted together.
      </div>
    </div>

    <div id="ai" class="tab-content">
      <div class="card">
        AI Likelihood: ${data.ai.likelihood}%<br>
        This is a probabilistic estimate, not proof.
      </div>
    </div>
  `;

  document.getElementById("slider").oninput=e=>{
    document.getElementById("overlay").style.width=e.target.value+"%";
  };
}

/* tabs */
function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

</script>

</body>
</html>
