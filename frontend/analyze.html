<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PixelProof Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  background:#0a0f1a;
  color:#e5e7eb;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  padding:16px;
}

.container { max-width:900px; margin:auto; }

.header {
  font-size:22px;
  font-weight:600;
  margin-bottom:6px;
}

.sub {
  font-size:13px;
  color:#9ca3af;
  margin-bottom:20px;
}

.back {
  color:#9ca3af;
  text-decoration:none;
  display:inline-block;
  margin-bottom:12px;
}

button {
  width:100%;
  padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  border-radius:8px;
  color:white;
  margin-top:10px;
}

.spinner {
  width:40px;height:40px;
  border:4px solid #1e293b;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

.tabs {
  display:flex;
  gap:8px;
  margin-top:20px;
  border-bottom:1px solid #1f2937;
  overflow-x:auto;
}

.tab {
  padding:10px 14px;
  cursor:pointer;
  color:#9ca3af;
}

.tab.active {
  color:white;
  border-bottom:2px solid #3b82f6;
}

.tab-content { display:none; margin-top:16px; }
.tab-content.active { display:block; }

.card {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.section-title {
  font-size:14px;
  font-weight:600;
  margin-bottom:8px;
}

.score {
  font-size:36px;
  font-weight:700;
}

.low { color:#22c55e; }
.mid { color:#f59e0b; }
.high { color:#ef4444; }

.small { font-size:12px; color:#9ca3af; }

.slider-container { position:relative; }
.slider-container img { width:100%; border-radius:8px; }

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.map-container { width:100%; height:60vh; border-radius:10px; }
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<div class="header">PixelProof Analysis</div>
<div class="sub">Forensic evaluation of image authenticity using compression, metadata, and AI signals</div>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="loader" style="display:none;text-align:center;margin:20px 0;">
  <div class="spinner"></div>
  <div class="small">Analyzing image...</div>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";

/* SAFE FETCH */
async function safeFetch(url, options, retries=2){
  try{
    const res = await fetch(url, options);
    if(!res.ok) throw new Error();
    return res;
  }catch(e){
    if(retries>0){
      await new Promise(r=>setTimeout(r,1500));
      return safeFetch(url,options,retries-1);
    }
    throw e;
  }
}

/* SCORING */
function buildSignals(data){
  const ela = data.ela.score;

  return {
    compression:{label:"Compression",value:Math.max(0,100-ela*4),weight:0.3},
    anomalies:{label:"Anomalies",value:Math.min(ela*4,100),weight:0.3},
    metadata:{label:"Metadata",value:data.exif?85:30,weight:0.2},
    ai:{label:"AI Likelihood",value:data.ai?.likelihood||0,weight:0.2}
  };
}

function calcScore(signals){
  let t=0;
  for(const k in signals){ t+=signals[k].value*signals[k].weight; }
  return Math.round(t);
}

/* CONFIDENCE (HUMAN MEANING) */
function getConfidence(score){
  if(score>=85) return {label:"Very Strong", meaning:"You can rely on this result. The evidence is consistent across multiple checks."};
  if(score>=70) return {label:"Strong", meaning:"This result is reliable. Most indicators agree."};
  if(score>=55) return {label:"Moderate", meaning:"Some signals suggest this result, but normal processing could also explain it."};
  if(score>=40) return {label:"Weak", meaning:"The result is uncertain and should not be relied on alone."};
  return {label:"Insufficient", meaning:"Not enough reliable data to determine anything meaningful."};
}

/* FINAL INTERPRETATION */
function interpret(score){

  if(score>=80){
    return {
      conclusion:"No significant signs of manipulation detected.",
      action:"Image appears consistent. Verify source if needed."
    };
  }

  if(score>=55){
    return {
      conclusion:"Some inconsistencies detected.",
      action:"Check the source and compare with other versions before relying on this image."
    };
  }

  return {
    conclusion:"Indicators suggest possible manipulation.",
    action:"Do not rely on this image without independent verification."
  };
}

/* ANALYZE */
async function analyze(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";

  const form=new FormData();
  form.append("image",file);

  let data;

  try{
    const res = await safeFetch(API+"/analyze",{method:"POST",body:form});
    data = await res.json();
  }catch{
    document.getElementById("loader").style.display="none";
    alert("Server unavailable. Try again.");
    return;
  }

  document.getElementById("loader").style.display="none";

  const signals = buildSignals(data);
  const score = calcScore(signals);
  const confidence = getConfidence(score);
  const result = interpret(score);

  const riskClass = score>=80?"low":score>=55?"mid":"high";

  document.getElementById("result").innerHTML=`

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
      <div class="tab" id="tab-ai" onclick="switchTab('ai')">AI</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <div class="score ${riskClass}">${score}/100</div>
        <strong>${confidence.label} confidence</strong><br>
        ${confidence.meaning}
      </div>

      <div class="card">
        <div class="section-title">Conclusion</div>
        ${result.conclusion}
      </div>

      <div class="card">
        <div class="section-title">What you should do</div>
        ${result.action}
      </div>

      <div class="card">
        <div class="section-title">AI Assessment</div>
        AI Likelihood: ${data.ai.likelihood}%<br>
        <div class="small">Indicates probability of synthetic origin.</div>
      </div>

    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>
      <input type="range" id="slider" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        Camera: ${data.exif?.Make||"-"}<br>
        Date: ${data.exif?.DateTimeOriginal||"-"}<br>
        Lat: ${data.gps?.lat ?? "N/A"}<br>
        Lon: ${data.gps?.lon ?? "N/A"}
      </div>
    </div>

    <div id="map" class="tab-content">
      ${
        data.gps?.lat
        ? `<iframe class="map-container"
           src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed&t=k"></iframe>`
        : "No GPS data"
      }
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.exif,null,2)}</pre>
    </div>

    <div id="ai" class="tab-content">
      <div class="card">
        AI Likelihood: ${data.ai.likelihood}%<br>
        This is a probabilistic indicator, not proof.
      </div>
    </div>
  `;

  document.getElementById("slider").oninput=e=>{
    document.getElementById("overlay").style.width=e.target.value+"%";
  };
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

</script>

</body>
</html>
