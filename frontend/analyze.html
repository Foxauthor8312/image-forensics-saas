<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

html, body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 720px;
  margin: auto;
}

.back {
  color: #9ca3af;
  text-decoration: none;
  font-size: 14px;
}

input {
  width: 100%;
  margin: 16px 0;
}

button {
  width: 100%;
  padding: 14px;
  background: #1f2937;
  border: 1px solid #374151;
  color: white;
  border-radius: 8px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #1e293b;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.tabs {
  display: flex;
  gap: 6px;
  margin-top: 16px;
  border-bottom: 1px solid #1f2937;
  overflow-x: auto;
}

.tab {
  padding: 10px 14px;
  cursor: pointer;
  color: #9ca3af;
}

.tab.active {
  color: white;
  background: #111827;
}

.tab-content {
  display: none;
  margin-top: 14px;
}

.tab-content.active {
  display: block;
}

.card {
  background: #0b0f19;
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.meta-row {
  padding: 6px 0;
  border-bottom: 1px solid #1f2937;
}

.slider-container {
  position: relative;
}

.slider-container img {
  width: 100%;
  border-radius: 8px;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay::after {
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  width: 6px;
  height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.6));
}

.overlay img {
  width: 100%;
}

.map-container {
  width: 100%;
  height: 60vh;
  min-height: 320px;
  max-height: 500px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

function buildReport(type, confidence, hasExif, hasGPS){

  const score = Math.round(confidence * 100);
  let risk = score >= 80 ? "Low" : score <= 50 ? "High" : "Moderate";

  const reports = {
    "Likely Original": {
      summary: "No strong indicators of manipulation were detected.",
      findings: "Compression patterns are consistent across the image with no localized anomalies.",
      visual: "ELA appears uniform with no bright isolated regions.",
      conclusion: "The image is likely authentic."
    },
    "Recompressed": {
      summary: "The image shows signs of recompression.",
      findings: "Compression differences are evenly distributed, typical of resaving or platform processing.",
      visual: "ELA appears globally elevated rather than localized.",
      conclusion: "Recompression is present, not necessarily editing."
    },
    "Edited": {
      summary: "Compression inconsistencies suggest localized changes.",
      findings: "ELA reveals uneven compression patterns in specific regions.",
      visual: "Look for bright, patchy areas that stand out from surroundings.",
      conclusion: "The image may have been altered."
    },
    "Unknown": {
      summary: "No clear signal detected.",
      findings: "Compression patterns are inconclusive.",
      visual: "ELA lacks consistent structure.",
      conclusion: "Result is inconclusive."
    }
  };

  const selected = reports[type] || reports["Unknown"];

  return {
    score,
    risk,
    ...selected,
    metaNote: hasExif
      ? "Metadata is present and supports context."
      : "Metadata is missing and may have been removed.",
    gpsNote: hasGPS
      ? "GPS data is embedded."
      : "No GPS data detected."
  };
}

async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  const resultEl = document.getElementById("result");

  if(!file) return alert("Select image");

  resultEl.innerHTML = `
    <div style="text-align:center;margin-top:40px;">
      <div class="spinner"></div>
      <div style="color:#9ca3af;">Analyzing image...</div>
    </div>
  `;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method:"POST",
    body:form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const confidence = data.classification?.confidence || 0.5;
  const lat = data.gps?.lat;
  const lon = data.gps?.lon;

  const report = buildReport(type, confidence, !!data.exif, !!(lat && lon));

  resultEl.innerHTML = `
    <div style="font-size:22px;">${type}</div>

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
      <div class="tab" id="tab-guide" onclick="switchTab('guide')">How to Read</div>
    </div>

    <div id="overview" class="tab-content active">
      <div class="card">
        <strong>Integrity Score:</strong> ${report.score}/100<br>
        <span style="color:${
          report.risk==="Low" ? "#22c55e" :
          report.risk==="Moderate" ? "#f59e0b" : "#ef4444"
        };font-weight:600;">
        Risk Level: ${report.risk}
        </span>
      </div>

      <div class="card"><strong>Summary</strong><br>${report.summary}</div>
      <div class="card"><strong>Technical Findings</strong><br>${report.findings}</div>
      <div class="card"><strong>What to Look For</strong><br>${report.visual}</div>
      <div class="card"><strong>Conclusion</strong><br>${report.conclusion}</div>

      <div class="card" style="font-size:13px;color:#9ca3af;">
        ${report.metaNote}<br>${report.gpsNote}<br><br>
        Metadata can be altered or removed and is not definitive proof.
      </div>
    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela?.overlay}">
        </div>
      </div>
      <input type="range" id="slider" min="0" max="100" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        <div class="meta-row">Camera: ${data.exif?.Make ?? "-"}</div>
        <div class="meta-row">Date: ${data.exif?.DateTimeOriginal ?? "-"}</div>
        <div class="meta-row">Lat: ${lat ?? "-"}</div>
        <div class="meta-row">Lon: ${lon ?? "-"}</div>
      </div>
    </div>

    <div id="map" class="tab-content">
      ${lat && lon
        ? `<div class="map-container">
             <iframe width="100%" height="100%"
             src="https://www.google.com/maps?q=${lat},${lon}&z=18&output=embed&t=k"></iframe>
           </div>`
        : "No GPS data"}
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.rawMetadata, null, 2)}</pre>
    </div>

    <div id="guide" class="tab-content">
      <div class="card">
        <strong>How to Interpret Results</strong><br><br>
        Use the score as a guide, not proof. Focus on patterns across ELA, metadata, and context.
      </div>

      <div class="card">
        <strong>ELA</strong><br>
        Uniform = normal<br>
        Bright/local = suspicious<br>
        Global brightness = recompression
      </div>

      <div class="card">
        <strong>Metadata</strong><br>
        Useful for context but can be removed or altered.
      </div>

      <div class="card" style="font-size:13px;color:#9ca3af;">
        Always combine signals before forming conclusions.
      </div>
    </div>
  `;

  const slider=document.getElementById("slider");
  const overlay=document.getElementById("overlay");

  if(slider){
    slider.oninput=()=>{
      overlay.style.width=slider.value+"%";
    };
  }
}
</script>

</body>
</html>
