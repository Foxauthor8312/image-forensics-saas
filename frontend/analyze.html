<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { background:#000; color:#fff; font-family:Arial; padding:16px; }
.container { max-width:720px; margin:auto; }
.back { color:#9ca3af; text-decoration:none; display:inline-block; margin-bottom:10px; }
button {
  width:100%; padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  color:white; border-radius:8px;
}
.spinner {
  width:40px;height:40px;
  border:4px solid #1e293b;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { to { transform:rotate(360deg); } }
.tabs { display:flex; gap:6px; border-bottom:1px solid #1f2937; overflow-x:auto; }
.tab { padding:10px; color:#9ca3af; cursor:pointer; }
.tab.active { color:#fff; background:#111827; }
.tab-content { display:none; margin-top:14px; }
.tab-content.active { display:block; }
.card {
  background:#0b0f19;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
}
.slider-container { position:relative; }
.slider-container img { width:100%; }
.overlay { position:absolute; top:0; left:0; width:50%; overflow:hidden; }
.map-container { width:100%; height:60vh; }
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="loader" style="display:none;text-align:center;margin:20px 0;">
  <div class="spinner"></div>
  <div style="margin-top:10px;">Running forensic analysis...</div>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";
let currentFile = null;

async function safeFetch(url, options, retries = 2) {
  try {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error();
    return res;
  } catch (e) {
    if (retries > 0) {
      await new Promise(r => setTimeout(r, 1500));
      return safeFetch(url, options, retries - 1);
    }
    throw e;
  }
}

function buildSignals(data){
  const ela = data.ela.score;
  return {
    compression:{label:"Compression",value:Math.max(0,100-ela*4),weight:0.30},
    anomalies:{label:"Anomalies",value:Math.min(ela*4,100),weight:0.30},
    metadata:{label:"Metadata",value:data.exif?85:30,weight:0.20},
    ai:{label:"AI",value:data.ai?.likelihood||0,weight:0.20}
  };
}

function calculateScore(signals){
  let total=0;
  for(const k in signals){ total+=signals[k].value*signals[k].weight; }
  return Math.round(total);
}

async function analyze(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  currentFile=file;

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";

  const form=new FormData();
  form.append("image",file);

  let data;

  try{
    const res = await safeFetch(API+"/analyze",{method:"POST",body:form});
    data = await res.json();
  }catch{
    document.getElementById("loader").style.display="none";
    alert("Server unavailable. Try again.");
    return;
  }

  document.getElementById("loader").style.display="none";

  const signals = buildSignals(data);
  const score = calculateScore(signals);

  document.getElementById("result").innerHTML=`

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
    </div>

    <div id="overview" class="tab-content active">
      <div class="card">
        <strong>Score:</strong> ${score}/100
      </div>
    </div>

    <div id="metadata" class="tab-content">

      <div class="card">
        <strong>Camera Info</strong><br><br>
        Make: ${data.exif?.Make || "-"}<br>
        Model: ${data.exif?.Model || "-"}<br>
        Date: ${data.exif?.DateTimeOriginal || "-"}
      </div>

      <div class="card">
        <strong>GPS Coordinates</strong><br><br>

        Latitude: ${
          data.gps?.lat !== null && data.gps?.lat !== undefined
          ? data.gps.lat.toFixed(6)
          : "Not available"
        }<br>

        Longitude: ${
          data.gps?.lon !== null && data.gps?.lon !== undefined
          ? data.gps.lon.toFixed(6)
          : "Not available"
        }
      </div>

    </div>

    <div id="map" class="tab-content">
      ${
        data.gps?.lat
        ? `<iframe class="map-container"
           src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed&t=k"></iframe>`
        : "No GPS data"
      }
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.exif,null,2)}</pre>
    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>
      <input type="range" id="slider" value="50">
    </div>
  `;

  document.getElementById("slider").oninput=e=>{
    document.getElementById("overlay").style.width=e.target.value+"%";
  };
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

</script>

</body>
</html>
