<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input { width: 100%; margin-bottom: 15px; }

button {
  display: block;
  margin: auto;
  padding: 8px 18px;
  background: #334155;
  border: 1px solid #475569;
  color: #e2e8f0;
  border-radius: 6px;
  cursor: pointer;
}

.section { margin-top: 18px; }

.meta-row {
  padding: 6px 0;
  border-bottom: 1px solid #334155;
}

.signal {
  font-size: 14px;
  margin: 4px 0;
}

.good { color: #22c55e; }
.warn { color: #f59e0b; }
.bad { color: #ef4444; }

/* SLIDER */
.viewer { margin-top: 20px; }
.slider-container { position: relative; }
.slider-container img { width: 100%; border-radius: 8px; }

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay img { width: 100%; opacity: 0.9; }

.divider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: white;
  opacity: 0.7;
}

.slider { width: 100%; margin-top: 12px; }
</style>
</head>

<body>

<div class="container">
  <input type="file" id="fileInput" accept="image/*" />
  <button onclick="analyze()">Run Analysis</button>
  <div id="result"></div>
</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

/* ===== CONFIG (NO MORE IF CHAINS) ===== */
const REPORT = {
  "Likely Original": {
    color: "#22c55e",
    explanation: "Compression patterns and metadata are consistent with an original image.",
    guidance: "No strong evidence of manipulation detected."
  },
  "Recompressed": {
    color: "#f59e0b",
    explanation: "The image has been resaved or processed, altering compression patterns.",
    guidance: "Recompression does not necessarily mean editing, but may hide prior changes."
  },
  "Edited": {
    color: "#ef4444",
    explanation: "Irregular compression patterns suggest localized changes.",
    guidance: "Possible manipulation detected. Review carefully."
  },
  "Unknown": {
    color: "#9ca3af",
    explanation: "No strong signal detected.",
    guidance: "Result is inconclusive."
  }
};

/* ===== IMAGE COMPRESSION ===== */
async function compressImage(file, maxWidth = 1200, quality = 0.75) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;
    reader.readAsDataURL(file);

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = Math.min(1, maxWidth / img.width);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", quality);
    };
  });
}

/* ===== RETRY ===== */
async function fetchWithRetry(url, options, retries = 2) {
  try {
    return await fetch(url, options);
  } catch {
    if (retries > 0) {
      await new Promise(r => setTimeout(r, 2000));
      return fetchWithRetry(url, options, retries - 1);
    }
    throw new Error("Network failure");
  }
}

async function analyze() {
  const fileInput = document.getElementById("fileInput");
  const resultEl = document.getElementById("result");

  if (!fileInput.files.length) return alert("Select an image");

  const originalFile = fileInput.files[0];
  resultEl.innerHTML = "Processing...";

  const compressed = await compressImage(originalFile);

  const form = new FormData();
  form.append("image", compressed, "upload.jpg");

  try {
    const res = await fetchWithRetry(API + "/analyze", {
      method: "POST",
      body: form
    });

    const data = await res.json();

    const type = data.classification?.type || "Unknown";
    const conf = Math.round((data.classification?.confidence || 0.5) * 100);

    const cfg = REPORT[type] || REPORT["Unknown"];

    const lat = data.gps?.lat;
    const lon = data.gps?.lon;

    /* ===== SIGNAL SCORING ===== */
    const signals = [];

    if (data.exif) signals.push({ text: "Camera metadata present", class: "good" });
    else signals.push({ text: "Metadata missing", class: "warn" });

    if (lat && lon) signals.push({ text: "GPS location detected", class: "good" });
    else signals.push({ text: "No GPS data", class: "warn" });

    if (type === "Edited") signals.push({ text: "Compression anomalies detected", class: "bad" });

    resultEl.innerHTML = `
      <div style="font-size:20px;font-weight:600;color:${cfg.color};">
        ${type}
      </div>

      <div style="color:#9ca3af;margin-bottom:10px;">
        Confidence: ${conf}%
      </div>

      <div style="height:6px;background:#1e293b;border-radius:4px;margin-bottom:16px;">
        <div style="width:${conf}%;height:100%;background:${cfg.color};"></div>
      </div>

      <div class="section">
        <strong>Why this result was reached</strong>
        <div style="margin-top:6px;color:#cbd5f5;">${cfg.explanation}</div>
      </div>

      <div class="section">
        <strong>Signals detected</strong>
        ${signals.map(s => `<div class="signal ${s.class}">• ${s.text}</div>`).join("")}
      </div>

      <div class="section">
        <strong>How to interpret</strong>
        <div style="margin-top:6px;color:#cbd5f5;">${cfg.guidance}</div>
      </div>

      <div class="section">
        <strong>Metadata</strong>
        <div class="meta-row">Camera: ${data.exif?.make ?? "-"}</div>
        <div class="meta-row">Date: ${data.exif?.date ?? "-"}</div>
        <div class="meta-row">Latitude: ${lat ?? "-"}</div>
        <div class="meta-row">Longitude: ${lon ?? "-"}</div>
      </div>

      <div class="section viewer">
        <strong>ELA Analysis (drag slider)</strong>

        <div class="slider-container">
          <img src="${URL.createObjectURL(originalFile)}">

          <div class="overlay" id="overlay">
            <img src="${data.ela?.overlay}">
          </div>

          <div class="divider" id="divider"></div>
        </div>

        <input type="range" id="slider" min="0" max="100" value="50" class="slider">
      </div>
    `;

    const slider = document.getElementById("slider");
    const overlay = document.getElementById("overlay");
    const divider = document.getElementById("divider");

    overlay.style.width = "50%";

    slider.oninput = () => {
      overlay.style.width = slider.value + "%";
      divider.style.left = slider.value + "%";
    };

  } catch (err) {
    console.error(err);
    resultEl.innerHTML = "Server waking up — try again";
  }
}
</script>

</body>
</html>
