<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PixelProof Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  background:#0a0f1a;
  color:#e5e7eb;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  padding:16px;
}

.container { max-width:900px; margin:auto; }

.header { font-size:22px; font-weight:600; margin-bottom:6px; }
.sub { font-size:13px; color:#9ca3af; margin-bottom:20px; }

.back { color:#9ca3af; text-decoration:none; display:inline-block; margin-bottom:12px; }

button {
  width:100%;
  padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  border-radius:8px;
  color:white;
  margin-top:10px;
}

.spinner {
  width:40px;height:40px;
  border:4px solid #1e293b;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

.tabs { display:flex; gap:8px; border-bottom:1px solid #1f2937; overflow-x:auto; }
.tab { padding:10px 14px; cursor:pointer; color:#9ca3af; }
.tab.active { color:white; border-bottom:2px solid #3b82f6; }

.tab-content { display:none; margin-top:16px; }
.tab-content.active { display:block; }

.card {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.section-title {
  font-size:14px;
  font-weight:600;
  margin-bottom:8px;
}

.score { font-size:36px; font-weight:700; }
.low { color:#22c55e; }
.mid { color:#f59e0b; }
.high { color:#ef4444; }

.small { font-size:12px; color:#9ca3af; }

.slider-container { position:relative; }
.slider-container img { width:100%; border-radius:8px; }

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.map-container { width:100%; height:60vh; border-radius:10px; }

.verify-buttons a {
  display:block;
  text-align:center;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  background:#111827;
  border:1px solid #374151;
  color:#e5e7eb;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<div class="header">PixelProof Analysis</div>
<div class="sub">This report explains what was found, why it matters, and what you should do next.</div>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="loader" style="display:none;text-align:center;margin:20px 0;">
  <div class="spinner"></div>
  <div class="small">Analyzing image...</div>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";

/* SAFE FETCH */
async function safeFetch(url, options, retries=2){
  try{
    const res = await fetch(url, options);
    if(!res.ok) throw new Error();
    return res;
  }catch(e){
    if(retries>0){
      await new Promise(r=>setTimeout(r,1500));
      return safeFetch(url,options,retries-1);
    }
    throw e;
  }
}

/* SCORING MODEL */
function buildSignals(data){
  const ela = data.ela.score;
  return {
    compression: Math.max(0,100-ela*4),
    anomalies: Math.min(ela*4,100),
    metadata: data.exif?85:30,
    ai: data.ai?.likelihood||0
  };
}

function calcScore(s){
  return Math.round(
    s.compression*0.3 +
    s.anomalies*0.3 +
    s.metadata*0.2 +
    s.ai*0.2
  );
}

/* CONFIDENCE */
function getConfidence(score){
  if(score>=85) return "Very Strong – The findings are consistent and highly reliable.";
  if(score>=70) return "Strong – Most indicators agree and support this result.";
  if(score>=55) return "Moderate – Some indicators suggest this result, but there may be alternative explanations.";
  if(score>=40) return "Weak – The findings are inconsistent and uncertain.";
  return "Insufficient – There is not enough reliable information to form a conclusion.";
}

/* NARRATIVE ENGINE */
function buildNarrative(s, score){

  return {

    what:
    s.anomalies > 65
    ? "Different parts of the image appear to have been saved or processed differently."
    : "The image appears to have been processed consistently as a whole.",

    why:
    s.anomalies > 65
    ? "This usually happens when a portion of an image is edited and then re-saved separately from the rest."
    : "This is typical of images that have not been selectively edited, or have only been resized or compressed uniformly.",

    how:
    "The system analyzes how the image is stored internally. Images are compressed to reduce file size. When edits occur, the edited areas often compress differently, which can be detected.",

    when:
    s.anomalies > 65
    ? "These patterns typically occur after an image has been modified using editing software."
    : "These patterns typically occur when an image is saved normally or shared online without selective edits.",

    where:
    s.anomalies > 65
    ? "The differences are localized, meaning only certain areas of the image behave differently."
    : "No specific areas stand out as behaving differently from the rest of the image.",

    meaning:
    score >= 70
    ? "There is a meaningful chance this image has been altered. You should verify it before relying on it."
    : "There is no strong evidence of manipulation, but results are not guaranteed and should be considered alongside other information."
  };
}

/* ANALYZE */
async function analyze(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";

  const form=new FormData();
  form.append("image",file);

  let data;

  try{
    const res = await safeFetch(API+"/analyze",{method:"POST",body:form});
    data = await res.json();
  }catch{
    document.getElementById("loader").style.display="none";
    alert("Server unavailable. Try again.");
    return;
  }

  document.getElementById("loader").style.display="none";

  const signals = buildSignals(data);
  const score = calcScore(signals);
  const confidence = getConfidence(score);
  const n = buildNarrative(signals, score);

  const riskClass = score>=80?"low":score>=55?"mid":"high";

  document.getElementById("result").innerHTML=`

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <div class="score ${riskClass}">${score}/100</div>
        <strong>Confidence:</strong> ${confidence}
      </div>

      <div class="card">
        <div class="section-title">What was found</div>
        ${n.what}
      </div>

      <div class="card">
        <div class="section-title">Why this matters</div>
        ${n.why}
      </div>

      <div class="card">
        <div class="section-title">How this was determined</div>
        ${n.how}
      </div>

      <div class="card">
        <div class="section-title">When this typically occurs</div>
        ${n.when}
      </div>

      <div class="card">
        <div class="section-title">Where this appears in the image</div>
        ${n.where}
      </div>

      <div class="card">
        <div class="section-title">What this means for you</div>
        ${n.meaning}
      </div>

      <div class="card">
        <div class="section-title">How the score was calculated</div>
        This score is based on four factors:<br><br>
        • Compression consistency (30%)<br>
        • Localized anomalies (30%)<br>
        • Metadata presence (20%)<br>
        • AI likelihood (20%)<br><br>
        These are combined to estimate how consistent the image is with normal, unedited images.
      </div>

    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>
      <input type="range" id="slider" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        Camera: ${data.exif?.Make||"-"}<br>
        Date: ${data.exif?.DateTimeOriginal||"-"}<br>
        Lat: ${data.gps?.lat ?? "N/A"}<br>
        Lon: ${data.gps?.lon ?? "N/A"}
      </div>
    </div>

    <div id="map" class="tab-content">
      ${
        data.gps?.lat
        ? `<iframe class="map-container"
           src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed&t=k"></iframe>`
        : "No GPS data"
      }
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.exif,null,2)}</pre>
    </div>
  `;

  document.getElementById("slider").oninput=e=>{
    document.getElementById("overlay").style.width=e.target.value+"%";
  };
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

</script>

</body>
</html>
