<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

html, body {
  background: #000;
  color: #fff;
  font-family: Arial;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.back {
  color: #9ca3af;
  text-decoration: none;
}

input { width: 100%; margin: 15px 0; }

button {
  width: 100%;
  padding: 14px;
  background: #1f2937;
  border: none;
  color: white;
  border-radius: 8px;
}

/* LOADER */
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #1e293b;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  border-bottom: 1px solid #333;
}

.tab {
  padding: 10px;
  cursor: pointer;
  color: #9ca3af;
  white-space: nowrap;
}

.tab.active {
  color: white;
  border-bottom: 2px solid white;
}

.tab-content {
  display: none;
  margin-top: 15px;
}

.tab-content.active {
  display: block;
}

/* META */
.meta-row {
  padding: 6px 0;
  border-bottom: 1px solid #222;
}

/* SLIDER */
.slider-container { position: relative; }

.slider-container img { width: 100%; }

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}

.overlay img { width: 100%; }

.divider {
  position: absolute;
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  background: white;
}

.slider { width: 100%; }

/* MAP */
.map-container {
  width: 100%;
  height: 60vh;
  min-height: 320px;
  max-height: 500px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

/* ===== TAB SWITCH ===== */
function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

/* ===== REPORT BUILDER ===== */
function buildReport(type, confidence, hasExif, hasGPS) {

  const score = Math.round(confidence * 100);

  let risk = "Moderate";
  if (score >= 80) risk = "Low";
  else if (score <= 50) risk = "High";

  const base = {
    "Likely Original": {
      summary: "No strong indicators of manipulation were detected.",
      findings: "Compression is consistent across the image.",
      visual: "ELA appears evenly distributed.",
      conclusion: "The image is likely authentic."
    },
    "Recompressed": {
      summary: "The image shows signs of recompression.",
      findings: "Compression differences are spread across the image.",
      visual: "ELA appears uniformly elevated.",
      conclusion: "Recompression detected, not necessarily editing."
    },
    "Edited": {
      summary: "Compression inconsistencies suggest localized changes.",
      findings: "ELA shows uneven compression patterns.",
      visual: "Look for bright localized regions.",
      conclusion: "Image may have been altered."
    },
    "Unknown": {
      summary: "No clear signal detected.",
      findings: "Compression patterns are inconclusive.",
      visual: "ELA has no clear pattern.",
      conclusion: "Result inconclusive."
    }
  };

  const selected = base[type] || base["Unknown"];

  return {
    score,
    risk,
    ...selected,
    meta: hasExif
      ? "Metadata present."
      : "Metadata missing — may indicate removal.",
    gps: hasGPS
      ? "GPS data present."
      : "No GPS data."
  };
}

/* ===== PDF DOWNLOAD ===== */
function downloadReport() {

  const content = document.getElementById("overview").innerText;

  const win = window.open('', '', 'width=800,height=600');

  win.document.write(`
    <html>
    <head>
      <title>PixelProof Report</title>
      <style>
        body { font-family: Arial; padding: 20px; }
        pre { white-space: pre-wrap; }
      </style>
    </head>
    <body>
      <h1>PixelProof Analysis Report</h1>
      <pre>${content}</pre>
    </body>
    </html>
  `);

  win.document.close();

  setTimeout(() => {
    win.print();
  }, 500);
}

/* ===== ANALYZE ===== */
async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  const resultEl = document.getElementById("result");

  if(!file) return alert("Select image");

  resultEl.innerHTML = `
    <div style="text-align:center;margin-top:40px;">
      <div class="spinner"></div>
      <div style="color:#9ca3af;">Analyzing image...</div>
    </div>
  `;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method:"POST",
    body:form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const confidence = data.classification?.confidence || 0.5;

  const lat = data.gps?.lat;
  const lon = data.gps?.lon;

  const report = buildReport(type, confidence, !!data.exif, !!(lat && lon));

  resultEl.innerHTML = `
    <div style="font-size:22px;">${type}</div>

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
    </div>

    <!-- OVERVIEW -->
    <div id="overview" class="tab-content active">

      <div style="margin-bottom:16px;">
        <div style="font-size:20px;font-weight:600;">
          Integrity Score: ${report.score}/100
        </div>

        <div style="color:${
          report.risk==="Low" ? "#22c55e" :
          report.risk==="Moderate" ? "#f59e0b" : "#ef4444"
        }; font-weight:600;">
          Risk Level: ${report.risk}
        </div>

        <div style="height:6px;background:#111;margin-top:8px;border-radius:4px;">
          <div style="
            width:${report.score}%;
            height:100%;
            background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);
          "></div>
        </div>
      </div>

      <div><strong>Summary</strong><br>${report.summary}</div><br>
      <div><strong>Technical Findings</strong><br>${report.findings}</div><br>
      <div><strong>What to Look For</strong><br>${report.visual}</div><br>
      <div><strong>Conclusion</strong><br>${report.conclusion}</div>

      <div style="margin-top:12px;font-size:12px;color:#9ca3af;">
        ${report.meta}<br>${report.gps}<br><br>
        Metadata may be altered or removed and is not definitive proof.
      </div>

      <div style="margin-top:20px;">
        <button onclick="downloadReport()">Download Report (PDF)</button>
      </div>

    </div>

    <!-- ELA -->
    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela?.overlay}">
        </div>
        <div class="divider" id="divider"></div>
      </div>
      <input type="range" id="slider" min="0" max="100" value="50">
    </div>

    <!-- METADATA -->
    <div id="metadata" class="tab-content">
      <div class="meta-row">Camera: ${data.exif?.Make ?? "-"}</div>
      <div class="meta-row">Date: ${data.exif?.DateTimeOriginal ?? "-"}</div>
      <div class="meta-row">Lat: ${lat ?? "-"}</div>
      <div class="meta-row">Lon: ${lon ?? "-"}</div>
    </div>

    <!-- MAP -->
    <div id="map" class="tab-content">
      ${
        lat && lon
        ? `<div class="map-container">
             <iframe width="100%" height="100%"
             src="https://www.google.com/maps?q=${lat},${lon}&z=18&output=embed&t=k"></iframe>
           </div>`
        : "No GPS data"
      }
    </div>

    <!-- RAW -->
    <div id="raw" class="tab-content">
      <pre style="font-size:12px;color:#9ca3af;">
${JSON.stringify(data.rawMetadata, null, 2)}
      </pre>
    </div>
  `;

  const slider=document.getElementById("slider");
  const overlay=document.getElementById("overlay");
  const divider=document.getElementById("divider");

  if(slider){
    slider.oninput=()=>{
      overlay.style.width=slider.value+"%";
      divider.style.left=slider.value+"%";
    };
  }
}
</script>

</body>
</html>
