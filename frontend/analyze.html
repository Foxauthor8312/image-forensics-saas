<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { background:#000; color:#fff; font-family:Arial; padding:16px; }
.container { max-width:720px; margin:auto; }

.back { color:#9ca3af; text-decoration:none; display:inline-block; margin-bottom:10px; }

button {
  width:100%; padding:12px;
  background:#1f2937;
  border:1px solid #374151;
  color:white; border-radius:8px;
}

.spinner {
  width:40px;height:40px;
  border:4px solid #1e293b;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

.tabs { display:flex; gap:6px; border-bottom:1px solid #1f2937; overflow-x:auto; }
.tab { padding:10px; color:#9ca3af; cursor:pointer; }
.tab.active { color:#fff; background:#111827; }

.tab-content { display:none; margin-top:14px; }
.tab-content.active { display:block; }

.card {
  background:#0b0f19;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
}

.slider-container { position:relative; }
.slider-container img { width:100%; }
.overlay { position:absolute; top:0; left:0; width:50%; overflow:hidden; }

.map-container { width:100%; height:60vh; }
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="loader" style="display:none;text-align:center;margin:20px 0;">
  <div class="spinner"></div>
  <div style="margin-top:10px;">Analyzing image...</div>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";
let currentFile=null;

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

/* ===== REPORT ===== */
function buildReport(type, score){

  const risk = score>=80?"Low":score<=50?"High":"Moderate";

  const reports={

    "Edited":{
      summary:"Parts of this image may have been altered.",
      explanation:"Certain areas compress differently than surrounding regions. This often happens when content is added, removed, or modified.",
      meaning:"You should treat this image as potentially manipulated and verify it using trusted sources."
    },

    "Recompressed":{
      summary:"This image has been saved or processed multiple times.",
      explanation:"Recompression changes how an image is stored. This can happen naturally when images are uploaded or shared.",
      meaning:"Recompression alone is not proof of editing, but it can hide previous changes."
    },

    "Likely Original":{
      summary:"No clear signs of editing were found.",
      explanation:"Compression patterns are consistent across the image, which typically indicates the image has not been modified.",
      meaning:"This image appears authentic and can generally be trusted."
    },

    "Unknown":{
      summary:"The result is inconclusive.",
      explanation:"The system could not find strong enough patterns to make a determination.",
      meaning:"Try analyzing a higher-quality version of the image."
    }
  };

  return {risk,...(reports[type]||reports["Unknown"])};
}

/* ===== CONFIDENCE ===== */
function buildConfidence(data){
  const ela=data.ela.score;

  return [
    {label:"Compression Consistency", value:Math.max(0,100-ela*4)},
    {label:"Localized Anomalies", value:Math.min(ela*4,100)},
    {label:"Metadata Presence", value:data.exif?85:30},
    {label:"AI Likelihood", value:data.ai?.likelihood||0}
  ];
}

/* ===== DOWNLOAD ===== */
async function downloadReport(){
  const form=new FormData();
  form.append("image",currentFile);
  const res=await fetch(API+"/report",{method:"POST",body:form});
  const blob=await res.blob();
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="report.pdf";
  a.click();
}

/* ===== ANALYZE ===== */
async function analyze(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  currentFile=file;

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";

  const form=new FormData();
  form.append("image",file);

  const res=await fetch(API+"/analyze",{method:"POST",body:form});
  const data=await res.json();

  document.getElementById("loader").style.display="none";

  const type=data.classification.type;
  const score=Math.round(data.classification.confidence*100);

  const report=buildReport(type,score);
  const breakdown=buildConfidence(data);

  document.getElementById("result").innerHTML=`

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
      <div class="tab" id="tab-guide" onclick="switchTab('guide')">How to Read</div>
      <div class="tab" id="tab-ai" onclick="switchTab('ai')">AI</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <strong>${type}</strong><br>
        Score: ${score}/100 (${report.risk})
      </div>

      <div class="card">
        <strong>Summary</strong><br><br>
        ${report.summary}
      </div>

      <div class="card">
        <strong>Why this result was given</strong><br><br>
        ${report.explanation}
      </div>

      <div class="card">
        <strong>What this means for you</strong><br><br>
        ${report.meaning}
      </div>

      <div class="card">
        <strong>Confidence Reasoning</strong><br><br>
        ${breakdown.map(b=>`
          ${b.label}
          <div style="height:6px;background:#1e293b;margin:4px 0;">
            <div style="width:${b.value}%;height:100%;
              background:${b.value>70?'#22c55e':b.value>40?'#f59e0b':'#ef4444'};">
            </div>
          </div>
        `).join("")}
      </div>

      <button onclick="downloadReport()">Download Report</button>

    </div>

    <div id="ela" class="tab-content">
      <div class="card">
        <strong>What is ELA?</strong><br><br>
        Error Level Analysis highlights differences in compression.<br><br>
        Bright areas may indicate edits.
      </div>

      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>

      <input type="range" id="slider" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        Camera: ${data.exif?.Make||"-"}<br>
        Date: ${data.exif?.DateTimeOriginal||"-"}
      </div>
    </div>

    <div id="map" class="tab-content">
      ${
        data.gps.lat
        ? `<iframe class="map-container"
           src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed&t=k"></iframe>`
        : "No GPS data"
      }
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.exif,null,2)}</pre>
    </div>

    <div id="guide" class="tab-content">
      <div class="card">
        <strong>How to interpret results</strong><br><br>

        <b>ELA:</b> Highlights compression differences<br>
        <b>Recompression:</b> Image saved multiple times<br>
        <b>Metadata:</b> Camera info & timestamps<br>
        <b>AI:</b> Indicates likelihood of synthetic origin<br><br>

        Always combine all signals before making conclusions.
      </div>
    </div>

    <div id="ai" class="tab-content">
      <div class="card">
        AI Likelihood: ${data.ai.likelihood}%<br><br>
        This is a probability estimate, not proof.
      </div>
    </div>
  `;

  document.getElementById("slider").oninput=e=>{
    document.getElementById("overlay").style.width=e.target.value+"%";
  };
}

</script>

</body>
</html>
