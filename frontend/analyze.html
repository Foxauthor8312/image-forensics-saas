<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PixelProof Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { background:#0a0f1a; color:#e5e7eb; font-family:-apple-system,Segoe UI; padding:16px; }
.container { max-width:900px; margin:auto; }

.header { font-size:22px; font-weight:600; margin-bottom:6px; }
.sub { font-size:13px; color:#9ca3af; margin-bottom:20px; }

.back { color:#9ca3af; text-decoration:none; display:inline-block; margin-bottom:12px; }

button {
  width:100%; padding:12px;
  background:#1f2937; border:1px solid #374151;
  border-radius:8px; color:white;
}

.spinner {
  width:40px;height:40px;
  border:4px solid #1e293b;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

.tabs { display:flex; gap:8px; border-bottom:1px solid #1f2937; overflow-x:auto; }
.tab { padding:10px 14px; cursor:pointer; color:#9ca3af; }
.tab.active { color:white; border-bottom:2px solid #3b82f6; }

.tab-content { display:none; margin-top:16px; }
.tab-content.active { display:block; }

.card {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.section-title { font-size:14px; font-weight:600; margin-bottom:8px; }

.score { font-size:36px; font-weight:700; }
.low { color:#22c55e; }
.mid { color:#f59e0b; }
.high { color:#ef4444; }

.small { font-size:12px; color:#9ca3af; }

.slider-container { position:relative; }
.slider-container img { width:100%; border-radius:8px; }

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.map-container { width:100%; height:60vh; border-radius:10px; }

.verify-buttons a {
  display:block;
  text-align:center;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  background:#111827;
  border:1px solid #374151;
  color:#e5e7eb;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<div class="header">PixelProof Analysis</div>
<div class="sub">Clear explanation of findings, confidence, and how to verify this image</div>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="loader" style="display:none;text-align:center;margin:20px 0;">
  <div class="spinner"></div>
  <div class="small">Analyzing image...</div>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://image-forensics-saas-1.onrender.com";

/* SAFE FETCH */
async function safeFetch(url, options, retries=2){
  try{
    const res = await fetch(url, options);
    if(!res.ok) throw new Error();
    return res;
  }catch(e){
    if(retries>0){
      await new Promise(r=>setTimeout(r,1500));
      return safeFetch(url,options,retries-1);
    }
    throw e;
  }
}

/* SCORING */
function buildSignals(data){
  const ela = data.ela.score;
  return {
    compression: Math.max(0,100-ela*4),
    anomalies: Math.min(ela*4,100),
    metadata: data.exif?85:30,
    ai: data.ai?.likelihood||0
  };
}

function calcScore(s){
  return Math.round(
    s.compression*0.3 +
    s.anomalies*0.3 +
    s.metadata*0.2 +
    s.ai*0.2
  );
}

/* NARRATIVE */
function buildNarrative(s, score){
  return {
    what: s.anomalies > 65
      ? "Different parts of the image appear to have been saved differently."
      : "The image appears uniformly processed.",
    why: s.anomalies > 65
      ? "This often occurs when part of an image is edited separately."
      : "This is typical of normal resizing or recompression.",
    meaning: score >= 70
      ? "There is a meaningful chance this image has been altered. Verification is recommended."
      : "No strong signs of manipulation, but results should be considered alongside context."
  };
}

/* VERIFY LINKS */
function buildVerifyLinks(gps){
  return {
    reverse:"https://images.google.com/",
    news:"https://news.google.com/",
    maps: gps?.lat ? `https://maps.google.com?q=${gps.lat},${gps.lon}` : null
  };
}

/* ANALYZE */
async function analyze(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Select image");

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";

  const form=new FormData();
  form.append("image",file);

  let data;

  try{
    const res = await safeFetch(API+"/analyze",{method:"POST",body:form});
    data = await res.json();
  }catch{
    document.getElementById("loader").style.display="none";
    alert("Server unavailable. Try again.");
    return;
  }

  document.getElementById("loader").style.display="none";

  const signals = buildSignals(data);
  const score = calcScore(signals);
  const n = buildNarrative(signals, score);
  const links = buildVerifyLinks(data.gps);

  const riskClass = score>=80?"low":score>=55?"mid":"high";

  document.getElementById("result").innerHTML=`

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <div class="score ${riskClass}">${score}/100</div>
      </div>

      <div class="card"><div class="section-title">What was found</div>${n.what}</div>
      <div class="card"><div class="section-title">Why this matters</div>${n.why}</div>
      <div class="card"><div class="section-title">What this means</div>${n.meaning}</div>

      <div class="card">
        <div class="section-title">How to verify this image</div>
        <div class="verify-buttons">
          <a href="${links.reverse}" target="_blank">Search image online</a>
          <a href="${links.news}" target="_blank">Check news sources</a>
          ${links.maps ? `<a href="${links.maps}" target="_blank">Verify location</a>` : ""}
        </div>
      </div>

    </div>

    <div id="ela" class="tab-content">

      <div class="card">
        <div class="section-title">What is ELA (Error Level Analysis)?</div>
        ELA shows how different parts of an image were compressed when saved.<br><br>
        When an image is edited, the edited areas are often saved differently from the rest.
      </div>

      <div class="card">
        <div class="section-title">What you are looking at</div>
        Bright or inconsistent areas may indicate parts of the image that were modified.
        Uniform brightness usually indicates consistent processing.
      </div>

      <div class="card">
        <div class="section-title">How the slider works</div>
        The slider compares the original image with the ELA view.<br><br>
        Moving the slider lets you directly compare areas to see where differences appear.
      </div>

      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela.overlay}">
        </div>
      </div>

      <input type="range" id="slider" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        ImageWidth: ${data.exif?.ImageWidth || "-"}<br>
        ImageHeight: ${data.exif?.ImageHeight || "-"}<br>
        ResolutionUnit: ${data.exif?.ResolutionUnit || "-"}<br>
        Make: ${data.exif?.Make || "-"}<br>
        Model: ${data.exif?.Model || "-"}<br>
        XResolution: ${data.exif?.XResolution || "-"}<br>
        YResolution: ${data.exif?.YResolution || "-"}<br>
        ModifyDate: ${data.exif?.ModifyDate || "-"}<br>
        Latitude: ${data.gps?.lat ?? "N/A"}<br>
        Longitude: ${data.gps?.lon ?? "N/A"}
      </div>
    </div>

    <div id="map" class="tab-content">
      ${
        data.gps?.lat
        ? `<iframe class="map-container"
           src="https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}&output=embed&t=k"></iframe>`
        : "No GPS data"
      }
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.exif,null,2)}</pre>
    </div>
  `;

  document.getElementById("slider").oninput=e=>{
    document.getElementById("overlay").style.width=e.target.value+"%";
  };
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

</script>

</body>
</html>
