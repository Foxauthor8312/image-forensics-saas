<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

.back { color:#94a3b8; text-decoration:none; }

.tabs { display:flex; margin-top:20px; border-bottom:1px solid #334155; }
.tab { padding:10px; cursor:pointer; color:#94a3b8; }
.tab.active { color:white; border-bottom:2px solid white; }

.tab-content { display:none; margin-top:15px; }
.tab-content.active { display:block; }

.meta-row { padding:6px 0; border-bottom:1px solid #334155; }

.signal { margin:4px 0; }
.good { color:#22c55e; }
.warn { color:#f59e0b; }
.bad { color:#ef4444; }

.slider-container { position:relative; }
.slider-container img { width:100%; border-radius:8px; }

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.overlay img { width:100%; opacity:0.9; }

.divider {
  position:absolute;
  top:0;
  left:50%;
  width:2px;
  height:100%;
  background:white;
}

.slider { width:100%; margin-top:12px; }
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" accept="image/*" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  const resultEl = document.getElementById("result");

  if(!file) return alert("Select an image");

  resultEl.innerHTML = "Processing...";

  const form = new FormData();
  form.append("image", file);

  try{

    const res = await fetch(API + "/analyze", {
      method:"POST",
      body:form
    });

    const data = await res.json();

    const type = data.classification?.type || "Unknown";
    const conf = Math.round((data.classification?.confidence || 0.5)*100);

    let explanation="", guidance="", confidenceNote="";

    if(type==="Likely Original"){
      explanation="Compression and metadata are consistent with an original image.";
      guidance="No strong evidence of manipulation.";
      confidenceNote="High confidence indicates stable structure.";
    }
    else if(type==="Recompressed"){
      explanation="Image has been resaved or processed.";
      guidance="May hide earlier edits.";
      confidenceNote="Moderate confidence.";
    }
    else if(type==="Edited"){
      explanation="Irregular compression suggests localized edits.";
      guidance="Possible manipulation detected.";
      confidenceNote="Lower confidence possible.";
    }
    else{
      explanation="No strong signal.";
      guidance="Inconclusive.";
      confidenceNote="";
    }

    const lat=data.gps?.lat;
    const lon=data.gps?.lon;

    const signals=[];
    if(data.exif) signals.push('<div class="signal good">✔ Metadata present</div>');
    else signals.push('<div class="signal warn">⚠ Metadata missing</div>');

    if(lat && lon) signals.push('<div class="signal good">✔ GPS detected</div>');
    else signals.push('<div class="signal warn">⚠ No GPS</div>');

    if(type==="Edited") signals.push('<div class="signal bad">✖ Compression anomalies</div>');

    resultEl.innerHTML = `
      <div style="font-size:20px;font-weight:600;">${type}</div>
      <div style="color:#9ca3af;margin-bottom:10px;">Confidence: ${conf}%</div>

      <div class="tabs">
        <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
        <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
        <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      </div>

      <div id="overview" class="tab-content active">
        <p>${explanation}</p>
        ${signals.join("")}
        <p>${guidance}</p>
        <div style="color:#9ca3af;font-size:13px;">${confidenceNote}</div>
      </div>

      <div id="metadata" class="tab-content">
        <div class="meta-row">Camera: ${data.exif?.Make ?? "-"}</div>
        <div class="meta-row">Model: ${data.exif?.Model ?? "-"}</div>
        <div class="meta-row">Date: ${data.exif?.DateTimeOriginal ?? "-"}</div>
        <div class="meta-row">Latitude: ${lat ?? "-"}</div>
        <div class="meta-row">Longitude: ${lon ?? "-"}</div>
      </div>

      <div id="ela" class="tab-content">
        <div class="slider-container">
          <img src="${URL.createObjectURL(file)}">
          <div class="overlay" id="overlay">
            <img src="${data.ela?.overlay}">
          </div>
          <div class="divider" id="divider"></div>
        </div>

        <input type="range" id="slider" min="0" max="100" value="50" class="slider">
      </div>
    `;

    const slider=document.getElementById("slider");
    const overlay=document.getElementById("overlay");
    const divider=document.getElementById("divider");

    if(slider && overlay){
      slider.oninput=()=>{
        overlay.style.width=slider.value+"%";
        divider.style.left=slider.value+"%";
      };
    }

  }catch(err){
    console.error(err);
    resultEl.innerHTML="Server waking up — try again";
  }
}
</script>

</body>
</html>
