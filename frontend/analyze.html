<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analyze - PixelProof</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

html, body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  padding: 16px;
}

/* CONTAINER */
.container {
  max-width: 720px;
  margin: auto;
}

/* BACK */
.back {
  color: #9ca3af;
  text-decoration: none;
  font-size: 14px;
}

/* INPUT */
input {
  width: 100%;
  margin: 16px 0;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  background: #1f2937;
  border: 1px solid #374151;
  color: white;
  border-radius: 8px;
  font-size: 15px;
}

/* LOADER */
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #1e293b;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* HEADER RESULT */
.result-header {
  margin-top: 20px;
  margin-bottom: 10px;
}

.result-type {
  font-size: 22px;
  font-weight: 600;
}

.result-sub {
  color: #9ca3af;
  font-size: 14px;
}

/* TABS */
.tabs {
  display: flex;
  gap: 6px;
  margin-top: 16px;
  border-bottom: 1px solid #1f2937;
  overflow-x: auto;
}

.tab {
  padding: 10px 14px;
  cursor: pointer;
  color: #9ca3af;
  border-radius: 6px 6px 0 0;
}

.tab.active {
  color: white;
  background: #111827;
  border-bottom: 2px solid white;
}

/* CONTENT */
.tab-content {
  display: none;
  margin-top: 14px;
}

.tab-content.active {
  display: block;
}

/* CARD */
.card {
  background: #0b0f19;
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

/* SCORE BAR */
.score-bar {
  height: 6px;
  background: #111;
  border-radius: 4px;
  margin-top: 8px;
}

/* META */
.meta-row {
  padding: 6px 0;
  border-bottom: 1px solid #1f2937;
  font-size: 14px;
}

/* SLIDER */
.slider-container { position: relative; }
.slider-container img { width: 100%; border-radius: 8px; }

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  overflow: hidden;
}
.overlay img { width: 100%; }

.divider {
  position: absolute;
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  background: white;
}

.slider { width: 100%; margin-top: 10px; }

/* MAP */
.map-container {
  width: 100%;
  height: 60vh;
  min-height: 320px;
  max-height: 500px;
  border-radius: 8px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<input type="file" id="fileInput" />
<button onclick="analyze()">Analyze Image</button>

<div id="result"></div>

</div>

<script>
const API = "https://image-forensics-saas-1.onrender.com";

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.getElementById(name).classList.add("active");
}

function buildReport(type, confidence, hasExif, hasGPS) {

  const score = Math.round(confidence * 100);

  let risk = "Moderate";
  if (score >= 80) risk = "Low";
  else if (score <= 50) risk = "High";

  return {
    score,
    risk,
    summary: "Compression analysis completed.",
    findings: "Patterns evaluated across image structure.",
    visual: "Inspect bright regions in ELA overlay.",
    conclusion: type,
    meta: hasExif ? "Metadata present." : "Metadata missing.",
    gps: hasGPS ? "GPS data present." : "No GPS data."
  };
}

function downloadReport() {
  const content = document.getElementById("overview").innerText;
  const win = window.open('', '', 'width=800,height=600');

  win.document.write(`
    <html><body style="font-family:Arial;padding:20px;">
    <h1>PixelProof Report</h1>
    <pre>${content}</pre>
    </body></html>
  `);

  win.document.close();
  setTimeout(()=>win.print(),500);
}

async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  const resultEl = document.getElementById("result");

  if(!file) return alert("Select image");

  resultEl.innerHTML = `
    <div style="text-align:center;margin-top:40px;">
      <div class="spinner"></div>
      <div style="color:#9ca3af;">Analyzing image...</div>
    </div>
  `;

  const form = new FormData();
  form.append("image", file);

  const res = await fetch(API + "/analyze", {
    method:"POST",
    body:form
  });

  const data = await res.json();

  const type = data.classification?.type || "Unknown";
  const confidence = data.classification?.confidence || 0.5;

  const lat = data.gps?.lat;
  const lon = data.gps?.lon;

  const report = buildReport(type, confidence, !!data.exif, !!(lat && lon));

  resultEl.innerHTML = `
    <div class="result-header">
      <div class="result-type">${type}</div>
      <div class="result-sub">Confidence: ${report.score}%</div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" id="tab-ela" onclick="switchTab('ela')">ELA</div>
      <div class="tab" id="tab-metadata" onclick="switchTab('metadata')">Metadata</div>
      <div class="tab" id="tab-map" onclick="switchTab('map')">Map</div>
      <div class="tab" id="tab-raw" onclick="switchTab('raw')">Full Metadata</div>
    </div>

    <div id="overview" class="tab-content active">

      <div class="card">
        <div><strong>Integrity Score</strong></div>
        <div>${report.score}/100 (${report.risk})</div>
        <div class="score-bar">
          <div style="width:${report.score}%;height:100%;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);"></div>
        </div>
      </div>

      <div class="card">
        <strong>Summary</strong><br>${report.summary}
      </div>

      <div class="card">
        <strong>Findings</strong><br>${report.findings}
      </div>

      <div class="card">
        <strong>Visual Guidance</strong><br>${report.visual}
      </div>

      <div class="card">
        <strong>Conclusion</strong><br>${report.conclusion}
      </div>

      <div class="card">
        <button onclick="downloadReport()">Download Report</button>
      </div>

    </div>

    <div id="ela" class="tab-content">
      <div class="slider-container">
        <img src="${URL.createObjectURL(file)}">
        <div class="overlay" id="overlay">
          <img src="${data.ela?.overlay}">
        </div>
        <div class="divider" id="divider"></div>
      </div>
      <input type="range" id="slider" min="0" max="100" value="50">
    </div>

    <div id="metadata" class="tab-content">
      <div class="card">
        <div class="meta-row">Camera: ${data.exif?.Make ?? "-"}</div>
        <div class="meta-row">Date: ${data.exif?.DateTimeOriginal ?? "-"}</div>
        <div class="meta-row">Lat: ${lat ?? "-"}</div>
        <div class="meta-row">Lon: ${lon ?? "-"}</div>
      </div>
    </div>

    <div id="map" class="tab-content">
      ${lat && lon
        ? `<div class="map-container">
             <iframe width="100%" height="100%"
             src="https://www.google.com/maps?q=${lat},${lon}&z=18&output=embed&t=k"></iframe>
           </div>`
        : "No GPS data"}
    </div>

    <div id="raw" class="tab-content">
      <pre>${JSON.stringify(data.rawMetadata, null, 2)}</pre>
    </div>
  `;

  const slider=document.getElementById("slider");
  const overlay=document.getElementById("overlay");
  const divider=document.getElementById("divider");

  if(slider){
    slider.oninput=()=>{
      overlay.style.width=slider.value+"%";
      divider.style.left=slider.value+"%";
    };
  }
}
</script>

</body>
</html>
